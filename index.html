<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>3レーン・スワイプラン</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --road: #273038;
      --road-line: #53606a;
      --ink: #f6efd9;
      --muted: #b8c1b2;
      --accent: #f0c247;
      --danger: #dd6655;
      --slow: #65b7d8;
      --boost: #f0c247;
      --panel: rgba(13, 15, 16, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: stretch center;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
      overflow: hidden;
    }

    .app {
      width: min(100vw, 430px);
      height: 100svh;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 8px calc(env(safe-area-inset-bottom, 0px) + 8px);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 8px;
      min-height: 46px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .stat {
      min-width: 74px;
      padding: 7px 8px;
      border: 1px solid rgba(246, 239, 217, 0.14);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 17px;
      line-height: 1;
    }

    .stage {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(246, 239, 217, 0.14);
      border-radius: 8px;
      overflow: hidden;
      background: var(--road);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
    }

    .move-controls {
      position: absolute;
      left: 16px;
      bottom: 16px;
      display: grid;
      grid-template-columns: repeat(2, 44px);
      grid-template-rows: 44px;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 2;
    }

    .jump-control {
      position: absolute;
      right: 18px;
      bottom: 18px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 2;
    }

    .stage.playing .move-controls,
    .stage.playing .jump-control {
      opacity: 1;
      pointer-events: auto;
    }

    .control-button {
      width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      border: 2px solid rgba(246, 239, 217, 0.72);
      border-radius: 50%;
      background: rgba(240, 194, 71, 0.82);
      color: #1b1710;
      box-shadow: 0 5px 14px rgba(0,0,0,0.32);
      font-size: 24px;
      line-height: 1;
      display: grid;
      place-items: center;
      transition: transform 0.08s ease, filter 0.08s ease;
    }

    .control-button:active {
      transform: scale(0.92);
      filter: brightness(1.08);
    }

    .dir-left {
      grid-column: 1;
      grid-row: 1;
    }

    .dir-right {
      grid-column: 2;
      grid-row: 1;
    }

    .jump-control .control-button {
      width: 64px;
      height: 64px;
      min-height: 64px;
      font-size: 18px;
      font-weight: 900;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(10, 12, 13, 0.45);
      opacity: 0;
      pointer-events: none;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay[data-mode="title"],
    .overlay[data-mode="ranking"] {
      align-items: stretch;
      padding: 22px 18px;
      background:
        linear-gradient(180deg, rgba(7, 19, 45, 0.18), rgba(7, 11, 22, 0.95) 72%),
        radial-gradient(circle at 50% 12%, rgba(123, 238, 255, 0.14), transparent 34%),
        rgba(7, 11, 22, 0.7);
    }

    .dialog {
      width: min(100%, 340px);
      padding: 18px;
      border: 1px solid rgba(123, 238, 255, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(rgba(7, 11, 17, 0.72), rgba(7, 11, 17, 0.78)),
        url("assets/ui/imagegen-result-panel.png?v=imagegen-1") center / 100% 100% no-repeat,
        rgba(15, 17, 18, 0.92);
      box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 34px rgba(93, 232, 255, 0.18);
      text-align: center;
    }

    .dialog.new-best {
      border-color: rgba(240, 194, 71, 0.85);
      background:
        linear-gradient(145deg, rgba(240, 194, 71, 0.18), rgba(15, 17, 18, 0.94) 42%),
        rgba(15, 17, 18, 0.94);
      box-shadow: 0 0 0 2px rgba(240, 194, 71, 0.22), 0 18px 44px rgba(240, 194, 71, 0.2);
    }

    .dialog.new-best h2 {
      color: var(--accent);
      text-shadow: 0 0 18px rgba(240, 194, 71, 0.5);
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0;
    }

    .overlay[data-mode="title"] .dialog {
      align-self: stretch;
      display: grid;
      grid-template-rows: 1fr auto auto auto;
      width: min(100%, 360px);
      border-color: rgba(246, 239, 217, 0.08);
      background:
        linear-gradient(180deg, rgba(8, 18, 43, 0.08), rgba(8, 13, 25, 0.72) 48%, rgba(8, 12, 18, 0.94)),
        transparent;
      box-shadow: none;
    }

    .overlay[data-mode="title"] .dialog h2 {
      align-self: end;
      margin-bottom: 8px;
      color: #f8c92d;
      font-size: 56px;
      font-weight: 950;
      line-height: 0.92;
      text-shadow: 0 5px 0 #12223b, 0 12px 22px rgba(0,0,0,0.58);
    }

    .overlay[data-mode="title"] .dialog p {
      color: #ffffff;
      font-size: 16px;
      font-weight: 850;
      text-shadow: 0 3px 8px rgba(0,0,0,0.5);
    }

    .overlay[data-mode="ranking"] .dialog {
      align-self: stretch;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      width: min(100%, 370px);
      background: rgba(9, 17, 32, 0.94);
    }

    .overlay[data-mode="ranking"] .dialog h2 {
      font-size: 34px;
    }

    .overlay[data-mode="title"] .ranking,
    .overlay[data-mode="title"] .conversion,
    .overlay[data-mode="ranking"] .conversion,
    .overlay[data-mode="ranking"] .score-entry {
      display: none;
    }

    .dialog p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .conversion {
      display: none;
      margin: 0 0 14px;
      padding: 10px;
      border: 1px solid rgba(246, 239, 217, 0.12);
      border-radius: 8px;
      background: rgba(246, 239, 217, 0.06);
    }

    .conversion.show {
      display: block;
    }

    .convert-row {
      display: grid;
      grid-template-columns: 76px 1fr 88px;
      align-items: center;
      gap: 8px;
      min-height: 54px;
    }

    .convert-box {
      padding: 7px 6px;
      border-radius: 8px;
      background: rgba(13, 15, 16, 0.68);
      text-align: center;
    }

    .convert-box span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      line-height: 1;
    }

    .convert-box strong {
      display: block;
      margin-top: 4px;
      font-size: 19px;
      line-height: 1;
    }

    .convert-box.pop strong {
      animation: scorePop 0.2s ease-out;
    }

    .convert-lane {
      position: relative;
      height: 42px;
      overflow: hidden;
    }

    .convert-lane::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 20px;
      height: 2px;
      background: rgba(246, 239, 217, 0.18);
    }

    .fly-coin {
      position: absolute;
      left: 0;
      top: 11px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f0c247;
      border: 2px solid #f6efd9;
      box-shadow: 0 0 10px rgba(240, 194, 71, 0.45);
      animation: coinToScore 0.34s ease-in forwards;
    }

    @keyframes coinToScore {
      0% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
      }
      65% {
        transform: translateX(calc(var(--coin-travel, 140px) * 0.74)) translateY(-11px) scale(1.08);
        opacity: 1;
      }
      100% {
        transform: translateX(var(--coin-travel, 140px)) translateY(1px) scale(0.35);
        opacity: 0;
      }
    }

    @keyframes scorePop {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.18);
        color: var(--accent);
      }
      100% {
        transform: scale(1);
      }
    }

    .ranking {
      margin: 0 0 14px;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }

    .ranking li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid rgba(246, 239, 217, 0.12);
      padding: 6px 0;
    }

    .ranking .rank-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ranking .rank-avatar {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 2px solid rgba(246, 239, 217, 0.32);
      border-radius: 50%;
      background: rgba(246, 239, 217, 0.1) center / cover no-repeat;
      color: var(--accent);
      font-size: 13px;
      font-weight: 950;
    }

    .ranking .rank-name {
      overflow: hidden;
      color: var(--ink);
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ranking .rank-number {
      min-width: 22px;
      color: var(--muted);
      font-weight: 900;
      text-align: center;
    }

    .ranking .rank-score {
      flex: 0 0 auto;
      color: var(--ink);
      font-weight: 950;
    }

    .ranking li.current {
      margin: 4px -8px;
      padding: 8px;
      border: 1px solid rgba(123, 238, 255, 0.35);
      border-radius: 8px;
      background: rgba(123, 238, 255, 0.12);
      box-shadow: 0 0 18px rgba(123, 238, 255, 0.08);
    }

    button {
      appearance: none;
      min-height: 44px;
      padding: 10px 18px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #1b1710;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
    }

    .menu-actions {
      display: grid;
      gap: 10px;
    }

    .menu-actions button {
      width: 100%;
      min-height: 54px;
      border: 2px solid rgba(246, 239, 217, 0.72);
      border-radius: 12px;
      box-shadow: 0 7px 0 rgba(70, 45, 0, 0.95), 0 15px 24px rgba(0,0,0,0.38);
      font-size: 22px;
      text-transform: uppercase;
    }

    .menu-actions button + button {
      background: #182231;
      color: var(--ink);
      box-shadow: 0 6px 0 rgba(0,0,0,0.92), 0 12px 20px rgba(0,0,0,0.32);
      font-size: 18px;
    }

    .score-entry {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 10px;
      margin: 0 0 14px;
      padding: 10px;
      border: 1px solid rgba(246, 239, 217, 0.14);
      border-radius: 8px;
      background: rgba(246, 239, 217, 0.06);
      text-align: left;
    }

    .score-entry[hidden] {
      display: none;
    }

    .entry-photo {
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(246, 239, 217, 0.35);
      border-radius: 50%;
      background: rgba(13, 15, 16, 0.74) center / cover no-repeat;
      color: var(--muted);
      font-weight: 900;
    }

    .entry-fields {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .entry-fields input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid rgba(246, 239, 217, 0.18);
      border-radius: 8px;
      background: rgba(8, 10, 12, 0.74);
      color: var(--ink);
      font: inherit;
      font-weight: 850;
    }

    .entry-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .entry-actions button {
      min-height: 36px;
      padding: 7px 8px;
      font-size: 13px;
    }

    .entry-fields small {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
    }

    #photoVideo {
      grid-column: 1 / -1;
      width: 100%;
      max-height: 160px;
      border-radius: 8px;
      background: #000;
      object-fit: cover;
    }

    .run-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      min-height: 34px;
    }

    .run-pill {
      min-width: 0;
      padding: 5px 6px;
      border: 1px solid rgba(246, 239, 217, 0.12);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .run-pill span {
      display: block;
      color: var(--muted);
      font-size: 8px;
      font-weight: 850;
      line-height: 1;
    }

    .run-pill strong {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      color: var(--ink);
      font-size: 11px;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .run-pill.active {
      border-color: rgba(123, 238, 255, 0.38);
      box-shadow: 0 0 16px rgba(123, 238, 255, 0.1);
    }

    .run-pill.ready strong,
    .run-pill.active strong {
      color: #7beeff;
    }

    .footer {
      min-height: 38px;
      display: grid;
      grid-template-columns: 1fr 96px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .slow-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(246, 239, 217, 0.1);
      overflow: hidden;
    }

    .slow-bar i {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--slow);
      border-radius: inherit;
      transition: width 0.08s linear, background-color 0.15s ease;
    }

    .slow-bar.boost i {
      background: var(--boost);
    }

    .slow-bar.slow i {
      background: var(--slow);
    }

    .slow-bar.pace i {
      background: linear-gradient(90deg, rgba(123, 238, 255, 0.55), rgba(240, 194, 71, 0.8));
    }

    @media (max-width: 430px), (max-height: 700px) {
      .app {
        gap: 5px;
        padding: calc(env(safe-area-inset-top, 0px) + 6px) 6px calc(env(safe-area-inset-bottom, 0px) + 6px);
      }

      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        min-height: 38px;
      }

      .hud h1 {
        display: none;
      }

      .stat {
        min-width: 0;
        padding: 5px 4px;
      }

      .stat span {
        font-size: 9px;
      }

      .stat strong {
        margin-top: 2px;
        font-size: 15px;
      }

      .move-controls {
        left: 12px;
        bottom: 12px;
        grid-template-columns: repeat(2, 40px);
        grid-template-rows: 40px;
        gap: 3px;
      }

      .jump-control {
        right: 12px;
        bottom: 12px;
      }

      .control-button {
        width: 40px;
        height: 40px;
        min-height: 40px;
      }

      .jump-control .control-button {
        width: 58px;
        height: 58px;
        min-height: 58px;
      }

      .footer {
        min-height: 28px;
        grid-template-columns: 1fr 76px;
        font-size: 10px;
      }

      .run-strip {
        gap: 4px;
        min-height: 30px;
      }

      .run-pill {
        padding: 4px 4px;
      }

      .run-pill span {
        font-size: 7px;
      }

      .run-pill strong {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hud">
      <h1>3レーンラン</h1>
      <div class="stat"><span id="scoreLabel">距離</span><strong id="distance">0</strong></div>
      <div class="stat"><span>ベスト</span><strong id="best">0</strong></div>
      <div class="stat"><span>コイン</span><strong id="todayRank">0</strong></div>
    </header>

    <section class="stage" id="stage">
      <canvas id="game" width="390" height="720"></canvas>
      <div class="move-controls" id="moveControls" aria-label="左右移動ボタン">
        <button class="control-button dir-left" id="leftButton" type="button" aria-label="左へ移動">&larr;</button>
        <button class="control-button dir-right" id="rightButton" type="button" aria-label="右へ移動">&rarr;</button>
      </div>
      <div class="jump-control" id="jumpControl" aria-label="ジャンプボタン">
        <button class="control-button" id="jumpButton" type="button">ジャンプ</button>
      </div>
      <div class="overlay show" id="overlay">
        <div class="dialog">
          <h2 id="overlayTitle">3レーンラン</h2>
          <p id="overlayText">左右でレーン移動、ジャンプで穴を回避。コインを集めながらどこまで走れるか挑戦できます。</p>
          <div class="conversion" id="scoreConvert" aria-hidden="true">
            <div class="convert-row">
              <div class="convert-box"><span>コイン</span><strong id="convertCoins">0</strong></div>
              <div class="convert-lane" id="convertLane"></div>
              <div class="convert-box" id="convertScoreBox"><span>スコア</span><strong id="convertScore">0</strong></div>
            </div>
          </div>
          <ol class="ranking" id="dailyRanking"></ol>
          <div class="score-entry" id="scoreEntry" hidden>
            <div class="entry-photo" id="photoPreview"><span>顔</span></div>
            <div class="entry-fields">
              <input id="playerName" type="text" maxlength="12" placeholder="名前">
              <div class="entry-actions">
                <button id="photoButton" type="button">写真</button>
                <button id="saveEntryButton" type="button">登録</button>
              </div>
              <small id="photoStatus">名前と写真はこの端末のランキングに保存されます</small>
            </div>
            <video id="photoVideo" playsinline muted hidden></video>
            <canvas id="photoCanvas" width="96" height="96" hidden></canvas>
          </div>
          <div class="menu-actions">
            <button id="startButton" type="button">スタート</button>
            <button id="rankingButton" type="button">ランキング</button>
          </div>
        </div>
      </div>
    </section>

    <div class="run-strip" aria-label="ラン状態">
      <div class="run-pill" id="timePill"><span>時間</span><strong id="timeStatus">0:00</strong></div>
      <div class="run-pill" id="effectPill"><span>状態</span><strong id="effectStatus">-</strong></div>
    </div>

    <footer class="footer">
      <span id="hint">2分目安。左右で移動、ジャンプで回避</span>
      <div class="slow-bar" aria-label="状態バー"><i id="slowFill"></i></div>
    </footer>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const stageEl = document.getElementById("stage");
    const scoreLabel = document.getElementById("scoreLabel");
    const distanceEl = document.getElementById("distance");
    const bestEl = document.getElementById("best");
    const todayRankEl = document.getElementById("todayRank");
    const hintEl = document.getElementById("hint");
    const slowFill = document.getElementById("slowFill");
    const timePill = document.getElementById("timePill");
    const timeStatus = document.getElementById("timeStatus");
    const effectPill = document.getElementById("effectPill");
    const effectStatus = document.getElementById("effectStatus");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const scoreConvert = document.getElementById("scoreConvert");
    const convertCoinsEl = document.getElementById("convertCoins");
    const convertLane = document.getElementById("convertLane");
    const convertScoreEl = document.getElementById("convertScore");
    const convertScoreBox = document.getElementById("convertScoreBox");
    const dailyRankingEl = document.getElementById("dailyRanking");
    const startButton = document.getElementById("startButton");
    const rankingButton = document.getElementById("rankingButton");
    const scoreEntry = document.getElementById("scoreEntry");
    const playerNameInput = document.getElementById("playerName");
    const photoButton = document.getElementById("photoButton");
    const saveEntryButton = document.getElementById("saveEntryButton");
    const photoPreview = document.getElementById("photoPreview");
    const photoStatus = document.getElementById("photoStatus");
    const photoVideo = document.getElementById("photoVideo");
    const photoCanvas = document.getElementById("photoCanvas");
    const leftButton = document.getElementById("leftButton");
    const rightButton = document.getElementById("rightButton");
    const jumpButton = document.getElementById("jumpButton");
    const ASSET_VERSION = "imagegen-6";
    const assetUrl = (path) => `${path}?v=${ASSET_VERSION}`;
    const playerRunSprites = ["0", "1", "2", "3"].map((frame) => {
      const image = new Image();
      image.src = assetUrl(`assets/character/imagegen-runner-${frame}.png`);
      image.addEventListener("load", draw);
      return image;
    });
    const playerSprite = playerRunSprites[0];
    const obstacleSprites = {
      car: new Image(),
      hole: new Image()
    };
    obstacleSprites.car.src = assetUrl("assets/obstacles/imagegen-car.png");
    obstacleSprites.hole.src = assetUrl("assets/obstacles/imagegen-hole.png");

    function startScoreConversion(baseScore, coinCount, finalScore, rank) {
      clearScoreConversion();
      scoreLabel.textContent = "\u30b9\u30b3\u30a2";
      let remainingCoins = coinCount;
      let shownScore = baseScore;
      distanceEl.textContent = String(shownScore);

      scoreConvert.classList.add("show");

      convertScoreEl.textContent = String(shownScore);
      if (remainingCoins <= 0) {
        overlayText.textContent = `${finalScore}点 / ${formatRunTime(runTime)} / ${Math.floor(distance)}m / Today #${rank}`;
        startButton.textContent = "タイトルへ";
        return;
      }

      scoreConvertInterval = setInterval(() => {
        flyResultCoin();
        remainingCoins -= 1;
        shownScore += COIN_VALUE;
        distanceEl.textContent = String(shownScore);
        todayRankEl.textContent = String(Math.max(0, remainingCoins));
        convertCoinsEl.textContent = String(Math.max(0, remainingCoins));
        convertScoreEl.textContent = String(shownScore);
        convertScoreBox.classList.remove("pop");
        void convertScoreBox.offsetWidth;
        convertScoreBox.classList.add("pop");
        overlayText.textContent = `コイン換算中 残り${Math.max(0, remainingCoins)}枚`;
        if (remainingCoins <= 0) {

      const timedEffectActive = readyActive || lastChanceActive || boostActive || slowActive;
      const effectRatio = readyActive
          ? readyTimer / READY_GRACE_TIME
          : lastChanceActive
            ? lastChanceTimer / LAST_CHANCE_DURATION
            : boostActive
              ? boostTimer / BOOST_DURATION
              : slowActive
                ? slowTimer / SLOW_DURATION
                : Math.min(1, runTime / TWO_MINUTE_TARGET);
      slowFill.style.width = `${Math.min(100, effectRatio * 100)}%`;
      slowFill.parentElement.classList.toggle("boost", boostActive);
      slowFill.parentElement.classList.toggle("slow", (slowActive || lastChanceActive) && !boostActive);
      slowFill.parentElement.classList.toggle("pace", !timedEffectActive);

      scores.sort((a, b) => b.score - a.score || a.time - b.time);

      localStorage.setItem(todayKey(), JSON.stringify(trimmed));
      return {
        id: entry.id,
        rank: trimmed.findIndex((item) => item.id === entry.id) + 1 || trimmed.length
      };

        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"

    async function handlePhotoButton() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        photoStatus.textContent = "この表示方法ではカメラが使えません";
        return;
      }
      if (!cameraStream) {
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
          photoVideo.srcObject = cameraStream;
          photoVideo.hidden = false;
          await photoVideo.play();
          photoButton.textContent = "撮影";
          photoStatus.textContent = "もう一度押すと撮影します";
        } catch {
          photoStatus.textContent = "カメラ許可が必要です";
        }
        return;
      }

      const context = photoCanvas.getContext("2d");
      const size = 96;
      const videoW = photoVideo.videoWidth || size;
      const videoH = photoVideo.videoHeight || size;
      const sourceSize = Math.min(videoW, videoH);
      const sx = (videoW - sourceSize) / 2;
      const sy = (videoH - sourceSize) / 2;
      context.drawImage(photoVideo, sx, sy, sourceSize, sourceSize, 0, 0, size, size);
      capturedPhoto = photoCanvas.toDataURL("image/jpeg", 0.82);
      updatePhotoPreview(capturedPhoto);
      stopCamera();
      photoButton.textContent = "撮り直し";
      photoStatus.textContent = "写真を設定しました";
    }

    function startJump() {

    function vibrate(pattern) {
      if (typeof navigator === "undefined" || typeof navigator.vibrate !== "function") return;
      try {
        navigator.vibrate(pattern);
      } catch {
        // Vibration is optional feedback; ignore unsupported browser cases.
      }
    }
function spawnObstacle() {
      if (!hasObstacleClearance()) {
        spawnTimer = 0.35;
        return;
      }
      const difficulty = difficultyRatio();
      const canSpawnHole = runTime >= FIRST_HOLE_TIME;
      const type = canSpawnHole && Math.random() < 0.2 + difficulty * 0.16 ? "hole" : "car";
      if (type === "hole") {
        obstacles.push({ type, lanes: [0, 1, 2], y: -62, h: 52, group: "solo" });
        return;
      }

      const lane = runTime < FIRST_CENTER_BLOCK_TIME
        ? (Math.random() < 0.5 ? 0 : 2)
        : Math.floor(Math.random() * 3);
      const wide = runTime > WARMUP_DURATION && Math.random() < 0.1 + difficulty * 0.16;
      if (wide) {
        const left = chooseWideBlockLeft();
        obstacles.push({ type, lanes: [left, left + 1], y: -92, h: 82, group: "solo" });
      } else {
        obstacles.push({ type, lanes: [lane], y: -92, h: 82, group: "solo" });
      }
    }

    function chooseWideBlockLeft() {
      const options = [0, 1].filter((left) => {
        const openLane = left === 0 ? 2 : 0;
        return Math.abs(openLane - player.lane) <= 1;
      });
      return options.length ? options[Math.floor(Math.random() * options.length)] : Math.floor(Math.random() * 2);
    }

    function hasObstacleClearance() {
      const obstacleTop = -80;
      const obstacleBottom = -18;
      for (const obstacle of obstacles) {
        const currentTop = obstacle.y;
        const currentBottom = obstacle.y + obstacle.h;
        if (rangesTooClose(obstacleTop, obstacleBottom, currentTop, currentBottom, OBSTACLE_CLEARANCE)) {
          return false;
        }
      }
      for (const panel of speedPanels) {
        const panelTop = panel.y;
        const panelBottom = panel.y + panel.h;
        if (rangesTooClose(obstacleTop, obstacleBottom, panelTop, panelBottom, PANEL_CLEARANCE)) {
          return false;
        }
      }
      for (const gate of slowGates) {
        if (rangesTooClose(obstacleTop, obstacleBottom, gate.y, gate.y + gate.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      return true;
    }

    function spawnSlowGate() {
      if (!hasSlowGateClearance(-58, 34)) {
        slowGateTimer = 0.75;
        return;
      }
      slowGates.push({ y: -58, h: 34, forced: false });
    }

    function spawnStarterCoins() {
      for (let i = 0; i < STARTER_COIN_TRAIL; i += 1) {
        coinItems.push({ lane: CENTER_LANE, y: PLAYER_Y - 180 - i * 40, r: COIN_RADIUS, collected: false, bonus: true });
      }
    }

function spawnCoins() {
      if (!hasCoinClearance()) {
        coinTimer = 0.5;
        return;
      }

      const lane = Math.floor(Math.random() * 3);
      const count = 2 + Math.floor(Math.random() * 3);
      const stagger = Math.random() < 0.35;
      for (let i = 0; i < count; i += 1) {
        const nextLane = stagger ? Math.max(0, Math.min(2, lane + (i % 2 === 0 ? 0 : (lane === 2 ? -1 : 1)))) : lane;
        coinItems.push({ lane: nextLane, y: -42 - i * 34, r: COIN_RADIUS, collected: false });
      }
    }

    function hasCoinClearance() {
      const coinTop = -150;
      const coinBottom = -22;
      for (const obstacle of obstacles) {
        const obstacleTop = obstacle.y;
        const obstacleBottom = obstacle.y + obstacle.h;
        if (rangesTooClose(coinTop, coinBottom, obstacleTop, obstacleBottom, 80)) {
          return false;
        }
      }
      for (const gate of slowGates) {
        if (rangesTooClose(coinTop, coinBottom, gate.y, gate.y + gate.h, 70)) {
          return false;
        }
      }
      return true;
    }

    function spawnSpeedPanel() {
      if (!hasPanelClearance()) {
        panelTimer = 0.45;
        return;
      }
      if (Math.random() < 0.28) {
        const y = -72;
        const groupId = `boost-${Date.now()}-${Math.random()}`;
        for (let lane = 0; lane < 3; lane += 1) {
          speedPanels.push({ lane, kind: "up", y, h: 58, used: false, group: "tripleBoost", groupId });
        }
        return;
      }
      const lane = Math.floor(Math.random() * 3);
      const kind = Math.random() < 0.46 ? "up" : "down";
      speedPanels.push({ lane, kind, y: -72, h: 58, used: false, group: "solo", groupId: "" });
    }

    function hasPanelClearance() {
      const panelTop = -72;
      const panelBottom = panelTop + 58;
      for (const gate of slowGates) {
        if (rangesTooClose(panelTop, panelBottom, gate.y, gate.y + gate.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      for (const obstacle of obstacles) {
        const obstacleTop = obstacle.y;
        const obstacleBottom = obstacle.y + obstacle.h;
        if (rangesTooClose(panelTop, panelBottom, obstacleTop, obstacleBottom, PANEL_CLEARANCE)) {
          return false;
        }
      }
      return true;
    }

    function hasSlowGateClearance(gateY, gateH) {
      const gateTop = gateY;
      const gateBottom = gateY + gateH;
      const blockers = [...obstacles, ...speedPanels];
      for (const item of blockers) {
        if (rangesTooClose(gateTop, gateBottom, item.y, item.y + item.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      return true;
    }

    function rangesTooClose(aTop, aBottom, bTop, bBottom, clearance) {
      return aTop < bBottom + clearance && aBottom + clearance > bTop;
    }

    function difficultyRatio() {
      return Math.max(0, Math.min(1, (runTime - WARMUP_DURATION) / (FULL_DIFFICULTY_TIME - WARMUP_DURATION)));
    }

    function checkDistanceCheckpoint() {
      while (distance >= checkpointIndex * CHECKPOINT_DISTANCE) {
        awardCheckpoint(checkpointIndex);
        checkpointIndex += 1;
      }
    }

    function awardCheckpoint(index) {
      const milestone = index * CHECKPOINT_DISTANCE;
      spawnCheckpointCoinTrail(index);
      coinTimer = Math.min(coinTimer, 0.35);
      hintEl.textContent = `${milestone}m到達！ コイン出現`;
    }

    function spawnCheckpointCoinTrail(index) {
      const direction = index % 2 === 0 ? -1 : 1;
      const sideLane = Math.max(0, Math.min(2, player.lane + direction));
      for (let i = 0; i < CHECKPOINT_COIN_TRAIL; i += 1) {
        const lane = i % 2 === 0 ? player.lane : sideLane;
        coinItems.push({ lane, y: PLAYER_Y - 220 - i * 40, r: COIN_RADIUS, collected: false, bonus: true });
      }
    }

    function update(dt) {
      if (!running) return;
      runTime += dt;
      const rawSpeed = Math.min(MAX_SPEED, BASE_SPEED + distance * SPEED_GAIN * BASE_SPEED);
      slowTimer = Math.max(0, slowTimer - dt);
      boostTimer = Math.max(0, boostTimer - dt);
      readyTimer = Math.max(0, readyTimer - dt);
      lastChanceTimer = Math.max(0, lastChanceTimer - dt);
      if (lastChanceTarget && !obstacles.includes(lastChanceTarget)) {
        lastChanceTarget = null;
        lastChanceTimer = 0;
      }
      speed = rawSpeed;
      if (boostTimer > 0) speed *= BOOST_FACTOR;
      if (slowTimer > 0) speed *= SLOW_FACTOR;
      if (lastChanceTimer > 0) speed *= LAST_CHANCE_SPEED_FACTOR;
      const bufferedJump = jumpBufferTimer > 0;
      jumpBufferTimer = Math.max(0, jumpBufferTimer - dt);
      jumpTimer = Math.max(0, jumpTimer - dt);
      if (jumpTimer <= 0 && bufferedJump) startJump();
      distance += (speed * dt) / 12;
      checkDistanceCheckpoint();
      checkPlayTimeTarget();
      roadScroll = (roadScroll + speed * dt) % 80;
      loopScroll += speed * dt;
      const targetX = LANES[player.lane];
      player.x += (targetX - player.x) * Math.min(1, dt * 14);
      player.holdTimer = Math.max(0, player.holdTimer - dt);

      {
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnObstacle();
          const rate = speed / BASE_SPEED;
          const difficulty = difficultyRatio();
          const warmupSpace = runTime < WARMUP_DURATION ? 0.42 : 0;
          spawnTimer = Math.max(0.78, 1.36 + warmupSpace - difficulty * 0.24 - rate * 0.05 + Math.random() * 0.48);
        }

        coinTimer -= dt;
        if (coinTimer <= 0) {
          spawnCoins();
          coinTimer = 1.55 + Math.random() * 1.35;
        }

        slowGateTimer -= dt;
        if (slowGateTimer <= 0) {
          spawnSlowGate();
          slowGateTimer = 6.4 + Math.random() * 3.2;
        }

        panelTimer -= dt;
        if (panelTimer <= 0) {
          spawnSpeedPanel();
          panelTimer = 3.2 + Math.random() * 2.4;
        }
      }

      for (const obstacle of obstacles) {
        obstacle.y += speed * dt;
      }
      awardPassedObstacles();
      obstacles = obstacles.filter((obstacle) => obstacle.y < H + 90);

      for (const coin of coinItems) {
        coin.y += speed * dt;
      }
      coinItems = coinItems.filter((coin) => coin.y < H + 40 && !coin.collected);

      for (const gate of slowGates) {
        gate.y += speed * dt;
      }
      slowGates = slowGates.filter((gate) => gate.y < H + 70);

      for (const panel of speedPanels) {
        panel.y += speed * dt;
      }
      speedPanels = speedPanels.filter((panel) => panel.y < H + 80 && !panel.used);

      updateParticles(dt);
      checkCollisions();
      updateHud();
    }

    function awardPassedObstacles() {
      for (const obstacle of obstacles) {
        if (obstacle.scored || readyTimer > 0 || !laneObjectPassed(obstacle)) continue;
        if (obstacle === lastChanceTarget && !lastChanceAvoided(obstacle)) {
          lastChanceTimer = 0;
          crash();
          return;
        }
        obstacle.scored = true;
        if (obstacle.type === "hole") {
          if (obstacle.lanes.includes(player.lane) && isJumping()) {
            burstParticles(LANES[player.lane], PLAYER_Y - 42, "#7beeff", 10, 0.75);
          }
          if (obstacle === lastChanceTarget) {
            awardLastChanceBonus(obstacle);
          }
          continue;
        }
        if (!obstacle.lanes.includes(player.lane)) {
          const clearX = LANES[player.lane];
          const clearY = PLAYER_Y - 34;
          burstParticles(clearX, clearY, obstacle.lanes.length > 1 ? "#f0c247" : "#7beeff", 8, 0.65);
          if (obstacle === lastChanceTarget) {
            awardLastChanceBonus(obstacle);
          }
        }
      }
    }

    function lastChanceAvoided(obstacle) {
      if (obstacle.type === "hole") {
        return !obstacle.lanes.includes(player.lane) || isJumping();
      }
      return !obstacle.lanes.includes(player.lane);
    }

    function triggerLastChance(obstacle) {
      if (obstacle.lastChanceUsed) return false;
      obstacle.lastChanceUsed = true;
      lastChanceTarget = obstacle;
      lastChanceTimer = LAST_CHANCE_DURATION;
      hintEl.textContent = "ラストチャンス！";
      return true;
    }

    function shouldHoldCrashForLastChance(obstacle) {
      if (lastChanceTarget === obstacle && lastChanceTimer > 0) return true;
      return triggerLastChance(obstacle);
    }

    function awardLastChanceBonus(obstacle) {
      lastChanceTarget = null;
      lastChanceTimer = 0;
      hintEl.textContent = "ギリギリ回避！";
      obstacle.lastChanceAwarded = true;
    }

    function burstParticles(x, y, color, count = 8, spread = 1) {
      for (let i = 0; i < count; i += 1) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * spread;
        const speedOut = 42 + Math.random() * 78;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speedOut,
          vy: Math.sin(angle) * speedOut - 18,
          r: 2.4 + Math.random() * 2.8,
          life: 0.42 + Math.random() * 0.22,
          maxLife: 0.64,
          color
        });
      }
      if (particles.length > 90) {
        particles.splice(0, particles.length - 90);
      }
    }

    function updateParticles(dt) {
      for (const particle of particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 90 * dt;
        particle.life -= dt;
      }
      particles = particles.filter((particle) => particle.life > 0);
    }
function checkCollisions() {
      const p = playerRect();
      const hitP = shrinkRect(p, 5, 6);
      const feet = playerFootRect();
      if (readyTimer <= 0) {
        for (let obstacleIndex = obstacles.length - 1; obstacleIndex >= 0; obstacleIndex -= 1) {
          const obstacle = obstacles[obstacleIndex];
          if (laneObjectPassed(obstacle)) continue;
          if (obstacle.type === "hole") {
            if (isJumping()) continue;
            for (const lane of obstacle.lanes) {
              const o = shrinkRect(laneRect(lane, obstacle.y, obstacle.h), 9, 6);
              if (rectsOverlap(feet, o)) {
                if (shouldHoldCrashForLastChance(obstacle)) return;
                crash();
                return;
              }
            }
            continue;
          }
          for (const lane of obstacle.lanes) {
            const o = shrinkRect(laneRect(lane, obstacle.y, obstacle.h), 8, 7);
            if (rectsOverlap(hitP, o)) {
              if (shouldHoldCrashForLastChance(obstacle)) return;
              crash();
              return;
            }
          }
        }
      }

      for (let i = coinItems.length - 1; i >= 0; i -= 1) {
        const coin = coinItems[i];
        if (rectsOverlap(p, coinRect(coin))) {
          coins += 1;
          coin.collected = true;
          coinItems.splice(i, 1);
          burstParticles(LANES[coin.lane], coin.y, coin.bonus ? "#7beeff" : "#f0c247", coin.bonus ? 12 : 8, 0.9);
          hintEl.textContent = `コイン +1 / ${coins}`;
        }
      }

      for (let i = slowGates.length - 1; i >= 0; i -= 1) {
        const gate = slowGates[i];
        const g = { x: 44, y: gate.y, w: W - 88, h: gate.h };
        if (rectsOverlap(p, g)) {
          slowTimer = SLOW_DURATION;
          boostTimer = 0;
          slowGates.splice(i, 1);
          burstParticles(W / 2, gate.y + gate.h / 2, "#65b7d8", 14, 1.1);
          hintEl.textContent = "強制スロー";
        }
      }

      for (let i = speedPanels.length - 1; i >= 0; i -= 1) {
        const panel = speedPanels[i];
        const r = panelRect(panel);
        if (rectsOverlap(feet, r)) {
          panel.used = true;
          if (panel.kind === "up") {
            boostTimer = BOOST_DURATION;
            slowTimer = 0;
            burstParticles(r.x + r.w / 2, r.y + r.h / 2, "#7beeff", 12, 0.9);
            hintEl.textContent = "スピードアップ";
          } else {
            slowTimer = SLOW_DURATION;
            boostTimer = 0;
            burstParticles(r.x + r.w / 2, r.y + r.h / 2, "#65b7d8", 12, 0.9);
            hintEl.textContent = "スピードダウン";
          }
          if (panel.group === "tripleBoost") {
            speedPanels = speedPanels.filter((item) => item.groupId !== panel.groupId);
          } else {
            speedPanels.splice(i, 1);
          }
          break;
        }
      }
    }

    function crash() {
      endGame();
    }
function playerRect() {
      const collisionX = LANES[player.lane];
      return {
        x: collisionX - PLAYER_W / 2,
        y: PLAYER_Y - PLAYER_H / 2,
        w: PLAYER_W,
        h: PLAYER_H
      };
    }

    function playerFootRect() {
      const collisionX = LANES[player.lane];
      return {
        x: collisionX - PLAYER_W * 0.28,
        y: PLAYER_Y + PLAYER_H / 2 - 10,
        w: PLAYER_W * 0.56,
        h: 12
      };
    }

    function laneRect(lane, y, h) {
      return {
        x: LANES[lane] - 34,
        y,
        w: 68,
        h
      };
    }

    function panelRect(panel) {
      return {
        x: LANES[panel.lane] - 36,
        y: panel.y,
        w: 72,
        h: panel.h
      };
    }

    function coinRect(coin) {
      return {
        x: LANES[coin.lane] - coin.r,
        y: coin.y - coin.r,
        w: coin.r * 2,
        h: coin.r * 2
      };
    }
function isJumping() {
      return jumpTimer > 0;
    }
function jumpLift() {
      if (!isJumping()) return 0;
      const t = 1 - jumpTimer / JUMP_DURATION;
      return Math.sin(t * Math.PI) * 46;
    }

    function playerCurvePose() {
      return {
        x: player.x,
        y: PLAYER_Y + PLAYER_H / 2,
        angle: 0,
        scale: 1
      };
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function shrinkRect(rect, insetX, insetY) {
      return {
        x: rect.x + insetX,
        y: rect.y + insetY,
        w: Math.max(1, rect.w - insetX * 2),
        h: Math.max(1, rect.h - insetY * 2)
      };
    }

    function laneObjectPassed(object) {
      return object.y > PLAYER_Y + PLAYER_H / 2 - 8;
    }

function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#1f2b31";
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      drawRoad();
      drawDangerHints();
      drawSafeLaneGuide();
      drawSpeedPanels();
      drawCoins();
      drawSlowGates();
      drawObstacles();
      drawParticles();
      if (readyTimer > 0) drawReadyGuide();
      drawPlayer();
      if (lastChanceTimer > 0) drawLastChancePulse();
      ctx.restore();
    }
function drawRoad() {
      if (imageReady(backgroundSprites.laneLoop)) {
        if (isImagegenAsset(backgroundSprites.laneLoop)) {
          drawCoverImage(backgroundSprites.laneLoop, 0, 0, W, H, 0.5, 0.5);
          drawImagegenRoadMotion();
        } else {
          drawVerticalLoopImage(backgroundSprites.laneLoop, loopScroll, 0, 0, W, H);
        }
        drawLoopVignette();
        return;
      }

      if (imageReady(backgroundSprites.laneBg) && imageReady(backgroundSprites.laneRoad)) {
        drawCoverImage(backgroundSprites.laneBg, 0, 0, W, H);
        drawLaneSceneryFlow();
        drawLaneRoadImage();
        drawLaneFlowOverlay();
        ctx.fillStyle = "rgba(6, 16, 18, 0.12)";
        ctx.fillRect(0, 0, W, H);
        return;
      }

      drawFallbackRoad();
    }

function drawRouteScenery() {
      const offset = ((roadScroll * 0.32) % 170 + 170) % 170;
      ctx.save();
      ctx.globalAlpha = 0.7;
      for (let y = -offset - 80; y < H + 170; y += 170) {
        drawLeafCluster(22, y + 30, 1);
        drawLeafCluster(W - 22, y + 104, -1);
        drawLeafCluster(76, y + 152, -1);
        drawLeafCluster(W - 78, y + 16, 1);
      }
      ctx.restore();
    }

function drawFallbackRoad() {
      ctx.fillStyle = "#182025";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#273038";
      ctx.fillRect(44, 0, W - 88, H);
      ctx.strokeStyle = "#53606a";
      ctx.lineWidth = 2;
      ctx.setLineDash([18, 24]);
      for (let i = 1; i < 3; i += 1) {
        const x = (LANES[i - 1] + LANES[i]) / 2;
        ctx.beginPath();
        ctx.moveTo(x, -80 + roadScroll);
        ctx.lineTo(x, H + 80);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(246,239,217,0.16)";
      for (let y = -roadScroll; y < H; y += 80) {
        ctx.fillRect(52, y, W - 104, 3);
      }
    }

    function imageReady(image) {
      return image.complete && image.naturalWidth > 0;
    }

    function isImagegenAsset(image) {
      return image && typeof image.src === "string" && image.src.includes("/imagegen-");
    }

    function drawImagegenRoadMotion() {
      const offset = ((loopScroll * 1.2) % 120 + 120) % 120;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = "rgba(165, 245, 255, 0.22)";
      for (let y = -120 + offset; y < H + 80; y += 120) {
        ctx.fillRect(116, y, 8, 34);
        ctx.fillRect(266, y + 52, 8, 34);
      }
      ctx.fillStyle = "rgba(255, 214, 107, 0.20)";
      for (let y = -80 + offset * 0.8; y < H + 80; y += 160) {
        ctx.fillRect(60, y, 12, 38);
        ctx.fillRect(318, y + 76, 12, 38);
      }
      ctx.restore();
    }

    function drawCoverImage(image, x, y, w, h, focusX = 0.5, focusY = 0.5) {
      const scale = Math.max(w / image.naturalWidth, h / image.naturalHeight);
      const sourceW = w / scale;
      const sourceH = h / scale;
      const sourceX = Math.max(0, Math.min(image.naturalWidth - sourceW, image.naturalWidth * focusX - sourceW / 2));
      const sourceY = Math.max(0, Math.min(image.naturalHeight - sourceH, image.naturalHeight * focusY - sourceH / 2));
      ctx.drawImage(image, sourceX, sourceY, sourceW, sourceH, x, y, w, h);
    }

    function drawVerticalLoopImage(image, scroll, x, y, w, h) {
      const offset = ((scroll % h) + h) % h;
      drawCoverImage(image, x, y + offset - h, w, h);
      drawCoverImage(image, x, y + offset, w, h);
    }

    function drawHorizontalLoopImage(image, scroll, x, y, w, h) {
      const offset = ((scroll % w) + w) % w;
      drawCoverImage(image, x - offset, y, w, h);
      drawCoverImage(image, x - offset + w, y, w, h);
    }

    function drawLoopVignette() {
      const edgeGradient = ctx.createLinearGradient(0, 0, W, 0);
      edgeGradient.addColorStop(0, "rgba(0,0,0,0.2)");
      edgeGradient.addColorStop(0.18, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(0.82, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(1, "rgba(0,0,0,0.2)");
      ctx.fillStyle = edgeGradient;
      ctx.fillRect(0, 0, W, H);

    function drawLaneRoadImage() {
      const roadX = 44;
      const roadW = W - 88;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.28)";
      ctx.shadowBlur = 16;
      ctx.shadowOffsetX = 0;

    function drawLaneFlowOverlay() {
      const roadX = 44;
      const roadW = W - 88;
      const offset = ((roadScroll * 1.15) % 86 + 86) % 86;

      ctx.save();
      ctx.beginPath();
      ctx.rect(roadX, 0, roadW, H);

      ctx.strokeStyle = "rgba(255,247,218,0.58)";

      ctx.setLineDash([32, 42]);

      for (let i = 1; i < 3; i += 1) {
        const x = (LANES[i - 1] + LANES[i]) / 2;
        ctx.beginPath();
        ctx.moveTo(x, -90);
        ctx.lineTo(x, H + 90);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(255,255,255,0.16)";
      for (let y = -offset; y < H + 90; y += 86) {
        ctx.fillRect(roadX + 16, y + 10, roadW - 32, 3);
        ctx.fillRect(roadX + 58, y + 45, roadW - 116, 2);
      }

      const edgeGradient = ctx.createLinearGradient(roadX, 0, roadX + roadW, 0);
      edgeGradient.addColorStop(0, "rgba(0,0,0,0.22)");
      edgeGradient.addColorStop(0.16, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(0.84, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(1, "rgba(0,0,0,0.22)");
      ctx.fillStyle = edgeGradient;

    }

    function drawLaneSceneryFlow() {
      const offset = ((roadScroll * 0.38) % 170 + 170) % 170;
      ctx.save();
      ctx.globalAlpha = 0.55;
      for (let y = -offset - 80; y < H + 170; y += 170) {
        drawLeafCluster(24, y + 24, 1);
        drawLeafCluster(W - 24, y + 105, -1);
        drawLampGlow(16, y + 92);
        drawLampGlow(W - 16, y + 8);

    function drawLeafCluster(x, y, direction) {
      ctx.fillStyle = "rgba(88, 167, 87, 0.5)";
      ctx.beginPath();
      ctx.ellipse(x, y, 18, 9, 0.45 * direction, 0, Math.PI * 2);
      ctx.ellipse(x + 10 * direction, y + 14, 15, 8, -0.35 * direction, 0, Math.PI * 2);
      ctx.ellipse(x - 6 * direction, y + 26, 12, 7, 0.2 * direction, 0, Math.PI * 2);

    function drawLampGlow(x, y) {
      const glow = ctx.createRadialGradient(x, y, 2, x, y, 26);

    }

    function drawDangerHints() {
      ctx.save();
      for (const obstacle of obstacles) {
        if (obstacle.type === "hole") {
          if (obstacle.y < 72 || obstacle.y > PLAYER_Y - 88) continue;
          const pulse = 0.72 + Math.sin(loopScroll * 0.08) * 0.18;
          ctx.globalAlpha = pulse;
          drawJumpCue(W / 2, obstacle.y - 24, 1 + (1 - pulse) * 0.08);
          continue;
        }
        if (obstacle.y < 40 || obstacle.y > PLAYER_Y - 96) continue;
        const urgency = 1 - Math.max(0, Math.min(1, (PLAYER_Y - 96 - obstacle.y) / 440));
        ctx.globalAlpha = 0.28 + urgency * 0.26;
        for (const lane of obstacle.lanes) {
          const x = LANES[lane];
          const top = Math.max(0, obstacle.y - 18);
          const bottom = Math.min(H, obstacle.y + obstacle.h + 18);
          const gradient = ctx.createLinearGradient(0, top, 0, bottom);
          gradient.addColorStop(0, "rgba(221, 102, 85, 0)");
          gradient.addColorStop(0.5, "rgba(221, 102, 85, 0.82)");
          gradient.addColorStop(1, "rgba(221, 102, 85, 0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(x - 36, top, 72, bottom - top);
          ctx.strokeStyle = "rgba(246, 239, 217, 0.7)";
          ctx.lineWidth = 2;
          ctx.strokeRect(x - 36, top, 72, bottom - top);
        }
      }
      ctx.restore();
    }

    function drawJumpCue(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 42);
      glow.addColorStop(0, "rgba(240,194,71,0.32)");
      glow.addColorStop(1, "rgba(240,194,71,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(-46, -46, 92, 92);
      ctx.strokeStyle = "rgba(246,239,217,0.86)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, 24, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(240,194,71,0.96)";
      ctx.beginPath();
      ctx.moveTo(0, -23);
      ctx.lineTo(17, -3);
      ctx.lineTo(7, -3);
      ctx.lineTo(7, 17);
      ctx.lineTo(-7, 17);
      ctx.lineTo(-7, -3);
      ctx.lineTo(-17, -3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawReadyGuide() {
      const ratio = Math.max(0, Math.min(1, readyTimer / READY_GRACE_TIME));
      const pulse = 0.68 + Math.sin(loopScroll * 0.1) * 0.18;
      const guideY = PLAYER_Y - 30;
      ctx.save();
      ctx.globalAlpha = Math.min(0.8, 0.34 + ratio * 0.36);
      ctx.strokeStyle = `rgba(123, 238, 255, ${pulse})`;
      ctx.fillStyle = "rgba(123, 238, 255, 0.2)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(LANES[player.lane], PLAYER_Y - 28, 48 + (1 - ratio) * 10, 28 + (1 - ratio) * 4, 0, 0, Math.PI * 2);
      ctx.stroke();

      for (const lane of [0, 2]) {
        const x = LANES[lane];
        const direction = lane === 0 ? -1 : 1;
        ctx.beginPath();
        ctx.moveTo(x - 16 * direction, guideY - 10);
        ctx.lineTo(x + 15 * direction, guideY);
        ctx.lineTo(x - 16 * direction, guideY + 10);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(LANES[CENTER_LANE] + 18 * direction, guideY);
        ctx.lineTo(x - 10 * direction, guideY);
        ctx.stroke();
      }
      ctx.restore();
    }

    function upcomingCarThreat() {
      let best = null;
      for (const obstacle of obstacles) {
        if (obstacle.type === "hole") continue;
        if (obstacle.y < 48 || obstacle.y > PLAYER_Y - 80) continue;
        const distanceToPlayer = PLAYER_Y - obstacle.y;
        if (distanceToPlayer > SAFE_GUIDE_RANGE) continue;
        if (!best || obstacle.y > best.y) best = obstacle;
      }
      return best;
    }

    function safeLanesFor(obstacle) {
      if (!obstacle) return [];
      return [0, 1, 2].filter((lane) => !obstacle.lanes.includes(lane));
    }

    function drawSafeLaneGuide() {
      const threat = upcomingCarThreat();
      const safeLanes = safeLanesFor(threat);
      if (!safeLanes.length) return;
      const urgency = 1 - Math.max(0, Math.min(1, (PLAYER_Y - threat.y - 80) / SAFE_GUIDE_RANGE));
      const alpha = 0.22 + urgency * 0.34;
      const guideY = PLAYER_Y + 42;
      ctx.save();
      ctx.globalAlpha = alpha;
      for (const lane of safeLanes) {
        const x = LANES[lane];
        const gradient = ctx.createLinearGradient(x - 34, 0, x + 34, 0);
        gradient.addColorStop(0, "rgba(123,238,255,0)");
        gradient.addColorStop(0.5, "rgba(123,238,255,0.9)");
        gradient.addColorStop(1, "rgba(123,238,255,0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(x - 34, guideY - 3, 68, 6);
        ctx.strokeStyle = "rgba(246,239,217,0.86)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x - 13, guideY + 11);
        ctx.lineTo(x, guideY + 22);
        ctx.lineTo(x + 13, guideY + 11);
        ctx.stroke();
      }
      ctx.restore();
    }
function drawObstacles() {
      for (const obstacle of obstacles) {
        for (const lane of obstacle.lanes) {
          const r = laneRect(lane, obstacle.y, obstacle.h);
          if (obstacle.type === "hole") {
            drawObstacleSprite("hole", r);
            if (obstacle.group === "mixed") {
              ctx.fillStyle = "rgba(246,239,217,0.85)";
              ctx.fillRect(r.x + 25, r.y + 2, 18, 5);
            }
          } else {
            drawObstacleSprite("car", r);
            if (obstacle.group === "mixed") {
              ctx.fillStyle = "rgba(246,239,217,0.72)";
              ctx.fillRect(r.x + 10, r.y + r.h - 12, r.w - 20, 5);
            }
          }
        }
      }
    }

    function drawObstacleSprite(type, rect) {
      const image = obstacleSprites[type];
      if (image && image.complete && image.naturalWidth > 0) {
        ctx.drawImage(image, rect.x, rect.y, rect.w, rect.h);
        return;
      }
      if (type === "hole") {
        ctx.fillStyle = "#090c0f";
        ctx.beginPath();
        ctx.ellipse(rect.x + rect.w / 2, rect.y + rect.h / 2, rect.w * 0.42, rect.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#4b3026";
        ctx.beginPath();
        ctx.ellipse(rect.x + rect.w / 2, rect.y + rect.h / 2, rect.w * 0.48, rect.h * 0.48, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "rgba(246,239,217,0.18)";
        ctx.fillRect(rect.x + 21, rect.y + 8, rect.w - 42, 3);
      } else {
        ctx.fillStyle = "#dd6655";
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.fillStyle = "rgba(20,22,22,0.32)";
        ctx.fillRect(rect.x + 8, rect.y + 8, rect.w - 16, 8);
      }
    }

    function drawSpeedPanels() {
      for (const panel of speedPanels) {
        const r = panelRect(panel);
        const image = panel.kind === "up" ? gimmickSprites.boost : gimmickSprites.slow;
        if (imageReady(image)) {
          ctx.drawImage(image, r.x, r.y, r.w, r.h);
          continue;
        }
        ctx.fillStyle = panel.kind === "up" ? "rgba(240,194,71,0.58)" : "rgba(101,183,216,0.52)";
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.fillStyle = panel.kind === "up" ? "#f6efd9" : "#e8f8ff";
        ctx.font = "800 18px Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(panel.kind === "up" ? ">>" : "<<", r.x + r.w / 2, r.y + 35);
      }
    }

    function drawCoins() {
      for (const coin of coinItems) {
        const x = LANES[coin.lane];
        const y = coin.y;
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.ellipse(x + 2, y + 4, COIN_RADIUS, COIN_RADIUS * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        if (coin.bonus) {
          ctx.strokeStyle = "rgba(123,238,255,0.68)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, COIN_RADIUS + 5, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.fillStyle = "#f0c247";
        ctx.beginPath();
        ctx.arc(x, y, COIN_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#f6efd9";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, COIN_RADIUS - 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawSlowGates() {
      for (const gate of slowGates) {
        for (let lane = 0; lane < 3; lane += 1) {
          const r = {
            x: LANES[lane] - 36,
            y: gate.y,
            w: 72,
            h: gate.h
          };
          if (imageReady(gimmickSprites.slowGate)) {
            ctx.drawImage(gimmickSprites.slowGate, r.x, r.y, r.w, r.h);
            continue;
          }
          ctx.fillStyle = "rgba(101,183,216,0.34)";
          ctx.fillRect(r.x, r.y, r.w, r.h);
          ctx.strokeStyle = "#aee6ff";
          ctx.lineWidth = 2;
          ctx.strokeRect(r.x, r.y, r.w, r.h);
        }
      }
    }

    function drawParticles() {
      if (!particles.length) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (const particle of particles) {
        const alpha = Math.max(0, Math.min(1, particle.life / particle.maxLife));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.r * (0.75 + alpha * 0.45), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlayer() {
      const r = playerRect();
      const pose = playerCurvePose();
      const lift = jumpLift();
      const runPhase = roadScroll * 0.16;
      const bob = isJumping() ? 0 : Math.sin(runPhase) * 3;
      const lean = pose.angle + (isJumping() ? 0 : Math.sin(runPhase) * 0.07);
      const spriteW = 64;
      const spriteH = 84;
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.save();
      ctx.translate(pose.x, pose.y - lift + bob);
      ctx.rotate(pose.angle);
      ctx.scale(pose.scale, pose.scale);
      ctx.fillRect(-PLAYER_W / 2 + 5, -5, PLAYER_W - 10, isJumping() ? 5 : 8);
      ctx.restore();
      if (player.holdTimer > 0) {
        const ratio = Math.max(0, Math.min(1, player.holdTimer / 0.22));
        ctx.save();
        ctx.translate(pose.x, pose.y - lift + bob - 8);
        ctx.globalAlpha = 0.22 + ratio * 0.42;
        ctx.strokeStyle = "rgba(123,238,255,0.92)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, 48 - ratio * 10, 16 - ratio * 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.12 + ratio * 0.14;
        ctx.fillStyle = "#7beeff";
        ctx.beginPath();
        ctx.ellipse(0, 0, 54 - ratio * 10, 18 - ratio * 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const runFrame = playerRunSprites[Math.floor(roadScroll / 20) % playerRunSprites.length];
      const activePlayerSprite = isJumping() ? playerSprite : runFrame;
      if (activePlayerSprite && activePlayerSprite.complete && activePlayerSprite.naturalWidth > 0) {
        ctx.save();
        ctx.translate(pose.x, pose.y - lift + bob);
        ctx.rotate(lean);
        const jumpScale = isJumping() ? 1.05 : 1;
        ctx.scale(jumpScale * pose.scale, jumpScale * pose.scale);
        ctx.drawImage(activePlayerSprite, -spriteW / 2, -spriteH, spriteW, spriteH);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(pose.x, pose.y - lift);
        ctx.rotate(pose.angle);
        ctx.scale(pose.scale, pose.scale);
        ctx.fillStyle = "#f0c247";
        ctx.fillRect(-PLAYER_W / 2, -PLAYER_H, r.w, r.h);
        ctx.fillStyle = "#f6efd9";
        ctx.fillRect(PLAYER_W / 2 - 15, -PLAYER_H + 12, 7, 7);
        ctx.fillStyle = "#8c672a";
        ctx.fillRect(-PLAYER_W / 2 + 8, -10, 10, 10);
        ctx.fillRect(PLAYER_W / 2 - 18, -10, 10, 10);
        ctx.restore();
      }

      if (player.lane !== CENTER_LANE) {
        ctx.strokeStyle = "rgba(240,194,71,0.9)";
        ctx.lineWidth = 3;
        ctx.strokeRect(LANES[player.lane] - 39, PLAYER_Y - 36, 78, 72);
      }
    }

    function roundedRectPath(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
    }

    function drawLastChancePulse() {
      const ratio = Math.max(0, Math.min(1, lastChanceTimer / LAST_CHANCE_DURATION));
      const pulse = 0.35 + Math.sin(loopScroll * 0.22) * 0.12;
      const strokeAlpha = Math.min(0.95, 0.55 + pulse);
      ctx.save();
      ctx.globalAlpha = 0.45 + ratio * 0.35;
      ctx.strokeStyle = `rgba(123, 238, 255, ${strokeAlpha})`;
      ctx.lineWidth = 5;
      ctx.strokeRect(8, 8, W - 16, H - 16);
      ctx.fillStyle = "rgba(123, 238, 255, 0.12)";
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const left = rect.left || 0;
      const top = rect.top || 0;
      return {
        x: event.clientX - left,
        y: event.clientY - top,
        w: rect.width || canvas.clientWidth || W,
        h: rect.height || canvas.clientHeight || H
      };
    }

    function canTapJumpFrom(event) {
      const point = canvasPoint(event);
      return point.y < point.h - TAP_JUMP_BOTTOM_DEAD_ZONE;
    }

function onPointerDown(event) {
      touchStart = { x: event.clientX, y: event.clientY, id: event.pointerId, canTapJump: canTapJumpFrom(event) };
    }

    function onPointerUp(event) {
      if (!touchStart) return;
      const start = touchStart;
      const dx = event.clientX - start.x;
      const dy = event.clientY - start.y;
      touchStart = null;
      if (Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy)) {
        handleScreenDirection(dx, dy);
        return;
      }
      if (start.canTapJump && canTapJumpFrom(event) && Math.abs(dx) < 24 && Math.abs(dy) < 24) {
        jump();
      }
    }

    function onControlButton(event, action) {
      event.preventDefault();
      event.stopPropagation();
      action();
    }

    function handleScreenDirection(dx, dy) {
      if (Math.abs(dx) >= Math.abs(dy)) {
        moveSide(dx < 0 ? -1 : 1);
      }
    }

    function resultAdvanceRequested() {
      return overlayMode === "result" && !running && overlay.classList.contains("show");
    }

    function onOverlayPointerUp(event) {
      if (!resultAdvanceRequested()) return;
      if (event.target.closest("button")) return;
      event.preventDefault();
      handleMainButton();
    }

    function onKeyDown(event) {
      if (event.repeat) return;
      if ((event.code === "Space" || event.code === "Enter" || event.code === "KeyR") && resultAdvanceRequested()) {
        event.preventDefault();
        handleMainButton();
        return;
      }
      if (event.code === "ArrowUp" || event.code === "Space") {
        event.preventDefault();
        jump();
      }
      if (event.code === "ArrowLeft") {
        event.preventDefault();
        handleScreenDirection(-1, 0);
      }
      if (event.code === "ArrowRight") {
        event.preventDefault();
        handleScreenDirection(1, 0);
      }
    }

    function startLoop() {
      if (loopActive) return;
      loopActive = true;
      requestAnimationFrame(loop);
    }

    function loop(now) {
      if (!loopActive) return;
      const elapsed = now - lastTime + frameCarry;
      if (elapsed < FRAME_MS) {
        requestAnimationFrame(loop);
        return;
      }
      const dt = Math.min(0.05, elapsed / 1000 || 0);
      frameCarry = elapsed % FRAME_MS;
      lastTime = now;
      if (running) {
        update(dt);
      } else {
        roadScroll = (roadScroll + BASE_SPEED * 0.42 * dt) % 80;
        loopScroll += BASE_SPEED * 0.42 * dt;
        updateParticles(dt);
      }
      draw();
      requestAnimationFrame(loop);
    }

    startButton.addEventListener("click", handleMainButton);
    rankingButton.addEventListener("click", showRankingScreen);
    photoButton.addEventListener("click", handlePhotoButton);
    saveEntryButton.addEventListener("click", saveEntryProfile);
    overlay.addEventListener("pointerup", onOverlayPointerUp);
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", () => {
      touchStart = null;
    });
    leftButton.addEventListener("pointerdown", (event) => onControlButton(event, () => handleScreenDirection(-1, 0)));
    rightButton.addEventListener("pointerdown", (event) => onControlButton(event, () => handleScreenDirection(1, 0)));
    jumpButton.addEventListener("pointerdown", (event) => onControlButton(event, jump));
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("resize", resizeCanvas);

    bestEl.textContent = String(Math.floor(best));
    updateHud();
    resizeCanvas();
    showTitleScreen();
    draw();
    lastTime = performance.now();
    startLoop();
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>3レーン・スワイプラン</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --road: #273038;
      --road-line: #53606a;
      --ink: #f6efd9;
      --muted: #b8c1b2;
      --accent: #f0c247;
      --danger: #dd6655;
      --slow: #65b7d8;
      --boost: #f0c247;
      --panel: rgba(13, 15, 16, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: stretch center;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
      overflow: hidden;
    }

    .app {
      width: min(100vw, 430px);
      height: 100svh;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 8px calc(env(safe-area-inset-bottom, 0px) + 8px);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 8px;
      min-height: 46px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .stat {
      min-width: 74px;
      padding: 7px 8px;
      border: 1px solid rgba(246, 239, 217, 0.14);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 17px;
      line-height: 1;
    }

    .stage {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(246, 239, 217, 0.14);
      border-radius: 8px;
      overflow: hidden;
      background: var(--road);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
    }

    .move-stick {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: 104px;
      height: 104px;
      border: 2px solid rgba(246, 239, 217, 0.42);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(246,239,217,0.14), rgba(13,15,16,0.38));
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 2;
    }

    .stage.playing .move-stick {
      opacity: 1;
      pointer-events: auto;
    }

    .move-stick::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(246, 239, 217, 0.22);
      border-radius: 50%;
    }

    .stick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46px;
      height: 46px;
      border: 2px solid rgba(246, 239, 217, 0.72);
      border-radius: 50%;
      background: rgba(240, 194, 71, 0.82);
      box-shadow: 0 5px 14px rgba(0,0,0,0.32);
      transform: translate(-50%, -50%);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(10, 12, 13, 0.45);
      opacity: 0;
      pointer-events: none;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .dialog {
      width: min(100%, 340px);
      padding: 18px;
      border: 1px solid rgba(246, 239, 217, 0.18);
      border-radius: 8px;
      background: rgba(15, 17, 18, 0.92);
      text-align: center;
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0;
    }

    .dialog p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .conversion {
      display: none;
      margin: 0 0 14px;
      padding: 10px;
      border: 1px solid rgba(246, 239, 217, 0.12);
      border-radius: 8px;
      background: rgba(246, 239, 217, 0.06);
    }

    .conversion.show {
      display: block;
    }

    .convert-row {
      display: grid;
      grid-template-columns: 76px 1fr 88px;
      align-items: center;
      gap: 8px;
      min-height: 54px;
    }

    .convert-box {
      padding: 7px 6px;
      border-radius: 8px;
      background: rgba(13, 15, 16, 0.68);
      text-align: center;
    }

    .convert-box span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      line-height: 1;
    }

    .convert-box strong {
      display: block;
      margin-top: 4px;
      font-size: 19px;
      line-height: 1;
    }

    .convert-box.pop strong {
      animation: scorePop 0.2s ease-out;
    }

    .convert-lane {
      position: relative;
      height: 42px;
      overflow: hidden;
    }

    .convert-lane::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 20px;
      height: 2px;
      background: rgba(246, 239, 217, 0.18);
    }

    .fly-coin {
      position: absolute;
      left: 0;
      top: 11px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f0c247;
      border: 2px solid #f6efd9;
      box-shadow: 0 0 10px rgba(240, 194, 71, 0.45);
      animation: coinToScore 0.34s ease-in forwards;
    }

    @keyframes coinToScore {
      0% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
      }
      65% {
        transform: translateX(calc(var(--coin-travel, 140px) * 0.74)) translateY(-11px) scale(1.08);
        opacity: 1;
      }
      100% {
        transform: translateX(var(--coin-travel, 140px)) translateY(1px) scale(0.35);
        opacity: 0;
      }
    }

    @keyframes scorePop {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.18);
        color: var(--accent);
      }
      100% {
        transform: scale(1);
      }
    }

    .ranking {
      margin: 0 0 14px;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }

    .ranking li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid rgba(246, 239, 217, 0.12);
      padding: 4px 0;
    }

    button {
      appearance: none;
      min-height: 44px;
      padding: 10px 18px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #1b1710;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
    }

    .footer {
      min-height: 38px;
      display: grid;
      grid-template-columns: 1fr 96px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .slow-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(246, 239, 217, 0.1);
      overflow: hidden;
    }

    .slow-bar i {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--slow);
      border-radius: inherit;
    }

    @media (max-width: 430px), (max-height: 700px) {
      .app {
        gap: 5px;
        padding: calc(env(safe-area-inset-top, 0px) + 6px) 6px calc(env(safe-area-inset-bottom, 0px) + 6px);
      }

      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        min-height: 38px;
      }

      .hud h1 {
        display: none;
      }

      .stat {
        min-width: 0;
        padding: 5px 4px;
      }

      .stat span {
        font-size: 9px;
      }

      .stat strong {
        margin-top: 2px;
        font-size: 15px;
      }

      .move-stick {
        left: 12px;
        bottom: 12px;
        width: 88px;
        height: 88px;
      }

      .move-stick::before {
        inset: 20px;
      }

      .stick-knob {
        width: 38px;
        height: 38px;
      }

      .footer {
        min-height: 28px;
        grid-template-columns: 1fr 76px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hud">
      <h1>3レーン・スワイプラン</h1>
      <div class="stat"><span>SCORE</span><strong id="distance">0</strong></div>
      <div class="stat"><span>BEST</span><strong id="best">0</strong></div>
      <div class="stat"><span>COINS</span><strong id="todayRank">0</strong></div>
    </header>

    <section class="stage" id="stage">
      <canvas id="game" width="390" height="720"></canvas>
      <div class="move-stick" id="moveStick" aria-label="移動スティック">
        <div class="stick-knob" id="stickKnob"></div>
      </div>
      <div class="overlay show" id="overlay">
        <div class="dialog">
          <h2 id="overlayTitle">3レーン・スワイプラン</h2>
          <p id="overlayText">障害物を避けながら走る。道が曲がると画面の向きも変わる。左下スティックで移動、タップでジャンプ。</p>
          <div class="conversion" id="scoreConvert" aria-hidden="true">
            <div class="convert-row">
              <div class="convert-box"><span>COINS</span><strong id="convertCoins">0</strong></div>
              <div class="convert-lane" id="convertLane"></div>
              <div class="convert-box" id="convertScoreBox"><span>SCORE</span><strong id="convertScore">0</strong></div>
            </div>
          </div>
          <ol class="ranking" id="dailyRanking"></ol>
          <button id="startButton" type="button">スタート</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span id="hint">左下スティックで移動、タップでジャンプ</span>
      <div class="slow-bar" aria-label="スロー効果"><i id="slowFill"></i></div>
    </footer>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const stageEl = document.getElementById("stage");
    const distanceEl = document.getElementById("distance");
    const bestEl = document.getElementById("best");
    const todayRankEl = document.getElementById("todayRank");
    const hintEl = document.getElementById("hint");
    const slowFill = document.getElementById("slowFill");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const scoreConvert = document.getElementById("scoreConvert");
    const convertCoinsEl = document.getElementById("convertCoins");
    const convertLane = document.getElementById("convertLane");
    const convertScoreEl = document.getElementById("convertScore");
    const convertScoreBox = document.getElementById("convertScoreBox");
    const dailyRankingEl = document.getElementById("dailyRanking");
    const startButton = document.getElementById("startButton");
    const moveStick = document.getElementById("moveStick");
    const stickKnob = document.getElementById("stickKnob");
    const playerRunSprites = ["0", "1", "2", "3"].map((frame) => {
      const image = new Image();
      image.src = `assets/character/runner-${frame}.png`;
      image.addEventListener("load", draw);
      return image;
    });
    const playerSprite = playerRunSprites[0];
    const sideRunSprites = ["0", "1", "2", "3"].map((frame) => {
      const image = new Image();
      image.src = `assets/character/runner-side-${frame}.png`;
      image.addEventListener("load", draw);
      return image;
    });
    const sideDuckSprite = new Image();
    sideDuckSprite.src = "assets/character/runner-side-duck.png";
    sideDuckSprite.addEventListener("load", draw);
    const obstacleSprites = {
      car: new Image(),
      hole: new Image()
    };
    obstacleSprites.car.src = "assets/obstacles/car.png";
    obstacleSprites.hole.src = "assets/obstacles/hole.png";
    Object.values(obstacleSprites).forEach((image) => image.addEventListener("load", draw));
    const backgroundSprites = {
      laneBg: new Image(),
      laneRoad: new Image(),
      sideBg: new Image(),
      sideRoad: new Image(),
      laneLoop: new Image(),
      sideLoop: new Image(),
      curve: new Image()
    };
    backgroundSprites.laneBg.src = "assets/backgrounds/lane-background.png";
    backgroundSprites.laneRoad.src = "assets/backgrounds/lane-road.png";
    backgroundSprites.sideBg.src = "assets/backgrounds/side-background.png";
    backgroundSprites.sideRoad.src = "assets/backgrounds/side-road.png";
    backgroundSprites.laneLoop.src = "assets/backgrounds/lane-loop-road.png";
    backgroundSprites.sideLoop.src = "assets/backgrounds/side-loop-road.png";
    backgroundSprites.curve.src = "assets/backgrounds/curve-road.png";
    Object.values(backgroundSprites).forEach((image) => image.addEventListener("load", draw));

    const W = 390;
    const H = 720;
    const FRAME_MS = 1000 / 30;
    const LANES = [98, 195, 292];
    const CENTER_LANE = 1;
    const PLAYER_Y = 590;
    const PLAYER_W = 46;
    const PLAYER_H = 58;
    const BASE_SPEED = 230;
    const MAX_SPEED = 620;
    const SPEED_GAIN = 0.0026;
    const JUMP_DURATION = 0.66;
    const SLOW_DURATION = 3.7;
    const SLOW_FACTOR = 0.55;
    const BOOST_DURATION = 2.4;
    const BOOST_FACTOR = 1.35;
    const COIN_VALUE = 100;
    const COIN_RADIUS = 9;
    const PIPE_W = 78;
    const PIPE_H = 72;
    const SIDE_DURATION = 10;
    const SIDE_SPEED = 280;
    const SIDE_GROUND_Y = 590;
    const SIDE_PLAYER_X = 82;
    const SIDE_PLAYER_W = 50;
    const SIDE_PLAYER_H = 58;
    const SIDE_DUCK_H = 32;
    const SIDE_GRAVITY = 1700;
    const SIDE_JUMP_VELOCITY = -650;
    const SIDE_DUCK_DURATION = 0.72;
    const SIDE_EXIT_PIPE_W = 132;
    const SIDE_EXIT_PIPE_H = 150;
    const SIDE_EXIT_MIN_TIME = 7.0;
    const SIDE_EXIT_MAX_TIME = 12.5;
    const PIPE_ENTER_DURATION = 1.25;
    const PIPE_EXIT_DURATION = 1.35;
    const SWIPE_MIN = 36;
    const OBSTACLE_CLEARANCE = 210;
    const PANEL_CLEARANCE = 170;
    const TURN_CLEARANCE = 250;
    const TURN_W = 390;
    const TURN_H = 260;
    const TURN_APPROACH_GAP = 170;
    const TURN_SPAWN_Y = -TURN_H - TURN_APPROACH_GAP;
    const TURN_SLOW_GATE_Y = -96;
    const TURN_SLOW_GATE_H = 44;
    const TURN_ANIM_DURATION = 1.25;
    const TURN_SPEED_CAP = 0.72;
    const TURN_RECOVERY_DURATION = 1.8;

    let running = false;
    let gameOver = false;
    let lastTime = 0;
    let frameCarry = 0;
    let loopActive = false;
    let gameMode = "lane";
    let distance = 0;
    let coins = 0;
    let scoreConvertInterval = 0;
    let best = Number(localStorage.getItem("laneRunnerBestScore") || 0);
    let speed = BASE_SPEED;
    let roadScroll = 0;
    let loopScroll = 0;
    let spawnTimer = 0;
    let pipeTimer = 0;
    let turnTimer = 0;
    let viewDirection = 0;
    let turnTransition = null;
    let turnRecoveryTimer = 0;
    let coinTimer = 0;
    let slowGateTimer = 0;
    let panelTimer = 0;
    let slowTimer = 0;
    let boostTimer = 0;
    let jumpTimer = 0;
    let touchStart = null;
    let stickState = {
      active: false,
      pointerId: 0,
      lastDirection: 0
    };
    let obstacles = [];
    let pipes = [];
    let turns = [];
    let coinItems = [];
    let slowGates = [];
    let speedPanels = [];
    let sideTimer = 0;
    let sideObstacleTimer = 0;
    let sideCoinTimer = 0;
    let sideObstacles = [];
    let sideCoins = [];
    let sideExitPipe = null;
    let pipeEnterTimer = 0;
    let pipeExitTimer = 0;
    let transitionPipeLane = CENTER_LANE;

    const player = {
      lane: CENTER_LANE,
      x: LANES[CENTER_LANE],
      holdTimer: 0
    };

    const sidePlayer = {
      y: SIDE_GROUND_Y - SIDE_PLAYER_H,
      vy: 0,
      duckTimer: 0
    };

    function resizeCanvas() {
      const rect = stageEl.getBoundingClientRect();
      canvas.width = Math.round(rect.width);
      canvas.height = Math.round(rect.height);
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
      draw();
    }

    function resetGame() {
      clearScoreConversion();
      running = true;
      gameOver = false;
      gameMode = "lane";
      distance = 0;
      coins = 0;
      speed = BASE_SPEED;
      roadScroll = 0;
      loopScroll = 0;
      spawnTimer = 0.85;
      pipeTimer = 0;
      turnTimer = 5.2;
      viewDirection = 0;
      turnTransition = null;
      turnRecoveryTimer = 0;
      coinTimer = 1.25;
      slowGateTimer = 4.4;
      panelTimer = 2.2;
      slowTimer = 0;
      boostTimer = 0;
      jumpTimer = 0;
      obstacles = [];
      pipes = [];
      turns = [];
      coinItems = [];
      slowGates = [];
      speedPanels = [];
      sideTimer = 0;
      sideObstacleTimer = 0;
      sideCoinTimer = 0;
      sideObstacles = [];
      sideCoins = [];
      sideExitPipe = null;
      pipeEnterTimer = 0;
      pipeExitTimer = 0;
      transitionPipeLane = CENTER_LANE;
      sidePlayer.y = SIDE_GROUND_Y - SIDE_PLAYER_H;
      sidePlayer.vy = 0;
      sidePlayer.duckTimer = 0;
      player.lane = CENTER_LANE;
      player.x = LANES[CENTER_LANE];
      player.holdTimer = 0;
      resetStick();
      stageEl.classList.add("playing");
      overlay.classList.remove("show");
      hintEl.textContent = "左下スティックで移動、タップでジャンプ";
      requestScreenOrientation("portrait");
      updateHud();
      lastTime = performance.now();
      frameCarry = 0;
      startLoop();
    }

    function startPipeEnter(lane) {
      gameMode = "pipeEnter";
      pipeEnterTimer = PIPE_ENTER_DURATION;
      transitionPipeLane = lane;
      player.lane = lane;
      player.x = LANES[lane];
      player.holdTimer = 0;
      jumpTimer = 0;
      obstacles = [];
      pipes = [];
      coinItems = [];
      slowGates = [];
      speedPanels = [];
      requestScreenOrientation("landscape");
      hintEl.textContent = "横向き準備";
    }

    function enterSideMode() {
      gameMode = "side";
      sideTimer = nextSideExitDelay();
      sideObstacleTimer = 0.55;
      sideCoinTimer = 0.8;
      sideObstacles = [];
      sideCoins = [];
      sideExitPipe = null;
      sidePlayer.y = SIDE_GROUND_Y - SIDE_PLAYER_H;
      sidePlayer.vy = 0;
      sidePlayer.duckTimer = 0;
      jumpTimer = 0;
      slowTimer = 0;
      boostTimer = 0;
      obstacles = [];
      pipes = [];
      coinItems = [];
      slowGates = [];
      speedPanels = [];
      hintEl.textContent = "土管ステージ！上でジャンプ、下でしゃがみ";
    }

    function nextSideExitDelay() {
      return SIDE_EXIT_MIN_TIME + Math.random() * (SIDE_EXIT_MAX_TIME - SIDE_EXIT_MIN_TIME);
    }

    function exitSideMode(completed) {
      if (!completed) {
        endGame();
        return;
      }
      startPipeExit();
    }

    function startPipeExit() {
      gameMode = "pipeExit";
      pipeExitTimer = PIPE_EXIT_DURATION;
      transitionPipeLane = CENTER_LANE;
      sideTimer = 0;
      sideObstacles = [];
      sideCoins = [];
      sideExitPipe = null;
      sidePlayer.duckTimer = 0;
      sidePlayer.vy = 0;
      player.lane = CENTER_LANE;
      player.x = LANES[CENTER_LANE];
      player.holdTimer = 0;
      obstacles = [];
      pipes = [];
      coinItems = [];
      slowGates = [];
      speedPanels = [];
      jumpTimer = 0;
      requestScreenOrientation("portrait");
      hintEl.textContent = "土管から復帰中";
    }

    function finishPipeExit() {
      gameMode = "lane";
      pipeExitTimer = 0;
      sideTimer = 0;
      sideObstacles = [];
      sideCoins = [];
      player.lane = CENTER_LANE;
      player.x = LANES[CENTER_LANE];
      player.holdTimer = 0;
      spawnTimer = 0.9;
      pipeTimer = 8.5;
      coinTimer = 0.9;
      slowGateTimer = 4.5;
      panelTimer = 2.4;
      hintEl.textContent = "通常ランへ復帰";
    }

    function endGame() {
      running = false;
      gameOver = true;
      stageEl.classList.remove("playing");
      resetStick();
      requestScreenOrientation("portrait");
      const score = computeScore();
      const distanceScore = Math.floor(distance);
      const collectedCoins = coins;
      const rank = saveDailyScore(score);
      best = Math.max(best, score);
      localStorage.setItem("laneRunnerBestScore", String(best));
      overlayTitle.textContent = "ゲームオーバー";
      overlayText.textContent = `${distanceScore}点 + ${collectedCoins}コイン換算中`;
      startButton.textContent = "もう一度";
      overlay.classList.add("show");
      renderDailyRanking(rank);
      hintEl.textContent = "障害物に当たった";
      startScoreConversion(distanceScore, collectedCoins, score, rank);
    }

    function clearScoreConversion() {
      if (scoreConvertInterval) {
        clearInterval(scoreConvertInterval);
        scoreConvertInterval = 0;
      }
      scoreConvert.classList.remove("show");
      scoreConvert.setAttribute("aria-hidden", "true");
      convertLane.innerHTML = "";
      convertScoreBox.classList.remove("pop");
    }

    function startScoreConversion(baseScore, coinCount, finalScore, rank) {
      clearScoreConversion();
      let remainingCoins = coinCount;
      let shownScore = baseScore;
      distanceEl.textContent = String(shownScore);
      todayRankEl.textContent = String(remainingCoins);
      bestEl.textContent = String(Math.floor(best));
      scoreConvert.classList.add("show");
      scoreConvert.setAttribute("aria-hidden", "false");
      convertCoinsEl.textContent = String(remainingCoins);
      convertScoreEl.textContent = String(shownScore);
      if (remainingCoins <= 0) {
        overlayText.textContent = `${finalScore}点 / 0コイン / ${Math.floor(distance)}m / Today #${rank}`;
        return;
      }

      scoreConvertInterval = setInterval(() => {
        flyResultCoin();
        remainingCoins -= 1;
        shownScore += COIN_VALUE;
        distanceEl.textContent = String(shownScore);
        todayRankEl.textContent = String(Math.max(0, remainingCoins));
        convertCoinsEl.textContent = String(Math.max(0, remainingCoins));
        convertScoreEl.textContent = String(shownScore);
        convertScoreBox.classList.remove("pop");
        void convertScoreBox.offsetWidth;
        convertScoreBox.classList.add("pop");
        overlayText.textContent = `コイン換算中 残り${Math.max(0, remainingCoins)}枚`;
        if (remainingCoins <= 0) {
          clearScoreConversion();
          scoreConvert.classList.add("show");
          scoreConvert.setAttribute("aria-hidden", "false");
          convertCoinsEl.textContent = "0";
          convertScoreEl.textContent = String(finalScore);
          distanceEl.textContent = String(finalScore);
          todayRankEl.textContent = "0";
          overlayText.textContent = `${finalScore}点 / ${coinCount}コイン換算 / ${Math.floor(distance)}m / Today #${rank}`;
        }
      }, 180);
    }

    function flyResultCoin() {
      const coin = document.createElement("i");
      coin.className = "fly-coin";
      const travel = Math.max(80, convertLane.clientWidth - 22);
      coin.style.setProperty("--coin-travel", `${travel}px`);
      convertLane.appendChild(coin);
      coin.addEventListener("animationend", () => coin.remove(), { once: true });
    }

    function updateHud() {
      distanceEl.textContent = String(Math.floor(distance));
      bestEl.textContent = String(Math.floor(best));
      todayRankEl.textContent = String(coins);
      slowFill.style.width = `${Math.min(100, (slowTimer / SLOW_DURATION) * 100)}%`;
    }

    async function requestScreenOrientation(orientation) {
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock(orientation);
        }
      } catch {
      }
    }

    function computeScore() {
      return coins * COIN_VALUE + Math.floor(distance);
    }

    function todayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `laneRunnerDailyScore:${y}-${m}-${d}`;
    }

    function readDailyScores() {
      try {
        const scores = JSON.parse(localStorage.getItem(todayKey()) || "[]");
        return Array.isArray(scores) ? scores : [];
      } catch {
        return [];
      }
    }

    function saveDailyScore(score) {
      const entry = {
        id: `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`,
        score,
        time: Date.now()
      };
      const scores = readDailyScores();
      scores.push(entry);
      scores.sort((a, b) => b.score - a.score || a.time - b.time);
      const trimmed = scores.slice(0, 10);
      localStorage.setItem(todayKey(), JSON.stringify(trimmed));
      return trimmed.findIndex((item) => item.id === entry.id) + 1 || trimmed.length;
    }

    function renderDailyRanking(currentRank = 0) {
      const scores = readDailyScores().slice(0, 5);
      if (!scores.length) {
        dailyRankingEl.innerHTML = "<li><span>今日のランキング</span><strong>まだ記録なし</strong></li>";
        return;
      }
      dailyRankingEl.innerHTML = scores.map((item, index) => {
        const rank = index + 1;
        const mark = rank === currentRank ? " ★" : "";
        return `<li><span>${rank}位${mark}</span><strong>${item.score}点</strong></li>`;
      }).join("");
    }

    function moveSide(direction) {
      if (!running || gameMode !== "lane") return;
      if (jumpTimer > 0) {
        hintEl.textContent = "ジャンプ中は移動できない";
        return;
      }
      const nextLane = Math.max(0, Math.min(2, player.lane + direction));
      if (nextLane === player.lane) return;
      player.lane = nextLane;
      player.holdTimer = 0;
      hintEl.textContent = direction < 0 ? "左へ移動" : "右へ移動";
    }

    function jump() {
      if (gameMode === "side") {
        sideJump();
        return;
      }
      if (gameMode !== "lane") return;
      if (!running || jumpTimer > 0) return;
      jumpTimer = JUMP_DURATION;
      hintEl.textContent = "ジャンプ";
    }

    function sideJump() {
      if (!running || gameMode !== "side") return;
      if (!sideIsGrounded()) return;
      if (sideIsDucking()) {
        hintEl.textContent = "しゃがみ中はジャンプできない";
        return;
      }
      sidePlayer.duckTimer = 0;
      sidePlayer.vy = SIDE_JUMP_VELOCITY;
      hintEl.textContent = "横ランジャンプ";
    }

    function sideDuck() {
      if (!running || gameMode !== "side") return;
      if (!sideIsGrounded()) {
        hintEl.textContent = "ジャンプ中はしゃがめない";
        return;
      }
      if (sidePlayer.vy !== 0) return;
      sidePlayer.duckTimer = SIDE_DUCK_DURATION;
      hintEl.textContent = "横ランしゃがみ";
    }

    function spawnObstacle() {
      if (!hasObstacleClearance()) {
        spawnTimer = 0.35;
        return;
      }
      if (Math.random() < 0.24) {
        spawnComboObstacle();
        return;
      }

      const type = Math.random() < 0.32 ? "hole" : "car";
      if (type === "hole") {
        obstacles.push({ type, lanes: [0, 1, 2], y: -62, h: 52, group: "solo" });
        return;
      }

      const lane = Math.floor(Math.random() * 3);
      const wide = Math.random() < 0.22;
      if (wide) {
        const left = chooseWideBlockLeft();
        obstacles.push({ type, lanes: [left, left + 1], y: -92, h: 82, group: "solo" });
      } else {
        obstacles.push({ type, lanes: [lane], y: -92, h: 82, group: "solo" });
      }
    }

    function chooseWideBlockLeft() {
      const options = [0, 1].filter((left) => {
        const openLane = left === 0 ? 2 : 0;
        return Math.abs(openLane - player.lane) <= 1;
      });
      return options.length ? options[Math.floor(Math.random() * options.length)] : Math.floor(Math.random() * 2);
    }

    function spawnComboObstacle() {
      spawnCarHoleCombo();
    }

    function spawnCarHoleCombo() {
      const carLane = Math.floor(Math.random() * 3);
      const holeLanes = [0, 1, 2].filter((lane) => lane !== carLane);
      const y = -74;
      obstacles.push({ type: "car", lanes: [carLane], y: y - 10, h: 82, group: "combo" });
      obstacles.push({ type: "hole", lanes: holeLanes, y: y + 10, h: 52, group: "combo" });
    }

    function hasObstacleClearance() {
      const obstacleTop = -80;
      const obstacleBottom = -18;
      for (const pipe of pipes) {
        const pipeTop = pipe.y;
        const pipeBottom = pipe.y + pipe.h;
        if (rangesTooClose(obstacleTop, obstacleBottom, pipeTop, pipeBottom, PANEL_CLEARANCE)) {
          return false;
        }
      }
      for (const obstacle of obstacles) {
        const currentTop = obstacle.y;
        const currentBottom = obstacle.y + obstacle.h;
        if (rangesTooClose(obstacleTop, obstacleBottom, currentTop, currentBottom, OBSTACLE_CLEARANCE)) {
          return false;
        }
      }
      for (const turn of turns) {
        if (rangesTooClose(obstacleTop, obstacleBottom, turn.y, turn.y + turn.h, TURN_CLEARANCE)) {
          return false;
        }
      }
      for (const panel of speedPanels) {
        const panelTop = panel.y;
        const panelBottom = panel.y + panel.h;
        if (rangesTooClose(obstacleTop, obstacleBottom, panelTop, panelBottom, PANEL_CLEARANCE)) {
          return false;
        }
      }
      for (const gate of slowGates) {
        if (rangesTooClose(obstacleTop, obstacleBottom, gate.y, gate.y + gate.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      return true;
    }

    function spawnSlowGate() {
      if (!hasSlowGateClearance(-58, 34)) {
        slowGateTimer = 0.75;
        return;
      }
      slowGates.push({ y: -58, h: 34, forced: false });
    }

    function spawnPipe() {
      if (!hasPipeClearance()) {
        pipeTimer = 1.1;
        return;
      }
      const lane = Math.floor(Math.random() * 3);
      pipes.push({ lane, y: -PIPE_H - 18, w: PIPE_W, h: PIPE_H });
      hintEl.textContent = "土管が来た！入ると横ラン";
    }

    function hasPipeClearance() {
      const pipeTop = -PIPE_H - 18;
      const pipeBottom = -18;
      for (const obstacle of obstacles) {
        if (rangesTooClose(pipeTop, pipeBottom, obstacle.y, obstacle.y + obstacle.h, 170)) {
          return false;
        }
      }
      for (const panel of speedPanels) {
        if (rangesTooClose(pipeTop, pipeBottom, panel.y, panel.y + panel.h, 150)) {
          return false;
        }
      }
      for (const coin of coinItems) {
        if (rangesTooClose(pipeTop, pipeBottom, coin.y - coin.r, coin.y + coin.r, 70)) {
          return false;
        }
      }
      return true;
    }

    function spawnTurn() {
      if (!hasTurnClearance()) {
        turnTimer = 1.1;
        return;
      }
      const direction = Math.random() < 0.5 ? -1 : 1;
      slowGates.push({ y: TURN_SLOW_GATE_Y, h: TURN_SLOW_GATE_H, forced: true });
      turns.push({
        x: W / 2 - TURN_W / 2,
        y: TURN_SPAWN_Y,
        w: TURN_W,
        h: TURN_H,
        direction,
        triggered: false
      });
      slowGateTimer = Math.max(slowGateTimer, 5.0);
      panelTimer = Math.max(panelTimer, 2.2);
      spawnTimer = Math.max(spawnTimer, 1.2);
      hintEl.textContent = direction > 0 ? "右カーブが来た！" : "左カーブが来た！";
    }

    function hasTurnClearance() {
      const turnTop = TURN_SPAWN_Y;
      const turnBottom = TURN_SPAWN_Y + TURN_H;
      const gateTop = TURN_SLOW_GATE_Y;
      const gateBottom = TURN_SLOW_GATE_Y + TURN_SLOW_GATE_H;
      const checkTop = Math.min(turnTop, gateTop);
      const checkBottom = Math.max(turnBottom, gateBottom);
      const blockers = [...obstacles, ...speedPanels, ...slowGates, ...pipes];
      for (const item of blockers) {
        if (rangesTooClose(checkTop, checkBottom, item.y, item.y + item.h, TURN_CLEARANCE * 0.7)) {
          return false;
        }
      }
      for (const coin of coinItems) {
        if (rangesTooClose(checkTop, checkBottom, coin.y - coin.r, coin.y + coin.r, TURN_CLEARANCE * 0.55)) {
          return false;
        }
      }
      return true;
    }

    function takeTurn(turn) {
      if (turnTransition) return;
      turn.triggered = true;
      turnTransition = {
        direction: turn.direction,
        elapsed: 0,
        duration: TURN_ANIM_DURATION,
        from: viewDirection
      };
      player.lane = CENTER_LANE;
      player.x = LANES[CENTER_LANE];
      player.holdTimer = 0;
      hintEl.textContent = turn.direction > 0 ? "右へ曲がる！" : "左へ曲がる！";
    }

    function spawnCoins() {
      if (!hasCoinClearance()) {
        coinTimer = 0.5;
        return;
      }

      const lane = Math.floor(Math.random() * 3);
      const count = 2 + Math.floor(Math.random() * 3);
      const stagger = Math.random() < 0.35;
      for (let i = 0; i < count; i += 1) {
        const nextLane = stagger ? Math.max(0, Math.min(2, lane + (i % 2 === 0 ? 0 : (lane === 2 ? -1 : 1)))) : lane;
        coinItems.push({ lane: nextLane, y: -42 - i * 34, r: COIN_RADIUS, collected: false });
      }
    }

    function hasCoinClearance() {
      const coinTop = -150;
      const coinBottom = -22;
      for (const pipe of pipes) {
        if (rangesTooClose(coinTop, coinBottom, pipe.y, pipe.y + pipe.h, 100)) {
          return false;
        }
      }
      for (const obstacle of obstacles) {
        const obstacleTop = obstacle.y;
        const obstacleBottom = obstacle.y + obstacle.h;
        if (rangesTooClose(coinTop, coinBottom, obstacleTop, obstacleBottom, 80)) {
          return false;
        }
      }
      for (const gate of slowGates) {
        if (rangesTooClose(coinTop, coinBottom, gate.y, gate.y + gate.h, 70)) {
          return false;
        }
      }
      for (const turn of turns) {
        if (rangesTooClose(coinTop, coinBottom, turn.y, turn.y + turn.h, 120)) {
          return false;
        }
      }
      return true;
    }

    function spawnSpeedPanel() {
      if (!hasPanelClearance()) {
        panelTimer = 0.45;
        return;
      }
      if (Math.random() < 0.28) {
        const y = -72;
        const groupId = `boost-${Date.now()}-${Math.random()}`;
        for (let lane = 0; lane < 3; lane += 1) {
          speedPanels.push({ lane, kind: "up", y, h: 58, used: false, group: "tripleBoost", groupId });
        }
        return;
      }
      const lane = Math.floor(Math.random() * 3);
      const kind = Math.random() < 0.46 ? "up" : "down";
      speedPanels.push({ lane, kind, y: -72, h: 58, used: false, group: "solo", groupId: "" });
    }

    function hasPanelClearance() {
      const panelTop = -72;
      const panelBottom = panelTop + 58;
      for (const pipe of pipes) {
        if (rangesTooClose(panelTop, panelBottom, pipe.y, pipe.y + pipe.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      for (const turn of turns) {
        if (rangesTooClose(panelTop, panelBottom, turn.y, turn.y + turn.h, TURN_CLEARANCE)) {
          return false;
        }
      }
      for (const gate of slowGates) {
        if (rangesTooClose(panelTop, panelBottom, gate.y, gate.y + gate.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      for (const obstacle of obstacles) {
        const obstacleTop = obstacle.y;
        const obstacleBottom = obstacle.y + obstacle.h;
        if (rangesTooClose(panelTop, panelBottom, obstacleTop, obstacleBottom, PANEL_CLEARANCE)) {
          return false;
        }
      }
      return true;
    }

    function hasSlowGateClearance(gateY, gateH) {
      const gateTop = gateY;
      const gateBottom = gateY + gateH;
      const blockers = [...obstacles, ...speedPanels, ...turns, ...pipes];
      for (const item of blockers) {
        if (rangesTooClose(gateTop, gateBottom, item.y, item.y + item.h, PANEL_CLEARANCE)) {
          return false;
        }
      }
      return true;
    }

    function rangesTooClose(aTop, aBottom, bTop, bBottom, clearance) {
      return aTop < bBottom + clearance && aBottom + clearance > bTop;
    }

    function update(dt) {
      if (!running) return;
      if (gameMode === "side") {
        updateSideMode(dt);
        updateHud();
        return;
      }
      if (gameMode === "pipeEnter") {
        updatePipeEnterMode(dt);
        updateHud();
        return;
      }
      if (gameMode === "pipeExit") {
        updatePipeExitMode(dt);
        updateHud();
        return;
      }

      const rawSpeed = Math.min(MAX_SPEED, BASE_SPEED + distance * SPEED_GAIN * BASE_SPEED);
      slowTimer = Math.max(0, slowTimer - dt);
      boostTimer = Math.max(0, boostTimer - dt);
      turnRecoveryTimer = Math.max(0, turnRecoveryTimer - dt);
      speed = rawSpeed;
      if (boostTimer > 0) speed *= BOOST_FACTOR;
      if (slowTimer > 0) speed *= SLOW_FACTOR;
      speed = Math.min(speed, rawSpeed * turnSpeedFactor());
      jumpTimer = Math.max(0, jumpTimer - dt);
      distance += (speed * dt) / 12;
      roadScroll = (roadScroll + speed * dt) % 80;
      loopScroll += speed * dt;
      updateTurnTransition(dt);

      const targetX = LANES[player.lane];
      player.x += (targetX - player.x) * Math.min(1, dt * 14);

      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        const rate = speed / BASE_SPEED;
        spawnTimer = Math.max(0.72, 1.2 - rate * 0.07 + Math.random() * 0.42);
      }

      if (!turnTransition) {
        turnTimer -= dt;
      }
      if (!turnTransition && turnTimer <= 0) {
        spawnTurn();
        turnTimer = 6.2 + Math.random() * 4.4;
      }

      coinTimer -= dt;
      if (coinTimer <= 0) {
        spawnCoins();
        coinTimer = 1.55 + Math.random() * 1.35;
      }

      slowGateTimer -= dt;
      if (slowGateTimer <= 0) {
        spawnSlowGate();
        slowGateTimer = 6.4 + Math.random() * 3.2;
      }

      panelTimer -= dt;
      if (panelTimer <= 0) {
        spawnSpeedPanel();
        panelTimer = 3.2 + Math.random() * 2.4;
      }

      for (const obstacle of obstacles) {
        obstacle.y += speed * dt;
      }
      obstacles = obstacles.filter((obstacle) => obstacle.y < H + 90);

      for (const pipe of pipes) {
        pipe.y += speed * dt;
      }
      pipes = pipes.filter((pipe) => pipe.y < H + 90);

      for (const turn of turns) {
        turn.y += speed * dt;
        if (!turn.triggered && turn.y + turn.h * 0.72 >= PLAYER_Y) {
          takeTurn(turn);
        }
      }
      turns = turns.filter((turn) => turn.y < H + 180);

      for (const coin of coinItems) {
        coin.y += speed * dt;
      }
      coinItems = coinItems.filter((coin) => coin.y < H + 40 && !coin.collected);

      for (const gate of slowGates) {
        gate.y += speed * dt;
      }
      slowGates = slowGates.filter((gate) => gate.y < H + 70);

      for (const panel of speedPanels) {
        panel.y += speed * dt;
      }
      speedPanels = speedPanels.filter((panel) => panel.y < H + 80 && !panel.used);

      checkCollisions();
      updateHud();
    }

    function updateTurnTransition(dt) {
      if (!turnTransition) return;
      turnTransition.elapsed += dt;
      if (turnTransition.elapsed >= turnTransition.duration) {
        viewDirection = (turnTransition.from + turnTransition.direction + 4) % 4;
        turnTransition = null;
        turnRecoveryTimer = TURN_RECOVERY_DURATION;
        hintEl.textContent = "曲がり終わった！";
      }
    }

    function turnSpeedFactor() {
      if (turnTransition) return TURN_SPEED_CAP;
      if (turnRecoveryTimer <= 0) return 1;
      const t = 1 - turnRecoveryTimer / TURN_RECOVERY_DURATION;
      const eased = t * t * (3 - 2 * t);
      return TURN_SPEED_CAP + (1 - TURN_SPEED_CAP) * eased;
    }

    function updatePipeEnterMode(dt) {
      pipeEnterTimer -= dt;
      roadScroll = (roadScroll + BASE_SPEED * dt * 0.35) % 80;
      loopScroll += BASE_SPEED * dt * 0.35;
      if (pipeEnterTimer <= 0) {
        enterSideMode();
      }
    }

    function updatePipeExitMode(dt) {
      pipeExitTimer -= dt;
      roadScroll = (roadScroll + BASE_SPEED * dt * 0.45) % 80;
      loopScroll += BASE_SPEED * dt * 0.45;
      if (pipeExitTimer <= 0) {
        finishPipeExit();
      }
    }

    function updateSideMode(dt) {
      if (!sideExitPipe) {
        sideTimer = Math.max(0, sideTimer - dt);
        if (sideTimer <= 0) {
          spawnSideExitPipe();
        }
      }

      const sideDistanceSpeed = SIDE_SPEED * (boostTimer > 0 ? BOOST_FACTOR : 1);
      distance += (sideDistanceSpeed * dt) / 14;
      roadScroll = (roadScroll + sideDistanceSpeed * dt) % 80;
      loopScroll += sideDistanceSpeed * dt;
      sidePlayer.duckTimer = Math.max(0, sidePlayer.duckTimer - dt);
      sidePlayer.vy += SIDE_GRAVITY * dt;
      sidePlayer.y += sidePlayer.vy * dt;
      const standY = SIDE_GROUND_Y - SIDE_PLAYER_H;
      if (sidePlayer.y >= standY) {
        sidePlayer.y = standY;
        sidePlayer.vy = 0;
      }

      if (!sideExitPipe) {
        sideObstacleTimer -= dt;
        if (sideObstacleTimer <= 0) {
          spawnSideObstacle();
          sideObstacleTimer = 0.9 + Math.random() * 0.6;
        }

        sideCoinTimer -= dt;
        if (sideCoinTimer <= 0) {
          spawnSideCoins();
          sideCoinTimer = 1.05 + Math.random() * 0.65;
        }
      }

      for (const obstacle of sideObstacles) {
        obstacle.x -= SIDE_SPEED * dt;
      }
      sideObstacles = sideObstacles.filter((obstacle) => obstacle.x + obstacle.w > -30);

      if (sideExitPipe) {
        sideExitPipe.x -= SIDE_SPEED * dt;
        if (sideExitPipe.x <= SIDE_PLAYER_X + SIDE_PLAYER_W * 0.75) {
          exitSideMode(true);
          return;
        }
      }

      for (const coin of sideCoins) {
        coin.x -= SIDE_SPEED * dt;
      }
      sideCoins = sideCoins.filter((coin) => coin.x + coin.r > -30 && !coin.collected);

      checkSideCollisions();
    }

    function checkCollisions() {
      const p = playerRect();
      const hitP = shrinkRect(p, 5, 6);
      const feet = playerFootRect();
      for (let i = pipes.length - 1; i >= 0; i -= 1) {
        const pipe = pipes[i];
        if (laneObjectPassed(pipe) || pipe.y < PLAYER_Y - 120) continue;
        if (rectsOverlap(hitP, shrinkRect(pipeRect(pipe), 8, 8))) {
          startPipeEnter(pipe.lane);
          return;
        }
      }

      for (let obstacleIndex = obstacles.length - 1; obstacleIndex >= 0; obstacleIndex -= 1) {
        const obstacle = obstacles[obstacleIndex];
        if (laneObjectPassed(obstacle)) continue;
        if (obstacle.type === "hole") {
          if (isJumping()) continue;
          for (const lane of obstacle.lanes) {
            const o = shrinkRect(laneRect(lane, obstacle.y, obstacle.h), 9, 6);
            if (rectsOverlap(feet, o)) {
              endGame();
              return;
            }
          }
          continue;
        }
        for (const lane of obstacle.lanes) {
          const o = shrinkRect(laneRect(lane, obstacle.y, obstacle.h), 8, 7);
          if (rectsOverlap(hitP, o)) {
            endGame();
            return;
          }
        }
      }

      for (let i = coinItems.length - 1; i >= 0; i -= 1) {
        const coin = coinItems[i];
        if (rectsOverlap(p, coinRect(coin))) {
          coins += 1;
          coin.collected = true;
          coinItems.splice(i, 1);
          hintEl.textContent = `コイン +1 / ${coins}枚`;
        }
      }

      for (let i = slowGates.length - 1; i >= 0; i -= 1) {
        const gate = slowGates[i];
        const g = { x: 44, y: gate.y, w: W - 88, h: gate.h };
        if (rectsOverlap(p, g)) {
          slowTimer = SLOW_DURATION;
          boostTimer = 0;
          slowGates.splice(i, 1);
          hintEl.textContent = "強制スロー";
        }
      }

      for (let i = speedPanels.length - 1; i >= 0; i -= 1) {
        const panel = speedPanels[i];
        const r = panelRect(panel);
        if (rectsOverlap(feet, r)) {
          panel.used = true;
          if (panel.kind === "up") {
            boostTimer = BOOST_DURATION;
            slowTimer = 0;
            hintEl.textContent = "スピードアップ";
          } else {
            slowTimer = SLOW_DURATION;
            boostTimer = 0;
            hintEl.textContent = "スピードダウン";
          }
          if (panel.group === "tripleBoost") {
            speedPanels = speedPanels.filter((item) => item.groupId !== panel.groupId);
          } else {
            speedPanels.splice(i, 1);
          }
          break;
        }
      }
    }

    function spawnSideObstacle() {
      const isBar = Math.random() < 0.5;
      if (isBar) {
        sideObstacles.push({ type: "bar", x: W + 36, y: SIDE_GROUND_Y - 116, w: 62, h: 78 });
      } else {
        sideObstacles.push({ type: "hurdle", x: W + 36, y: SIDE_GROUND_Y - 42, w: 38, h: 42 });
      }
    }

    function spawnSideExitPipe() {
      sideExitPipe = {
        x: W + 72,
        y: SIDE_GROUND_Y - SIDE_EXIT_PIPE_H,
        w: SIDE_EXIT_PIPE_W,
        h: SIDE_EXIT_PIPE_H
      };
      sideObstacles = [];
      sideCoins = [];
      sideObstacleTimer = 999;
      sideCoinTimer = 999;
      hintEl.textContent = "出口土管が来る！";
    }

    function spawnSideCoins() {
      const high = Math.random() < 0.42;
      const baseY = high ? SIDE_GROUND_Y - 148 : SIDE_GROUND_Y - 86;
      const count = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i += 1) {
        sideCoins.push({ x: W + 24 + i * 34, y: baseY + Math.sin(i * 0.9) * 12, r: COIN_RADIUS, collected: false });
      }
    }

    function checkSideCollisions() {
      const p = sidePlayerRect();
      const hitP = shrinkRect(p, 5, 6);
      for (let i = sideCoins.length - 1; i >= 0; i -= 1) {
        const coin = sideCoins[i];
        if (rectsOverlap(p, sideCoinRect(coin))) {
          coins += 1;
          coin.collected = true;
          sideCoins.splice(i, 1);
          hintEl.textContent = `コイン +1 / ${coins}枚`;
        }
      }

      for (const obstacle of sideObstacles) {
        if (sideObjectPassed(obstacle)) continue;
        if (obstacle.type === "bar") {
          if (!sideIsDucking() && rectsOverlap(hitP, shrinkRect(obstacle, 6, 4))) {
            exitSideMode(false);
            return;
          }
          continue;
        }
        if (rectsOverlap(hitP, shrinkRect(obstacle, 6, 5))) {
          exitSideMode(false);
          return;
        }
      }
    }

    function playerRect() {
      return {
        x: player.x - PLAYER_W / 2,
        y: PLAYER_Y - PLAYER_H / 2,
        w: PLAYER_W,
        h: PLAYER_H
      };
    }

    function playerFootRect() {
      return {
        x: player.x - PLAYER_W * 0.28,
        y: PLAYER_Y + PLAYER_H / 2 - 10,
        w: PLAYER_W * 0.56,
        h: 12
      };
    }

    function laneRect(lane, y, h) {
      return {
        x: LANES[lane] - 34,
        y,
        w: 68,
        h
      };
    }

    function panelRect(panel) {
      return {
        x: LANES[panel.lane] - 36,
        y: panel.y,
        w: 72,
        h: panel.h
      };
    }

    function pipeRect(pipe) {
      return {
        x: LANES[pipe.lane] - pipe.w / 2,
        y: pipe.y,
        w: pipe.w,
        h: pipe.h
      };
    }

    function coinRect(coin) {
      return {
        x: LANES[coin.lane] - coin.r,
        y: coin.y - coin.r,
        w: coin.r * 2,
        h: coin.r * 2
      };
    }

    function sidePlayerRect() {
      const ducking = sideIsDucking();
      const h = ducking ? SIDE_DUCK_H : SIDE_PLAYER_H;
      return {
        x: SIDE_PLAYER_X,
        y: ducking ? sidePlayer.y + SIDE_PLAYER_H - h : sidePlayer.y,
        w: SIDE_PLAYER_W,
        h
      };
    }

    function sideCoinRect(coin) {
      return {
        x: coin.x - coin.r,
        y: coin.y - coin.r,
        w: coin.r * 2,
        h: coin.r * 2
      };
    }

    function isJumping() {
      return jumpTimer > 0;
    }

    function sideIsGrounded() {
      return sidePlayer.y >= SIDE_GROUND_Y - SIDE_PLAYER_H - 0.5 && sidePlayer.vy >= 0;
    }

    function sideIsDucking() {
      return sidePlayer.duckTimer > 0;
    }

    function jumpLift() {
      if (!isJumping()) return 0;
      const t = 1 - jumpTimer / JUMP_DURATION;
      return Math.sin(t * Math.PI) * 46;
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function shrinkRect(rect, insetX, insetY) {
      return {
        x: rect.x + insetX,
        y: rect.y + insetY,
        w: Math.max(1, rect.w - insetX * 2),
        h: Math.max(1, rect.h - insetY * 2)
      };
    }

    function laneObjectPassed(object) {
      return object.y > PLAYER_Y + PLAYER_H / 2 - 8;
    }

    function sideObjectPassed(object) {
      return object.x + object.w < SIDE_PLAYER_X + 8;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#1f2b31";
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      applyViewTransform();
      drawRoad();
      drawTurns();
      drawSpeedPanels();
      drawCoins();
      drawSlowGates();
      drawObstacles();
      drawPlayer();
      if (slowTimer > 0 || boostTimer > 0) drawSpeedLabel();
      ctx.restore();
    }

    function applyViewTransform() {
      const turnUnits = currentViewUnits();
      const angle = turnUnits * Math.PI / 2;
      const sideAmount = Math.abs(Math.sin(angle));
      const cameraScale = 1 - sideAmount * 0.3;
      ctx.translate(W / 2, H / 2);
      ctx.scale(cameraScale, cameraScale);
      ctx.rotate(angle);
      ctx.translate(-W / 2, -H / 2);
    }

    function currentViewUnits() {
      if (!turnTransition) return viewDirection;
      const t = Math.min(1, turnTransition.elapsed / turnTransition.duration);
      const eased = t * t * (3 - 2 * t);
      return turnTransition.from + turnTransition.direction * eased;
    }

    function drawRoad() {
      if (imageReady(backgroundSprites.laneLoop)) {
        drawVerticalLoopImage(backgroundSprites.laneLoop, loopScroll, 0, 0, W, H);
        drawLoopVignette();
        return;
      }

      if (imageReady(backgroundSprites.laneBg) && imageReady(backgroundSprites.laneRoad)) {
        drawCoverImage(backgroundSprites.laneBg, 0, 0, W, H);
        drawLaneSceneryFlow();
        drawLaneRoadImage();
        drawLaneFlowOverlay();
        ctx.fillStyle = "rgba(6, 16, 18, 0.12)";
        ctx.fillRect(0, 0, W, H);
        return;
      }

      drawFallbackRoad();
    }

    function drawFallbackRoad() {
      ctx.fillStyle = "#182025";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#273038";
      ctx.fillRect(44, 0, W - 88, H);

      ctx.strokeStyle = "#53606a";
      ctx.lineWidth = 2;
      ctx.setLineDash([18, 24]);
      for (let i = 1; i < 3; i += 1) {
        const x = (LANES[i - 1] + LANES[i]) / 2;
        ctx.beginPath();
        ctx.moveTo(x, -80 + roadScroll);
        ctx.lineTo(x, H + 80);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(246,239,217,0.16)";
      for (let y = -roadScroll; y < H; y += 80) {
        ctx.fillRect(52, y, W - 104, 3);
      }
    }

    function imageReady(image) {
      return image.complete && image.naturalWidth > 0;
    }

    function drawCoverImage(image, x, y, w, h, focusX = 0.5, focusY = 0.5) {
      const scale = Math.max(w / image.naturalWidth, h / image.naturalHeight);
      const sourceW = w / scale;
      const sourceH = h / scale;
      const sourceX = Math.max(0, Math.min(image.naturalWidth - sourceW, image.naturalWidth * focusX - sourceW / 2));
      const sourceY = Math.max(0, Math.min(image.naturalHeight - sourceH, image.naturalHeight * focusY - sourceH / 2));
      ctx.drawImage(image, sourceX, sourceY, sourceW, sourceH, x, y, w, h);
    }

    function drawVerticalLoopImage(image, scroll, x, y, w, h) {
      const offset = ((scroll % h) + h) % h;
      drawCoverImage(image, x, y + offset - h, w, h);
      drawCoverImage(image, x, y + offset, w, h);
    }

    function drawHorizontalLoopImage(image, scroll, x, y, w, h) {
      const offset = ((scroll % w) + w) % w;
      drawCoverImage(image, x - offset, y, w, h);
      drawCoverImage(image, x - offset + w, y, w, h);
    }

    function drawLoopVignette() {
      const edgeGradient = ctx.createLinearGradient(0, 0, W, 0);
      edgeGradient.addColorStop(0, "rgba(0,0,0,0.2)");
      edgeGradient.addColorStop(0.18, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(0.82, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(1, "rgba(0,0,0,0.2)");
      ctx.fillStyle = edgeGradient;
      ctx.fillRect(0, 0, W, H);
    }

    function drawLaneRoadImage() {
      const roadX = 44;
      const roadW = W - 88;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.28)";
      ctx.shadowBlur = 16;
      ctx.shadowOffsetX = 0;
      drawCoverImage(backgroundSprites.laneRoad, roadX, 0, roadW, H, 0.5, 0.5);
      ctx.restore();
    }

    function drawLaneFlowOverlay() {
      const roadX = 44;
      const roadW = W - 88;
      const offset = ((roadScroll * 1.15) % 86 + 86) % 86;

      ctx.save();
      ctx.beginPath();
      ctx.rect(roadX, 0, roadW, H);
      ctx.clip();

      ctx.strokeStyle = "rgba(255,247,218,0.58)";
      ctx.lineWidth = 5;
      ctx.setLineDash([32, 42]);
      ctx.lineDashOffset = offset;
      for (let i = 1; i < 3; i += 1) {
        const x = (LANES[i - 1] + LANES[i]) / 2;
        ctx.beginPath();
        ctx.moveTo(x, -90);
        ctx.lineTo(x, H + 90);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(255,255,255,0.16)";
      for (let y = -offset; y < H + 90; y += 86) {
        ctx.fillRect(roadX + 16, y + 10, roadW - 32, 3);
        ctx.fillRect(roadX + 58, y + 45, roadW - 116, 2);
      }

      const edgeGradient = ctx.createLinearGradient(roadX, 0, roadX + roadW, 0);
      edgeGradient.addColorStop(0, "rgba(0,0,0,0.22)");
      edgeGradient.addColorStop(0.16, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(0.84, "rgba(0,0,0,0)");
      edgeGradient.addColorStop(1, "rgba(0,0,0,0.22)");
      ctx.fillStyle = edgeGradient;
      ctx.fillRect(roadX, 0, roadW, H);
      ctx.restore();
    }

    function drawLaneSceneryFlow() {
      const offset = ((roadScroll * 0.38) % 170 + 170) % 170;
      ctx.save();
      ctx.globalAlpha = 0.55;
      for (let y = -offset - 80; y < H + 170; y += 170) {
        drawLeafCluster(24, y + 24, 1);
        drawLeafCluster(W - 24, y + 105, -1);
        drawLampGlow(16, y + 92);
        drawLampGlow(W - 16, y + 8);
      }
      ctx.restore();
    }

    function drawLeafCluster(x, y, direction) {
      ctx.fillStyle = "rgba(88, 167, 87, 0.5)";
      ctx.beginPath();
      ctx.ellipse(x, y, 18, 9, 0.45 * direction, 0, Math.PI * 2);
      ctx.ellipse(x + 10 * direction, y + 14, 15, 8, -0.35 * direction, 0, Math.PI * 2);
      ctx.ellipse(x - 6 * direction, y + 26, 12, 7, 0.2 * direction, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLampGlow(x, y) {
      const glow = ctx.createRadialGradient(x, y, 2, x, y, 26);
      glow.addColorStop(0, "rgba(255,210,91,0.34)");
      glow.addColorStop(1, "rgba(255,210,91,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(x - 28, y - 28, 56, 56);
    }

    function drawPipes() {
      for (const pipe of pipes) {
        drawPipe(pipeRect(pipe));
      }
    }

    function drawTurns() {
      for (const turn of turns) {
        drawTurnBackdrop(turn);
        if (imageReady(backgroundSprites.curve)) {
          ctx.save();
          if (turn.direction < 0) {
            ctx.translate(turn.x + turn.w / 2, turn.y + turn.h / 2);
            ctx.scale(-1, 1);
            ctx.drawImage(backgroundSprites.curve, -turn.w / 2, -turn.h / 2, turn.w, turn.h);
          } else {
            ctx.drawImage(backgroundSprites.curve, turn.x, turn.y, turn.w, turn.h);
          }
          ctx.restore();
        } else {
          drawCurveFallback(turn);
        }
        drawTurnEntryBlend(turn);
      }
    }

    function drawTurnBackdrop(turn) {
      const y = Math.min(0, turn.y - 14);
      const h = turn.y + turn.h + 42 - y;
      const gradient = ctx.createLinearGradient(0, y, 0, y + h);
      gradient.addColorStop(0, "#246f74");
      gradient.addColorStop(0.45, "#2f9184");
      gradient.addColorStop(1, "#246f74");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, y, W, h);

      const shadow = ctx.createLinearGradient(0, y, 0, y + h);
      shadow.addColorStop(0, "rgba(0,0,0,0.18)");
      shadow.addColorStop(0.18, "rgba(0,0,0,0)");
      shadow.addColorStop(0.82, "rgba(0,0,0,0)");
      shadow.addColorStop(1, "rgba(0,0,0,0.1)");
      ctx.fillStyle = shadow;
      ctx.fillRect(0, y, W, h);

      ctx.fillStyle = "rgba(35, 102, 70, 0.72)";
      for (let x = 24; x < W; x += 86) {
        ctx.beginPath();
        ctx.ellipse(x, y + 32 + (x % 3) * 16, 20, 9, 0.25, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = "rgba(76, 171, 88, 0.68)";
      for (let x = 58; x < W + 30; x += 96) {
        ctx.beginPath();
        ctx.ellipse(x, y + h - 28 - (x % 2) * 12, 18, 8, -0.2, 0, Math.PI * 2);
        ctx.fill();
      }

    }

    function drawTurnEntryBlend(turn) {
      const roadX = 44;
      const roadW = W - 88;
      const y = turn.y + turn.h - 24;
      const h = 58;
      const fade = ctx.createLinearGradient(0, y, 0, y + h);
      fade.addColorStop(0, "rgba(126,132,121,0.08)");
      fade.addColorStop(0.32, "rgba(126,132,121,0.78)");
      fade.addColorStop(1, "rgba(126,132,121,0)");
      ctx.fillStyle = fade;
      ctx.fillRect(roadX, y, roadW, h);

      ctx.strokeStyle = "rgba(246,239,217,0.35)";
      ctx.lineWidth = 5;
      ctx.setLineDash([26, 36]);
      ctx.lineDashOffset = roadScroll;
      for (let i = 1; i < 3; i += 1) {
        const x = (LANES[i - 1] + LANES[i]) / 2;
        ctx.beginPath();
        ctx.moveTo(x, y + 8);
        ctx.lineTo(x, y + h - 8);
        ctx.stroke();
      }
      ctx.setLineDash([]);
    }

    function drawCurveFallback(turn) {
      const cx = turn.x + turn.w / 2;
      const cy = turn.y + turn.h / 2;
      ctx.save();
      ctx.translate(cx, cy);
      if (turn.direction < 0) ctx.scale(-1, 1);
      ctx.strokeStyle = "rgba(246,239,217,0.88)";
      ctx.lineWidth = 13;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-74, 24);
      ctx.quadraticCurveTo(12, 18, 74, -30);
      ctx.stroke();
      ctx.strokeStyle = "rgba(20,22,22,0.28)";
      ctx.lineWidth = 22;
      ctx.beginPath();
      ctx.moveTo(-82, 33);
      ctx.quadraticCurveTo(10, 24, 84, -37);
      ctx.stroke();
      ctx.fillStyle = "rgba(240,194,71,0.9)";
      ctx.beginPath();
      ctx.moveTo(76, -42);
      ctx.lineTo(106, -38);
      ctx.lineTo(88, -12);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawPipe(rect) {
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(rect.x + 6, rect.y + rect.h - 4, rect.w - 12, 10);
      ctx.fillStyle = "#168a44";
      ctx.fillRect(rect.x + 11, rect.y + 18, rect.w - 22, rect.h - 18);
      ctx.fillStyle = "#22b45a";
      ctx.fillRect(rect.x, rect.y + 4, rect.w, 28);
      ctx.fillStyle = "#5ee37f";
      ctx.fillRect(rect.x + 7, rect.y + 9, rect.w - 14, 8);
      ctx.fillStyle = "rgba(8,36,20,0.38)";
      ctx.fillRect(rect.x + rect.w - 17, rect.y + 18, 7, rect.h - 20);
      ctx.strokeStyle = "#0d5f2f";
      ctx.lineWidth = 3;
      ctx.strokeRect(rect.x, rect.y + 4, rect.w, 28);
      ctx.strokeRect(rect.x + 11, rect.y + 18, rect.w - 22, rect.h - 18);
    }

    function drawPipeEnterMode() {
      drawRoad();
      const progress = 1 - Math.max(0, pipeEnterTimer) / PIPE_ENTER_DURATION;
      const eased = progress * progress * (3 - 2 * progress);
      const pipeRectIn = {
        x: LANES[transitionPipeLane] - PIPE_W / 2,
        y: PLAYER_Y + 4,
        w: PIPE_W,
        h: PIPE_H
      };
      const startY = PLAYER_Y + PLAYER_H / 2;
      const sinkY = PLAYER_Y + 82;
      drawEnteringPlayer(startY + (sinkY - startY) * eased, 1 - eased * 0.55);
      drawPipe(pipeRectIn);
      ctx.fillStyle = "rgba(8,12,14,0.42)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(246,239,217,0.92)";
      ctx.font = "850 20px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("横向きに構えて", W / 2, 66);
      ctx.font = "800 14px Segoe UI, sans-serif";
      ctx.fillText("次は横スクロール", W / 2, 91);
    }

    function drawEnteringPlayer(y, scale) {
      const spriteW = 64 * scale;
      const spriteH = 84 * scale;
      ctx.save();
      ctx.beginPath();
      ctx.rect(44, 0, W - 88, PLAYER_Y + PIPE_H);
      ctx.clip();
      if (playerSprite.complete && playerSprite.naturalWidth > 0) {
        ctx.drawImage(playerSprite, LANES[transitionPipeLane] - spriteW / 2, y - spriteH, spriteW, spriteH);
      } else {
        ctx.fillStyle = "#f0c247";
        ctx.fillRect(LANES[transitionPipeLane] - PLAYER_W / 2, y - PLAYER_H, PLAYER_W * scale, PLAYER_H * scale);
      }
      ctx.restore();
    }

    function drawPipeExitMode() {
      drawRoad();
      const progress = 1 - Math.max(0, pipeExitTimer) / PIPE_EXIT_DURATION;
      const eased = 1 - Math.pow(1 - progress, 3);
      const pipeRectOut = {
        x: LANES[CENTER_LANE] - PIPE_W / 2,
        y: PLAYER_Y + 6,
        w: PIPE_W,
        h: PIPE_H
      };
      const emergeY = PLAYER_Y + 74 - eased * 74;
      drawExitPlayer(emergeY, eased);
      drawPipe(pipeRectOut);
      ctx.fillStyle = "rgba(8,12,14,0.34)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(246,239,217,0.88)";
      ctx.font = "850 20px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("縦向きに戻して", W / 2, 58);
      ctx.font = "800 14px Segoe UI, sans-serif";
      ctx.fillText("土管から復帰中", W / 2, 84);
    }

    function drawExitPlayer(y, progress) {
      const spriteW = 64;
      const spriteH = 84;
      ctx.save();
      ctx.beginPath();
      ctx.rect(44, 0, W - 88, PLAYER_Y + PIPE_H);
      ctx.clip();
      ctx.globalAlpha = Math.min(1, 0.35 + progress * 0.9);
      if (playerSprite.complete && playerSprite.naturalWidth > 0) {
        ctx.drawImage(playerSprite, LANES[CENTER_LANE] - spriteW / 2, y - spriteH / 2, spriteW, spriteH);
      } else {
        ctx.fillStyle = "#f0c247";
        ctx.fillRect(LANES[CENTER_LANE] - PLAYER_W / 2, y - PLAYER_H / 2, PLAYER_W, PLAYER_H);
      }
      ctx.restore();
    }

    function drawObstacles() {
      for (const obstacle of obstacles) {
        for (const lane of obstacle.lanes) {
          const r = laneRect(lane, obstacle.y, obstacle.h);
          if (obstacle.type === "hole") {
            drawObstacleSprite("hole", r);
            if (obstacle.group === "combo") {
              ctx.fillStyle = "rgba(246,239,217,0.85)";
              ctx.fillRect(r.x + 25, r.y + 2, 18, 5);
            }
          } else {
            drawObstacleSprite("car", r);
            if (obstacle.group === "combo") {
              ctx.fillStyle = "rgba(246,239,217,0.72)";
              ctx.fillRect(r.x + 10, r.y + r.h - 12, r.w - 20, 5);
            }
          }
        }
      }
    }

    function drawObstacleSprite(type, rect) {
      const image = obstacleSprites[type];
      if (image && image.complete && image.naturalWidth > 0) {
        ctx.drawImage(image, rect.x, rect.y, rect.w, rect.h);
        return;
      }
      if (type === "hole") {
        ctx.fillStyle = "#090c0f";
        ctx.beginPath();
        ctx.ellipse(rect.x + rect.w / 2, rect.y + rect.h / 2, rect.w * 0.42, rect.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#4b3026";
        ctx.beginPath();
        ctx.ellipse(rect.x + rect.w / 2, rect.y + rect.h / 2, rect.w * 0.48, rect.h * 0.48, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "rgba(246,239,217,0.18)";
        ctx.fillRect(rect.x + 21, rect.y + 8, rect.w - 42, 3);
      } else {
        ctx.fillStyle = "#dd6655";
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.fillStyle = "rgba(20,22,22,0.32)";
        ctx.fillRect(rect.x + 8, rect.y + 8, rect.w - 16, 8);
      }
    }

    function drawSpeedPanels() {
      for (const panel of speedPanels) {
        const r = panelRect(panel);
        ctx.fillStyle = panel.kind === "up" ? "rgba(240,194,71,0.58)" : "rgba(101,183,216,0.52)";
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.fillStyle = panel.kind === "up" ? "#f6efd9" : "#e8f8ff";
        ctx.font = "800 18px Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(panel.kind === "up" ? ">>" : "<<", r.x + r.w / 2, r.y + 35);
      }
    }

    function drawCoins() {
      for (const coin of coinItems) {
        const x = LANES[coin.lane];
        const y = coin.y;
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.ellipse(x + 2, y + 4, COIN_RADIUS, COIN_RADIUS * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f0c247";
        ctx.beginPath();
        ctx.arc(x, y, COIN_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#f6efd9";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, COIN_RADIUS - 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawSlowGates() {
      for (const gate of slowGates) {
        ctx.fillStyle = "rgba(101,183,216,0.34)";
        ctx.fillRect(44, gate.y, W - 88, gate.h);
        ctx.strokeStyle = "#aee6ff";
        ctx.lineWidth = 2;
        ctx.strokeRect(44, gate.y, W - 88, gate.h);
      }
    }

    function drawPlayer() {
      const r = playerRect();
      const lift = jumpLift();
      const runPhase = roadScroll * 0.16;
      const bob = isJumping() ? 0 : Math.sin(runPhase) * 3;
      const lean = isJumping() ? 0 : Math.sin(runPhase) * 0.07;
      const spriteW = 64;
      const spriteH = 84;
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.fillRect(r.x + 5, r.y + r.h - 4, r.w - 10, isJumping() ? 5 : 8);

      const runFrame = playerRunSprites[Math.floor(roadScroll / 20) % playerRunSprites.length];
      const activePlayerSprite = isJumping() ? playerSprite : runFrame;
      if (activePlayerSprite && activePlayerSprite.complete && activePlayerSprite.naturalWidth > 0) {
        ctx.save();
        ctx.translate(player.x, PLAYER_Y + PLAYER_H / 2 - lift + bob);
        ctx.rotate(lean);
        const jumpScale = isJumping() ? 1.05 : 1;
        ctx.scale(jumpScale, jumpScale);
        ctx.drawImage(activePlayerSprite, -spriteW / 2, -spriteH, spriteW, spriteH);
        ctx.restore();
      } else {
        ctx.fillStyle = "#f0c247";
        ctx.fillRect(r.x, r.y - lift, r.w, r.h);
        ctx.fillStyle = "#f6efd9";
        ctx.fillRect(r.x + r.w - 15, r.y + 12 - lift, 7, 7);
        ctx.fillStyle = "#8c672a";
        ctx.fillRect(r.x + 8, r.y + r.h - 10 - lift, 10, 10);
        ctx.fillRect(r.x + r.w - 18, r.y + r.h - 10 - lift, 10, 10);
      }

      if (player.lane !== CENTER_LANE) {
        ctx.strokeStyle = "rgba(240,194,71,0.9)";
        ctx.lineWidth = 3;
        ctx.strokeRect(LANES[player.lane] - 39, PLAYER_Y - 36, 78, 72);
      }
    }

    function drawSpeedLabel() {
      ctx.fillStyle = "rgba(246,239,217,0.86)";
      ctx.font = "800 18px Segoe UI, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(boostTimer > 0 ? "BOOST" : "SLOW", W - 18, 30);
    }

    function drawSideMode() {
      if (imageReady(backgroundSprites.sideLoop)) {
        drawHorizontalLoopImage(backgroundSprites.sideLoop, loopScroll, 0, 0, W, H);
      } else if (imageReady(backgroundSprites.sideBg) && imageReady(backgroundSprites.sideRoad)) {
        drawCoverImage(backgroundSprites.sideBg, 0, 0, W, H, 0.5, 0.42);
        drawSideBackgroundFlow();
        drawSideRoadImage();
      } else {
        ctx.fillStyle = "#16313a";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#24525b";
        ctx.fillRect(0, SIDE_GROUND_Y, W, H - SIDE_GROUND_Y);
        ctx.fillStyle = "rgba(246,239,217,0.16)";
        for (let x = -roadScroll * 2; x < W + 80; x += 80) {
          ctx.fillRect(x, SIDE_GROUND_Y + 22, 42, 4);
        }
      }

      if (imageReady(backgroundSprites.sideLoop)) {
        drawSideLoopSpeedLines();
      }

      ctx.fillStyle = "rgba(246,239,217,0.88)";
      ctx.font = "800 16px Segoe UI, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(sideExitPipe ? "EXIT PIPE" : `PIPE TRAP ${Math.ceil(sideTimer)}s`, 14, 30);

      for (const coin of sideCoins) {
        drawSideCoin(coin);
      }
      for (const obstacle of sideObstacles) {
        drawSideObstacle(obstacle);
      }
      if (sideExitPipe) {
        drawSideExitPipe(sideExitPipe);
      }
      drawSidePlayer();
    }

    function drawSideLoopSpeedLines() {
      const offset = ((loopScroll * 1.35) % 88 + 88) % 88;
      ctx.fillStyle = "rgba(246,239,217,0.16)";
      for (let x = -offset; x < W + 88; x += 88) {
        ctx.fillRect(x, SIDE_GROUND_Y + 22, 42, 4);
        ctx.fillRect(x + 48, SIDE_GROUND_Y + 54, 24, 3);
      }
    }

    function drawSideBackgroundFlow() {
      const offset = ((roadScroll * 0.65) % 230 + 230) % 230;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = "rgba(255,247,218,0.2)";
      for (let x = -offset - 80; x < W + 230; x += 230) {
        ctx.fillRect(x, 106, 68, 3);
        ctx.fillRect(x + 104, 162, 44, 2);
        ctx.fillRect(x + 34, 238, 78, 3);
      }
      ctx.fillStyle = "rgba(240,194,71,0.18)";
      for (let x = -offset * 0.72; x < W + 180; x += 180) {
        ctx.beginPath();
        ctx.arc(x, SIDE_GROUND_Y - 122, 18, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawSideRoadImage() {
      const image = backgroundSprites.sideRoad;
      const sourceY = image.naturalHeight * 0.49;
      const sourceH = image.naturalHeight - sourceY;
      const destY = SIDE_GROUND_Y - 18;
      ctx.drawImage(image, 0, sourceY, image.naturalWidth, sourceH, 0, destY, W, H - destY);
      drawSideFlowOverlay(destY);
    }

    function drawSideFlowOverlay(destY) {
      const offset = ((roadScroll * 2) % 88 + 88) % 88;
      ctx.fillStyle = "rgba(246,239,217,0.14)";
      for (let x = -offset; x < W + 88; x += 88) {
        ctx.fillRect(x, SIDE_GROUND_Y + 22, 42, 4);
        ctx.fillRect(x + 48, SIDE_GROUND_Y + 54, 24, 3);
      }

      const groundGradient = ctx.createLinearGradient(0, destY, 0, H);
      groundGradient.addColorStop(0, "rgba(255,255,255,0.12)");
      groundGradient.addColorStop(0.25, "rgba(255,255,255,0)");
      groundGradient.addColorStop(1, "rgba(0,0,0,0.22)");
      ctx.fillStyle = groundGradient;
      ctx.fillRect(0, destY, W, H - destY);
    }

    function drawSideCoin(coin) {
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.beginPath();
      ctx.ellipse(coin.x + 2, coin.y + 4, coin.r, coin.r * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#f0c247";
      ctx.beginPath();
      ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#f6efd9";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(coin.x, coin.y, coin.r - 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawSideObstacle(obstacle) {
      if (obstacle.type === "bar") {
        ctx.fillStyle = "#65b7d8";
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
        ctx.fillStyle = "rgba(9,12,15,0.34)";
        ctx.fillRect(obstacle.x + 8, obstacle.y + 9, obstacle.w - 16, 6);
        ctx.fillRect(obstacle.x + 8, obstacle.y + obstacle.h - 14, obstacle.w - 16, 5);
        ctx.fillStyle = "#e8f8ff";
        ctx.font = "850 12px Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("DOWN", obstacle.x + obstacle.w / 2, obstacle.y + obstacle.h / 2 + 4);
        return;
      }
      ctx.fillStyle = "#dd6655";
      ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
      ctx.fillStyle = "rgba(20,22,22,0.32)";
      ctx.fillRect(obstacle.x + 7, obstacle.y + 7, obstacle.w - 14, 7);
    }

    function drawSideExitPipe(pipe) {
      const mouthW = 44;
      ctx.fillStyle = "rgba(0,0,0,0.24)";
      ctx.fillRect(pipe.x + 14, SIDE_GROUND_Y - 5, pipe.w - 28, 10);

      ctx.fillStyle = "#168a44";
      ctx.fillRect(pipe.x + mouthW - 8, pipe.y + 30, pipe.w - mouthW, pipe.h - 42);
      ctx.fillStyle = "#22b45a";
      ctx.fillRect(pipe.x, pipe.y + 14, mouthW, pipe.h - 18);
      ctx.fillStyle = "#5ee37f";
      ctx.fillRect(pipe.x + 8, pipe.y + 23, 11, pipe.h - 36);
      ctx.fillStyle = "rgba(8,36,20,0.38)";
      ctx.fillRect(pipe.x + mouthW - 8, pipe.y + 30, 9, pipe.h - 42);
      ctx.fillRect(pipe.x + pipe.w - 18, pipe.y + 30, 8, pipe.h - 42);

      ctx.strokeStyle = "#0d5f2f";
      ctx.lineWidth = 3;
      ctx.strokeRect(pipe.x, pipe.y + 14, mouthW, pipe.h - 18);
      ctx.strokeRect(pipe.x + mouthW - 8, pipe.y + 30, pipe.w - mouthW, pipe.h - 42);

      ctx.fillStyle = "rgba(4,18,10,0.48)";
      ctx.fillRect(pipe.x + 11, pipe.y + 28, mouthW - 20, pipe.h - 46);
      ctx.fillStyle = "rgba(246,239,217,0.86)";
      ctx.font = "850 12px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("IN", pipe.x + mouthW / 2, pipe.y + pipe.h / 2 + 4);
    }

    function drawSidePlayer() {
      const p = sidePlayerRect();
      const ducking = sideIsDucking();
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.fillRect(p.x + 4, SIDE_GROUND_Y - 4, p.w - 8, 7);
      if (ducking && sideDuckSprite.complete && sideDuckSprite.naturalWidth > 0) {
        const spriteW = 88;
        const spriteH = 54;
        ctx.drawImage(sideDuckSprite, p.x - 20, SIDE_GROUND_Y - spriteH + 2, spriteW, spriteH);
        return;
      }
      const runFrame = sideRunSprites[Math.floor(roadScroll / 20) % sideRunSprites.length];
      if (runFrame && runFrame.complete && runFrame.naturalWidth > 0) {
        const spriteW = 76;
        const spriteH = ducking ? 44 : 72;
        const drawX = p.x - 14;
        const drawY = p.y + p.h - spriteH;
        ctx.save();
        if (ducking) {
          ctx.globalAlpha = 0.98;
        }
        ctx.drawImage(runFrame, drawX, drawY, spriteW, spriteH);
        ctx.restore();
        return;
      }
      ctx.fillStyle = "#f0c247";
      ctx.fillRect(p.x + 8, p.y + (ducking ? 4 : 20), p.w - 14, ducking ? 18 : 30);
      ctx.fillStyle = "#f6a21a";
      ctx.beginPath();
      ctx.arc(p.x + 24, p.y + (ducking ? 7 : 13), ducking ? 13 : 17, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#8c4f23";
      ctx.fillRect(p.x + 10, p.y + p.h - 10, 12, 10);
      ctx.fillRect(p.x + 30, p.y + p.h - 10, 12, 10);
    }

    function onPointerDown(event) {
      touchStart = { x: event.clientX, y: event.clientY };
    }

    function onPointerUp(event) {
      if (!touchStart) return;
      const dx = event.clientX - touchStart.x;
      const dy = event.clientY - touchStart.y;
      touchStart = null;

      if (!running && overlay.classList.contains("show")) {
        resetGame();
        return;
      }

      const adx = Math.abs(dx);
      const ady = Math.abs(dy);
      if (adx < 18 && ady < 18) {
        jump();
      }
    }

    function onStickDown(event) {
      if (!running) return;
      event.preventDefault();
      stickState.active = true;
      stickState.pointerId = event.pointerId;
      stickState.lastDirection = 0;
      moveStick.setPointerCapture(event.pointerId);
      updateStick(event);
    }

    function onStickMove(event) {
      if (!stickState.active || event.pointerId !== stickState.pointerId) return;
      event.preventDefault();
      updateStick(event);
    }

    function onStickUp(event) {
      if (!stickState.active || event.pointerId !== stickState.pointerId) return;
      event.preventDefault();
      resetStick();
    }

    function updateStick(event) {
      const rect = moveStick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const maxRadius = rect.width * 0.34;
      const distance = Math.hypot(dx, dy);
      const scale = distance > maxRadius ? maxRadius / distance : 1;
      const knobX = dx * scale;
      const knobY = dy * scale;
      stickKnob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;

      if (distance < rect.width * 0.2) {
        stickState.lastDirection = 0;
        return;
      }

      const worldDelta = screenToWorldDelta(dx, dy);
      const awx = Math.abs(worldDelta.x);
      const awy = Math.abs(worldDelta.y);
      if (awx < rect.width * 0.22 || awx < awy * 1.35) return;

      const direction = worldDelta.x < 0 ? -1 : 1;
      if (direction === stickState.lastDirection) return;
      moveSide(direction);
      stickState.lastDirection = direction;
    }

    function resetStick() {
      stickState.active = false;
      stickState.pointerId = 0;
      stickState.lastDirection = 0;
      stickKnob.style.transform = "translate(-50%, -50%)";
    }

    function screenToWorldDelta(dx, dy) {
      if (viewDirection === 1) return { x: dy, y: -dx };
      if (viewDirection === 2) return { x: -dx, y: -dy };
      if (viewDirection === 3) return { x: -dy, y: dx };
      return { x: dx, y: dy };
    }

    function handleScreenDirection(dx, dy) {
      const worldDelta = screenToWorldDelta(dx, dy);
      if (Math.abs(worldDelta.x) >= Math.abs(worldDelta.y)) {
        moveSide(worldDelta.x < 0 ? -1 : 1);
      } else if (worldDelta.y < 0) {
        jump();
      }
    }

    function onKeyDown(event) {
      if (event.repeat) return;
      if (event.code === "Space" && !running && overlay.classList.contains("show")) {
        event.preventDefault();
        resetGame();
        return;
      }
      if (event.code === "ArrowUp" || event.code === "Space") {
        event.preventDefault();
        if (event.code === "Space") {
          jump();
        } else {
          handleScreenDirection(0, -1);
        }
      }
      if (event.code === "ArrowLeft") {
        event.preventDefault();
        handleScreenDirection(-1, 0);
      }
      if (event.code === "ArrowRight") {
        event.preventDefault();
        handleScreenDirection(1, 0);
      }
      if (event.code === "ArrowDown") {
        event.preventDefault();
        handleScreenDirection(0, 1);
      }
    }

    function startLoop() {
      if (loopActive) return;
      loopActive = true;
      requestAnimationFrame(loop);
    }

    function loop(now) {
      if (!loopActive) return;
      const elapsed = now - lastTime + frameCarry;
      if (elapsed < FRAME_MS) {
        requestAnimationFrame(loop);
        return;
      }
      const dt = Math.min(0.05, elapsed / 1000 || 0);
      frameCarry = elapsed % FRAME_MS;
      lastTime = now;
      update(dt);
      draw();
      if (!running && gameOver) {
        loopActive = false;
        return;
      }
      requestAnimationFrame(loop);
    }

    startButton.addEventListener("click", resetGame);
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", () => {
      touchStart = null;
    });
    moveStick.addEventListener("pointerdown", onStickDown);
    moveStick.addEventListener("pointermove", onStickMove);
    moveStick.addEventListener("pointerup", onStickUp);
    moveStick.addEventListener("pointercancel", onStickUp);
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("resize", resizeCanvas);

    bestEl.textContent = String(Math.floor(best));
    renderDailyRanking();
    updateHud();
    resizeCanvas();
    draw();
  </script>
</body>
</html>

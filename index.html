<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08172f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RUN DASH!">
  <meta name="description" content="オープンキャンパスで気軽に遊べる3レーン・スワイプランゲーム">
  <meta property="og:type" content="website">
  <meta property="og:title" content="RUN DASH!">
  <meta property="og:description" content="オープンキャンパスで気軽に遊べる3レーン・スワイプランゲーム">
  <meta property="og:image" content="assets/ui/app-icon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="RUN DASH!">
  <meta name="twitter:description" content="オープンキャンパスで気軽に遊べる3レーン・スワイプランゲーム">
  <meta name="twitter:image" content="assets/ui/app-icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/ui/app-icon.svg">
  <title>RUN DASH! オープンキャンパスラン</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101f;
      --bg-2: #0d1930;
      --road: #273038;
      --road-line: #53606a;
      --ink: #fff8df;
      --muted: #b9c3d4;
      --accent: #ffc629;
      --accent-2: #3bd7ff;
      --danger: #ff5d4d;
      --panel: rgba(8, 13, 24, 0.86);
      --panel-strong: rgba(7, 11, 20, 0.94);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      overscroll-behavior: none;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: stretch center;
      overscroll-behavior: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(59, 215, 255, 0.16), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(255, 198, 41, 0.08), transparent 34%),
        linear-gradient(180deg, #08172f 0%, #050910 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      user-select: none;
    }

    .app {
      position: relative;
      width: min(100vw, 430px);
      height: 100svh;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: 7px;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 8px calc(env(safe-area-inset-bottom, 0px) + 8px);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.06), transparent 10%, transparent 90%, rgba(255, 255, 255, 0.06)),
        linear-gradient(180deg, rgba(7, 16, 32, 0.72), rgba(2, 5, 10, 0.52));
      box-shadow:
        inset 10px 0 26px -26px rgba(59, 215, 255, 0.78),
        inset -10px 0 26px -26px rgba(255, 198, 41, 0.62),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 0 0 2px rgba(59, 215, 255, 0.035),
        0 0 28px rgba(59, 215, 255, 0.08),
        0 0 44px rgba(0, 0, 0, 0.46);
    }

    .hud {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: 7px;
      min-height: 54px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(13, 24, 43, 0.7), rgba(2, 5, 10, 0.28));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 10px 22px rgba(0, 0, 0, 0.24);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .hud::before {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 11px;
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 198, 41, 0.12), transparent 34%),
        radial-gradient(circle at 82% 0%, rgba(59, 215, 255, 0.11), transparent 34%);
      pointer-events: none;
    }

    .hud::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: -4px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(59, 215, 255, 0.52), rgba(255, 198, 41, 0.42), transparent);
      box-shadow: 0 0 12px rgba(59, 215, 255, 0.18);
      pointer-events: none;
    }

    h1 {
      display: none;
    }

    .stat {
      position: relative;
      z-index: 1;
      min-width: 0;
      overflow: hidden;
      padding: 8px 6px 9px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(24, 35, 54, 0.96), rgba(5, 8, 14, 0.92));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        0 4px 0 rgba(0, 0, 0, 0.7),
        0 10px 18px rgba(0, 0, 0, 0.34);
      text-align: center;
    }

    .stat::before {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      bottom: 5px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 198, 41, 0.72), transparent);
      box-shadow: 0 0 10px rgba(255, 198, 41, 0.18);
      opacity: 0.72;
      pointer-events: none;
    }

    .stat::after {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 45%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
      pointer-events: none;
    }

    .stat:nth-of-type(1) {
      border-color: rgba(255, 198, 41, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 0 0 1px rgba(255, 198, 41, 0.06),
        0 4px 0 rgba(0, 0, 0, 0.7),
        0 10px 18px rgba(0, 0, 0, 0.34);
    }

    .stat:nth-of-type(2) {
      border-color: rgba(59, 215, 255, 0.24);
    }

    .stat:nth-of-type(2)::before {
      background: linear-gradient(90deg, transparent, rgba(59, 215, 255, 0.66), transparent);
      box-shadow: 0 0 10px rgba(59, 215, 255, 0.18);
    }

    .stat:nth-of-type(3) {
      border-color: rgba(255, 243, 162, 0.24);
    }

    .stat:nth-of-type(3)::before {
      background: linear-gradient(90deg, transparent, rgba(255, 243, 162, 0.62), transparent);
      box-shadow: 0 0 10px rgba(255, 243, 162, 0.15);
    }

    .stat span {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--accent);
      font-size: 10px;
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;
    }

    .stat span::before {
      content: attr(data-icon);
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      margin-right: 4px;
      border-radius: 50%;
      background: rgba(255, 198, 41, 0.18);
      color: #fff3a2;
      font-size: 9px;
      line-height: 1;
      vertical-align: -1px;
    }

    .stat:nth-of-type(2) span,
    .stat:nth-of-type(2) strong {
      color: #dffaff;
    }

    .stat:nth-of-type(2) span::before {
      background: rgba(59, 215, 255, 0.16);
      color: #dffaff;
    }

    .stat:nth-of-type(3) span,
    .stat:nth-of-type(3) strong {
      color: #fff8df;
    }

    .stat:nth-of-type(3) span::before {
      background: rgba(255, 243, 162, 0.18);
      color: #fff8df;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .stat strong {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      color: #ffffff;
      font-size: 19px;
      font-weight: 950;
      line-height: 1;
      text-overflow: ellipsis;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.7);
      white-space: nowrap;
    }

    .stat strong,
    .title-chip strong,
    .result-stat strong,
    .convert-box strong,
    .ranking .rank-number,
    .ranking .rank-score,
    .run-pill strong {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .stat.stat-pop {
      animation: statPop 0.24s ease-out both;
    }

    .stat.stat-best {
      animation: statBestGlow 0.48s ease-out both;
    }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      background: var(--road);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.75),
        0 0 0 2px rgba(59, 215, 255, 0.06),
        0 18px 40px rgba(0, 0, 0, 0.45),
        0 0 28px rgba(59, 215, 255, 0.08);
      touch-action: none;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 8%, transparent 90%, rgba(0, 0, 0, 0.22)),
        linear-gradient(90deg, rgba(59, 215, 255, 0.18), transparent 10%, transparent 90%, rgba(255, 198, 41, 0.14));
      opacity: 0.65;
      pointer-events: none;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: inherit;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 14px 14px 22px -24px rgba(255, 255, 255, 0.72),
        inset -14px 14px 22px -24px rgba(59, 215, 255, 0.5),
        inset 0 -46px 60px rgba(0, 0, 0, 0.2);
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      transition: filter 0.22s ease, transform 0.22s ease;
      user-select: none;
    }

    .stage.title-screen canvas {
      filter: saturate(0.72) brightness(0.64);
      transform: scale(1.015);
    }

    .move-controls {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, 50px);
      grid-template-rows: 50px;
      gap: 10px;
      padding: 8px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      transform: translateY(6px);
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .move-controls::before,
    .jump-control::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 58%),
        rgba(2, 5, 10, 0.32);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 10px 20px rgba(0, 0, 0, 0.24);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      pointer-events: none;
    }

    .move-controls::after,
    .jump-control::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 5px;
      width: 42%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.36), transparent);
      opacity: 0.7;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .jump-control {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 2;
      padding: 8px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      transform: translateY(6px);
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .stage.playing .move-controls,
    .stage.playing .jump-control {
      opacity: 0.94;
      pointer-events: auto;
      transform: translateY(0);
    }

    .control-button {
      position: relative;
      z-index: 1;
      width: 50px;
      height: 50px;
      min-height: 50px;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.76);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 106%, rgba(111, 70, 0, 0.46), transparent 48%),
        linear-gradient(180deg, #ffe37a 0%, #ffc629 54%, #d79300 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.42),
        inset 0 -4px 0 rgba(101, 63, 0, 0.3),
        0 5px 0 rgba(75, 48, 0, 0.9),
        0 12px 18px rgba(0, 0, 0, 0.36);
      color: #1a1405;
      font-size: 25px;
      font-weight: 950;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.34);
      transition: transform 0.08s ease, filter 0.08s ease, box-shadow 0.08s ease;
    }

    .control-button::before {
      content: "";
      position: absolute;
      inset: -5px;
      border: 1px solid rgba(255, 198, 41, 0.28);
      border-radius: inherit;
      box-shadow: 0 0 14px rgba(255, 198, 41, 0.12);
      pointer-events: none;
    }

    .control-button::after {
      content: "";
      position: absolute;
      inset: 5px 7px auto;
      height: 36%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent);
      pointer-events: none;
    }

    .control-button:active {
      transform: translateY(4px) scale(0.94);
      filter: brightness(1.06);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.35),
        inset 0 -2px 0 rgba(101, 63, 0, 0.3),
        0 1px 0 rgba(75, 48, 0, 0.9),
        0 7px 12px rgba(0, 0, 0, 0.3);
    }

    .dir-left {
      grid-column: 1;
      grid-row: 1;
    }

    .dir-right {
      grid-column: 2;
      grid-row: 1;
    }

    .jump-control .control-button {
      width: 72px;
      height: 72px;
      min-height: 72px;
      border-color: rgba(255, 255, 255, 0.9);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.34), transparent 34%),
        radial-gradient(circle at 50% 108%, rgba(111, 70, 0, 0.48), transparent 50%),
        linear-gradient(180deg, #fff173 0%, #ffc629 52%, #d48800 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.46),
        inset 0 -5px 0 rgba(101, 63, 0, 0.34),
        0 6px 0 rgba(75, 48, 0, 0.94),
        0 0 0 5px rgba(59, 215, 255, 0.12),
        0 0 24px rgba(59, 215, 255, 0.22),
        0 0 18px rgba(255, 198, 41, 0.2),
        0 14px 20px rgba(0, 0, 0, 0.38);
      font-size: 16px;
      letter-spacing: 0;
    }

    .jump-control .control-button:active {
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.35),
        inset 0 -2px 0 rgba(101, 63, 0, 0.3),
        0 1px 0 rgba(75, 48, 0, 0.9),
        0 0 0 5px rgba(59, 215, 255, 0.1),
        0 0 18px rgba(59, 215, 255, 0.2),
        0 7px 12px rgba(0, 0, 0, 0.3);
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(2, 5, 10, 0.46);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
      -webkit-backdrop-filter: blur(2px) saturate(0.9);
      backdrop-filter: blur(2px) saturate(0.9);
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay.show .dialog {
      animation: dialogPop 0.18s ease-out both;
    }

    .overlay[data-mode="title"],
    .overlay[data-mode="ranking"] {
      align-items: stretch;
      padding: 22px 18px;
      background:
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.04) 0 2px, transparent 2px 22px),
        linear-gradient(180deg, rgba(8, 18, 45, 0.2), rgba(4, 8, 18, 0.88) 58%, rgba(3, 6, 13, 0.98)),
        rgba(5, 9, 18, 0.72);
    }

    .overlay[data-mode="result"] {
      background:
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.03) 0 2px, transparent 2px 20px),
        radial-gradient(circle at 50% 36%, rgba(59, 215, 255, 0.14), transparent 38%),
        linear-gradient(180deg, rgba(2, 5, 10, 0.35), rgba(2, 5, 10, 0.78)),
        rgba(2, 5, 10, 0.55);
    }

    .dialog {
      width: min(100%, 350px);
      max-height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      background:
        radial-gradient(circle at 50% 0%, rgba(59, 215, 255, 0.1), transparent 42%),
        linear-gradient(180deg, rgba(17, 29, 48, 0.95), rgba(5, 9, 17, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 0 0 1px rgba(59, 215, 255, 0.05),
        0 22px 60px rgba(0, 0, 0, 0.62),
        0 0 24px rgba(59, 215, 255, 0.1);
      text-align: center;
      transform-origin: center;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 198, 41, 0.72) rgba(4, 8, 15, 0.62);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .dialog::-webkit-scrollbar,
    .ranking::-webkit-scrollbar {
      width: 8px;
    }

    .dialog::-webkit-scrollbar-track,
    .ranking::-webkit-scrollbar-track {
      border-radius: 999px;
      background: rgba(4, 8, 15, 0.62);
    }

    .dialog::-webkit-scrollbar-thumb,
    .ranking::-webkit-scrollbar-thumb {
      border: 2px solid rgba(4, 8, 15, 0.62);
      border-radius: 999px;
      background: linear-gradient(180deg, #fff077, #ffc629 55%, #d48a00);
    }

    .dialog.new-best {
      position: relative;
      border-color: rgba(255, 198, 41, 0.95);
      background:
        radial-gradient(circle at 50% -8%, rgba(255, 239, 143, 0.24), transparent 34%),
        radial-gradient(circle at 18% 12%, rgba(255, 239, 143, 0.18), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(255, 198, 41, 0.14), transparent 30%),
        linear-gradient(180deg, rgba(62, 45, 8, 0.96), rgba(6, 10, 18, 0.97) 48%),
        var(--panel-strong);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 0 26px rgba(255, 198, 41, 0.08),
        0 0 0 2px rgba(255, 198, 41, 0.26),
        0 0 38px rgba(255, 198, 41, 0.34),
        0 22px 60px rgba(0, 0, 0, 0.62);
    }

    .dialog.new-best::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 4px;
      border-radius: 0 0 999px 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 239, 143, 0.95), transparent);
      box-shadow: 0 0 18px rgba(255, 198, 41, 0.5);
      pointer-events: none;
    }

    .dialog.new-best h2::before {
      content: "NEW BEST!";
      display: block;
      margin-bottom: 6px;
      color: #fff2a6;
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 0 12px rgba(255, 198, 41, 0.72);
    }

    .dialog.new-best h2 {
      color: #fff7c2;
      text-shadow:
        0 3px 0 rgba(0, 0, 0, 0.72),
        0 0 18px rgba(255, 198, 41, 0.38);
    }

    .dialog h2 {
      margin: 0 0 8px;
      color: #ffffff;
      font-size: 31px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.66);
    }

    .overlay[data-mode="result"] .dialog:not(.new-best) h2::before {
      content: "RESULT";
      display: block;
      width: max-content;
      margin: 0 auto 6px;
      padding: 3px 10px;
      border: 1px solid rgba(59, 215, 255, 0.22);
      border-radius: 999px;
      background: rgba(59, 215, 255, 0.12);
      color: #dffaff;
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
      text-shadow: none;
      box-shadow: 0 0 12px rgba(59, 215, 255, 0.12);
    }

    .overlay[data-mode="title"] .dialog {
      align-self: stretch;
      display: grid;
      grid-template-rows: 1fr auto auto auto;
      width: min(100%, 366px);
      overflow: hidden;
      border: 0;
      background:
        radial-gradient(circle at 50% 26%, rgba(59, 215, 255, 0.2), transparent 28%),
        linear-gradient(180deg, rgba(8, 18, 43, 0.03), rgba(8, 13, 25, 0.62) 52%, rgba(5, 9, 17, 0.96));
      box-shadow: none;
    }

    .overlay[data-mode="title"] .dialog::before,
    .overlay[data-mode="title"] .dialog::after {
      content: "";
      align-self: end;
      justify-self: center;
      grid-column: 1;
      grid-row: 1;
      width: min(88%, 330px);
      height: 10px;
      margin-bottom: 82px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 198, 41, 0.92), transparent);
      filter: drop-shadow(0 0 10px rgba(255, 198, 41, 0.58));
      transform: skewX(-24deg);
    }

    .overlay[data-mode="title"] .dialog::after {
      width: min(66%, 260px);
      height: 7px;
      margin-bottom: 62px;
      background: linear-gradient(90deg, transparent, rgba(59, 215, 255, 0.86), transparent);
      filter: drop-shadow(0 0 10px rgba(59, 215, 255, 0.48));
    }

    .overlay[data-mode="title"] .dialog h2 {
      align-self: end;
      position: relative;
      z-index: 1;
      margin-bottom: 12px;

        radial-gradient(circle at 50% 0%, rgba(255, 198, 41, 0.13), transparent 56%),

      gap: 8px;
      min-height: 56px;

      position: relative;
      overflow: hidden;
      padding: 8px 6px;

      background: rgba(4, 8, 15, 0.84);
      text-align: center;

      border-color: rgba(255, 198, 41, 0.2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 12px rgba(255, 198, 41, 0.08);
    }

    .convert-box:last-child {
      border-color: rgba(59, 215, 255, 0.22);
      background:
        radial-gradient(circle at 50% 0%, rgba(59, 215, 255, 0.1), transparent 56%),

      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.09),
        0 0 14px rgba(59, 215, 255, 0.1);

      content: "";

      background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), transparent);
      pointer-events: none;
    }

    .convert-box span {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--accent);
      font-size: 10px;
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;

    .convert-box strong {
      position: relative;
      z-index: 1;
      display: block;

      color: #ffffff;
      font-size: 20px;
      font-weight: 950;
      line-height: 1;

    .convert-box.pop strong {
      animation: scorePop 0.2s ease-out;
    }

    .convert-lane {
      position: relative;
      height: 44px;
      overflow: hidden;
    }

    .convert-lane::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 21px;
      height: 4px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 243, 162, 0.0) 0 8px, rgba(255, 243, 162, 0.7) 8px 14px),
        linear-gradient(90deg, rgba(255, 198, 41, 0.08), rgba(255, 198, 41, 0.6), rgba(255, 198, 41, 0.08));
      background-size: 44px 100%, 100% 100%;
      box-shadow: 0 0 12px rgba(255, 198, 41, 0.18);
    }

    .conversion.show .convert-lane::before {
      animation: bonusLaneFlow 0.55s linear infinite;
    }

    .convert-lane::after {
      content: "➜";
      position: absolute;
      left: 50%;
      top: 11px;
      transform: translateX(-50%);
      color: rgba(255, 243, 162, 0.94);

      font-weight: 950;
      text-shadow:
        0 2px 0 rgba(0, 0, 0, 0.45),
        0 0 14px rgba(255, 198, 41, 0.56);

    .fly-coin {

      left: 0;
      top: 10px;
      width: 22px;
      height: 22px;
      border: 2px solid #fff4b8;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff4a7, #ffc629 58%, #c98600);
      box-shadow: 0 0 12px rgba(255, 198, 41, 0.58);
      animation: coinToScore 0.16s ease-in forwards;

    @keyframes coinToScore {
      0% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
      }
      65% {
        transform: translateX(calc(var(--coin-travel, 140px) * 0.74)) translateY(-11px) scale(1.1);
        opacity: 1;
      }
      100% {
        transform: translateX(var(--coin-travel, 140px)) translateY(1px) scale(0.35);
        opacity: 0;
      }
    }

    @keyframes bonusLaneFlow {
      to {
        background-position: 44px 0, 0 0;
      }
    }

    @keyframes scorePop {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.18);
        color: var(--accent);
      }
      100% {
        transform: scale(1);
      }

      0% {
        transform: translateY(0) scale(1);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          0 4px 0 rgba(0, 0, 0, 0.7),
          0 10px 18px rgba(0, 0, 0, 0.34);
      }
      48% {
        transform: translateY(-2px) scale(1.04);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          0 4px 0 rgba(83, 55, 0, 0.72),
          0 0 22px rgba(255, 198, 41, 0.28),
          0 14px 24px rgba(0, 0, 0, 0.38);
      }
      100% {
        transform: translateY(0) scale(1);
      }

        transform: scale(1);
      }

        transform: scale(1.045);
        border-color: rgba(255, 198, 41, 0.7);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          0 4px 0 rgba(83, 55, 0, 0.72),
          0 0 28px rgba(255, 198, 41, 0.36);
      }
      100% {
        transform: scale(1);
      }

    @keyframes hintPop {

        transform: translateY(0);
        border-color: rgba(255, 255, 255, 0.08);
      }
      45% {
        transform: translateY(-1px);
        border-color: rgba(255, 198, 41, 0.35);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 0 16px rgba(255, 198, 41, 0.16);
        color: rgba(255, 248, 223, 0.95);
      }
      100% {
        transform: translateY(0);
      }

      0% {
        transform: translateY(10px) scale(0.97);
        opacity: 0;
      }
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

        box-shadow: 0 0 24px rgba(59, 215, 255, 0.28);

        box-shadow: 0 0 18px rgba(59, 215, 255, 0.12);

          inset 0 -5px 0 rgba(102, 62, 0, 0.3),
          0 7px 0 rgba(76, 48, 0, 0.96),
          0 16px 26px rgba(0, 0, 0, 0.42);

          0 0 24px rgba(255, 198, 41, 0.32),
          0 18px 30px rgba(0, 0, 0, 0.45);

      42% {

      100% {
        transform: translateX(410%) skewX(-20deg);
        opacity: 0;
      }

    .ranking {
      position: relative;
      min-height: 0;
      margin: 0 0 14px;
      padding: 8px;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 198, 41, 0.72) rgba(4, 8, 15, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 13px;
      background:
        linear-gradient(180deg, rgba(14, 24, 42, 0.52), rgba(2, 5, 10, 0.28));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 18px 18px -22px rgba(255, 255, 255, 0.34),
        inset 0 -20px 18px -22px rgba(0, 0, 0, 0.9);
      list-style: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      text-align: left;
    }

    .ranking::before {
      content: "";
      position: sticky;
      top: 0;
      z-index: 2;
      display: block;

      place-items: center;
      min-width: 24px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(0, 0, 0, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      font-size: 8px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0;
    }

    #photoButton::before {
      content: "CAM";
      color: #dffaff;
    }

    #saveEntryButton::before {
      content: "OK";
      color: #151007;
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.36);
    }

    .entry-actions button::after {
      content: "";
      position: absolute;
      inset: 1px 2px auto;
      height: 38%;
      border-radius: 8px 8px 12px 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent);
      pointer-events: none;
    }

    .entry-actions button:active:not(:disabled) {
      transform: translateY(2px) scale(0.98);
      filter: brightness(0.98);
    }

    .entry-actions button:focus-visible {
      outline: 3px solid rgba(59, 215, 255, 0.58);
      outline-offset: 2px;
    }

    .entry-actions button:disabled {
      cursor: default;
      filter: saturate(0.72) brightness(0.86);
      opacity: 0.72;
    }

    #photoButton {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(180deg, #243449, #111926);
      color: var(--ink);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        inset 0 -3px 0 rgba(0, 0, 0, 0.34),
        0 3px 0 rgba(0, 0, 0, 0.72);
    }

    #saveEntryButton {
      border: 1px solid rgba(255, 255, 255, 0.32);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.34), transparent 38%),
        radial-gradient(circle at 50% 112%, rgba(116, 72, 0, 0.42), transparent 50%),
        linear-gradient(180deg, #fff077, #ffc629 52%, #d48a00);
      color: #151007;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        inset 0 -3px 0 rgba(102, 62, 0, 0.24),
        0 0 12px rgba(255, 198, 41, 0.12),
        0 4px 0 rgba(76, 48, 0, 0.78);
    }

    .score-entry.saved #saveEntryButton {
      background: linear-gradient(180deg, #96f0ff, #3bd7ff 52%, #188aa8);
      color: #03131a;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        0 3px 0 rgba(0, 62, 82, 0.76);
    }

    .score-entry.saved #saveEntryButton:disabled {
      filter: none;
      opacity: 1;
    }

    .score-entry.saved #photoButton:disabled {
      opacity: 0.58;
    }

    @media (hover: hover) and (pointer: fine) {
      .control-button:hover,
      .entry-photo:hover:not(:disabled),
      .entry-actions button:hover:not(:disabled),
      .menu-actions button:hover {
        filter: brightness(1.05);
      }

      .menu-actions button + button:hover {
        filter: brightness(1.12);
      }
    }

    .entry-fields small {
      position: relative;
      display: block;
      min-height: 28px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      line-height: 1.35;
      padding: 6px 8px 6px 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(0, 0, 0, 0.1));
    }

    .entry-fields small::before {
      content: "i";
      position: absolute;
      left: 8px;
      top: 50%;
      width: 12px;
      height: 12px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 198, 41, 0.2);
      color: #fff3a2;
      font-size: 8px;
      font-weight: 950;
      line-height: 1;
      transform: translateY(-50%);
    }

    .score-entry.saved .entry-fields small {
      border-color: rgba(59, 215, 255, 0.28);
      background:
        linear-gradient(180deg, rgba(59, 215, 255, 0.13), rgba(0, 0, 0, 0.08));
      color: #dffaff;
    }

    .score-entry.saved .entry-fields small::before {
      content: "✓";
      background: rgba(59, 215, 255, 0.24);
      color: #dffaff;
    }

    #photoVideo {
      grid-column: 1 / -1;
      width: 100%;
      max-height: 160px;
      border-radius: 10px;
      background: #000;
      object-fit: cover;
      border: 1px solid rgba(59, 215, 255, 0.42);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 10px 22px rgba(0, 0, 0, 0.34),
        0 0 18px rgba(59, 215, 255, 0.12);
      animation: cardIn 0.18s ease-out both;
    }

    .run-strip {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 24px;
      padding: 0 2px;
    }

    .run-pill {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 0;
      overflow: hidden;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent 0 14%, rgba(255, 255, 255, 0.12) 14% 86%, transparent 86%) center / 100% 4px no-repeat,
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 54%),
        linear-gradient(180deg, rgba(22, 34, 55, 0.74), rgba(3, 6, 13, 0.78));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.36),
        0 6px 14px rgba(0, 0, 0, 0.22);
      text-align: center;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .run-pill::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--effect-progress, 0%);
      background:
        radial-gradient(circle at 100% 50%, rgba(255, 255, 255, 0.58), transparent 18px),
        linear-gradient(90deg, rgba(59, 215, 255, 0.1), rgba(59, 215, 255, 0.56));
      opacity: 0;
      transition: width 0.1s linear, opacity 0.12s ease;
    }

    .run-pill::after {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 45%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
      pointer-events: none;
    }

    .run-pill.boost::before,
    .run-pill.slow::before {
      opacity: 1;
    }

    .run-pill.slow::before {
      background:
        radial-gradient(circle at 100% 50%, rgba(255, 255, 255, 0.48), transparent 18px),
        linear-gradient(90deg, rgba(255, 93, 77, 0.12), rgba(255, 93, 77, 0.58));
    }

    .run-pill span,
    .run-pill strong {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .run-pill span {
      display: inline-grid;
      place-items: center;
      min-width: 42px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 198, 41, 0.14);
      color: #fff3a2;
      font-size: 10px;
    }

    .run-pill strong {
      min-width: 48px;
      text-align: left;
    }

    .run-pill.boost,
    .run-pill.slow,
    .run-pill.active {
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 14px rgba(59, 215, 255, 0.12);
    }

    .run-pill.boost strong,
    .run-pill.boost span {
      color: #dffaff;
    }

    .run-pill.boost span {
      background: rgba(59, 215, 255, 0.18);
    }

    .run-pill.slow strong,
    .run-pill.slow span {
      color: #ffe0dc;
    }

    .run-pill.slow span {
      background: rgba(255, 93, 77, 0.18);
    }

    .footer {
      min-height: 30px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(11, 21, 36, 0.48), rgba(2, 5, 10, 0.36));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.07),
        0 6px 14px rgba(0, 0, 0, 0.16);
      color: rgba(255, 248, 223, 0.78);
      font-size: 12px;
      font-weight: 750;
      text-align: center;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .footer::before {
      content: "INFO";
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      height: 18px;
      padding: 0 7px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 220, 96, 0.98), rgba(255, 177, 25, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 2px 5px rgba(0, 0, 0, 0.22);
      color: #18110a;
      font-size: 9px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0;
    }

    .footer span {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
      min-height: 18px;
      padding: 2px 8px 2px 7px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 48%),
        rgba(4, 8, 15, 0.32);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -1px 0 rgba(0, 0, 0, 0.18);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.48);
    }

    .footer span::before {
      content: "!";
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: #fff3a2;
      box-shadow: 0 0 9px rgba(255, 198, 41, 0.72);
      color: transparent;
    }

    .footer.hint-pop {
      animation: hintPop 0.28s ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }

      .overlay[data-mode="title"] .menu-actions button:first-child {
        animation: none !important;
      }

      .overlay[data-mode="title"] .menu-actions button:first-child::after {
        display: none;
      }

      .conversion.show .convert-lane::before {
        animation: none !important;
      }
    }

    @media (max-width: 430px), (max-height: 700px) {
      .app {
        gap: 5px;
        padding: calc(env(safe-area-inset-top, 0px) + 6px) 6px calc(env(safe-area-inset-bottom, 0px) + 6px);
      }

      .hud {
        gap: 5px;
        min-height: 46px;
        padding: 3px;
      }

      .stat {
        padding: 6px 4px 7px;
      }

      .stat span {
        font-size: 9px;
      }

      .stat span::before {
        width: 14px;
        height: 14px;
        margin-right: 3px;
        font-size: 8px;
      }

      .stat strong {
        margin-top: 4px;
        padding-top: 4px;
        font-size: 16px;
      }

      .result-stat:first-child {
        padding: 11px 8px 12px;
      }

      .result-stat:first-child strong {
        font-size: 25px;
      }

      .dialog.new-best .result-stat:first-child strong {
        font-size: 27px;
      }

      .conversion {
        padding: 24px 9px 9px;
      }

      .convert-row {
        grid-template-columns: 66px 1fr 76px;
        gap: 6px;
      }

      .convert-box strong {
        font-size: 18px;
      }

      .result-stat span::before {
        width: 14px;
        height: 14px;
        margin-right: 3px;
        font-size: 8px;
      }

      .move-controls {
        left: 10px;
        bottom: 10px;
        grid-template-columns: repeat(2, 44px);
        grid-template-rows: 44px;
        gap: 8px;
        padding: 7px;
      }

      .jump-control {
        right: 10px;
        bottom: 10px;
        padding: 7px;
      }

      .control-button {
        width: 44px;
        height: 44px;
        min-height: 44px;
      }

      .jump-control .control-button {
        width: 64px;
        height: 64px;
        min-height: 64px;
      }

      .overlay[data-mode="title"],
      .overlay[data-mode="ranking"] {
        padding: 16px 12px;
      }

      .dialog {
        padding: 15px;
      }

      .overlay[data-mode="title"] .dialog h2 {
        font-size: 56px;
      }

      .overlay[data-mode="title"] .menu-actions {
        gap: 9px;
      }

      .overlay[data-mode="title"] .menu-actions button {
        min-height: 56px;
        font-size: 22px;
      }

      .overlay[data-mode="title"] .menu-actions button + button {
        min-height: 50px;
        font-size: 16px;
      }

      .overlay[data-mode="ranking"] .dialog h2 {
        padding-top: 17px;
        font-size: 30px;
      }

      .overlay[data-mode="ranking"] .dialog p {
        margin-bottom: 10px;
        font-size: 12px;
      }

      .overlay[data-mode="result"] .dialog p {
        padding: 5px 9px;
        font-size: 12px;
      }

      .title-chip {
        padding: 7px 5px 8px;
      }

      .title-chip span {
        font-size: 9px;
      }

      .title-chip span::before {
        width: 13px;
        height: 13px;
        margin-right: 3px;
        font-size: 7px;
      }

      .title-chip strong {
        font-size: 14px;
      }

      .ranking li {
        padding: 8px 9px;
      }

      .ranking {
        padding: 6px;
      }

      .ranking .rank-number {
        min-width: 30px;
        padding: 3px 5px;
        font-size: 11px;
      }

      .ranking .rank-score {
        padding: 4px 6px;
        font-size: 13px;
      }

      .ranking li.rank-1,
      .ranking li.rank-2,
      .ranking li.rank-3 {
        min-height: 52px;
      }

      .score-entry {
        grid-template-columns: 58px 1fr;
        gap: 8px;
        padding: 29px 9px 9px;
      }

      .entry-photo {
        width: 54px;
        height: 54px;
        min-height: 54px;
      }

      .entry-photo::before {
        top: -8px;
        min-width: 22px;
        height: 15px;
        padding: 0 5px;
        font-size: 7px;
      }

      .entry-fields {
        gap: 6px;
      }

      .entry-fields input {
        min-height: 38px;
        padding: 8px 10px;
      }

      .entry-fields small {
        min-height: 25px;
        padding: 5px 7px 5px 23px;
        font-size: 9px;
      }

      .run-pill {
        gap: 5px;
        min-height: 24px;
        padding: 4px 8px;
      }

      .run-pill span {
        min-width: 36px;
        padding: 2px 6px;
        font-size: 9px;
      }

      .run-pill strong {
        min-width: 42px;
      }

      .footer {
        min-height: 22px;
        padding: 3px 8px;
        font-size: 10px;
      }

      .footer::before {
        min-width: 31px;
        height: 15px;
        padding: 0 5px;
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hud">
      <h1>RUN DASH!</h1>
      <div class="stat" role="group" aria-label="スコア 0点"><span id="scoreLabel" data-icon="S">SCORE</span><strong id="distance">0</strong></div>
      <div class="stat" role="group" aria-label="ベスト 0点"><span data-icon="B">BEST</span><strong id="best">0</strong></div>
      <div class="stat" role="group" aria-label="コイン 0枚"><span data-icon="C">COINS</span><strong id="todayRank">0</strong></div>
    </header>

    <section class="stage" id="stage">
      <canvas id="game" width="390" height="720" role="img" aria-label="3レーンのランゲーム画面">3レーンのランゲーム画面</canvas>
      <div class="move-controls" id="moveControls" aria-label="左右移動ボタン">
        <button class="control-button dir-left" id="leftButton" type="button" aria-label="左へ移動">&larr;</button>
        <button class="control-button dir-right" id="rightButton" type="button" aria-label="右へ移動">&rarr;</button>
      </div>
      <div class="jump-control" id="jumpControl" aria-label="ジャンプボタン">
        <button class="control-button" id="jumpButton" type="button" aria-label="ジャンプ">JUMP</button>
      </div>
      <div class="overlay show" id="overlay" aria-hidden="false">
        <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="overlayTitle" aria-describedby="overlayText">
          <h2 id="overlayTitle">RUN DASH!</h2>
          <p id="overlayText">左右で避けて、ジャンプで穴を越えろ！</p>
          <div class="title-meta" id="titleMeta" hidden aria-hidden="true"></div>
          <div class="result-stats" id="resultStats" hidden aria-hidden="true"></div>
          <div class="conversion" id="scoreConvert" aria-hidden="true" role="group" aria-label="コイン換算">
            <div class="convert-row">
              <div class="convert-box"><span>COINS</span><strong id="convertCoins">0</strong></div>
              <div class="convert-lane" id="convertLane"></div>
              <div class="convert-box" id="convertScoreBox"><span>SCORE</span><strong id="convertScore">0</strong></div>
            </div>
          </div>
          <ol class="ranking" id="dailyRanking" aria-label="今日のランキング"></ol>
          <div class="score-entry" id="scoreEntry" hidden aria-hidden="true">
            <button class="entry-photo" id="photoPreview" type="button" aria-label="写真を撮る"><span>写真</span></button>
            <div class="entry-fields">
              <input id="playerName" type="text" maxlength="12" placeholder="名前" autocomplete="nickname" enterkeyhint="done" aria-label="ランキングに登録する名前">
              <div class="entry-actions">
                <button id="photoButton" type="button">写真</button>
                <button id="saveEntryButton" type="button">登録</button>
              </div>
              <small id="photoStatus" role="status" aria-live="polite">登録を押した時だけ、名前とスコアを保存します</small>
            </div>
            <video id="photoVideo" playsinline muted hidden></video>
            <canvas id="photoCanvas" width="96" height="96" hidden></canvas>
          </div>
          <div class="menu-actions">
            <button id="startButton" type="button">スタート</button>
            <button id="rankingButton" type="button">ランキング</button>
          </div>
        </div>
      </div>
    </section>

    <div class="run-strip" aria-label="ラン状態">
      <div class="run-pill" id="timePill" role="group" aria-label="経過時間 0:00"><span>TIME</span><strong id="timeStatus">0:00</strong></div>
    </div>

    <footer class="footer">
      <span id="hint" aria-live="polite">2分目安。左右で移動、ジャンプで回避</span>
    </footer>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const stageEl = document.getElementById("stage");
    const scoreLabel = document.getElementById("scoreLabel");
    const distanceEl = document.getElementById("distance");
    const bestEl = document.getElementById("best");
    const todayRankEl = document.getElementById("todayRank");
    const scoreStat = distanceEl.closest(".stat");
    const bestStat = bestEl.closest(".stat");
    const coinStat = todayRankEl.closest(".stat");
    const hintEl = document.getElementById("hint");
    const timePill = document.getElementById("timePill");
    const timeStatus = document.getElementById("timeStatus");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const titleMeta = document.getElementById("titleMeta");
    const resultStats = document.getElementById("resultStats");
    const scoreConvert = document.getElementById("scoreConvert");
    const convertCoinsEl = document.getElementById("convertCoins");
    const convertLane = document.getElementById("convertLane");
    const convertScoreEl = document.getElementById("convertScore");
    const convertScoreBox = document.getElementById("convertScoreBox");
    const dailyRankingEl = document.getElementById("dailyRanking");
    const startButton = document.getElementById("startButton");
    const rankingButton = document.getElementById("rankingButton");
    const scoreEntry = document.getElementById("scoreEntry");
    const playerNameInput = document.getElementById("playerName");
    const photoButton = document.getElementById("photoButton");
    const saveEntryButton = document.getElementById("saveEntryButton");
    const photoPreview = document.getElementById("photoPreview");
    const photoStatus = document.getElementById("photoStatus");
    const photoVideo = document.getElementById("photoVideo");
    const photoCanvas = document.getElementById("photoCanvas");
    const leftButton = document.getElementById("leftButton");
    const rightButton = document.getElementById("rightButton");
    const jumpButton = document.getElementById("jumpButton");
    const ASSET_VERSION = "imagegen-8";
    const assetUrl = (path) => `${path}?v=${ASSET_VERSION}`;
    const playerRunSprites = ["0", "1", "2", "3"].map((frame) => {
      const image = new Image();
      image.src = assetUrl(`assets/character/imagegen-runner-${frame}.png`);
      image.addEventListener("load", draw);
      return image;
    });
    const playerSprite = playerRunSprites[0];
    const playerJumpSprite = new Image();
    playerJumpSprite.src = assetUrl("assets/character/imagegen-runner-jump.png");
    playerJumpSprite.addEventListener("load", draw);
    const obstacleSprites = {
      car: new Image(),
      hole: new Image()
    };
    obstacleSprites.car.src = assetUrl("assets/obstacles/imagegen-car.png");
    obstacleSprites.hole.src = assetUrl("assets/obstacles/imagegen-hole.png");
    Object.values(obstacleSprites).forEach((image) => image.addEventListener("load", draw));
    const gimmickSprites = {
      boost: new Image(),
      slow: new Image()
    };
    gimmickSprites.boost.src = assetUrl("assets/gimmicks/imagegen-boost-pad.png");
    gimmickSprites.slow.src = assetUrl("assets/gimmicks/imagegen-slow-pad.png");
    Object.values(gimmickSprites).forEach((image) => image.addEventListener("load", draw));
    const backgroundSprites = {
      laneBg: new Image(),
      laneRoad: new Image(),
      laneLoop: new Image()
    };
    backgroundSprites.laneBg.src = assetUrl("assets/backgrounds/lane-background.png");
    backgroundSprites.laneRoad.src = assetUrl("assets/backgrounds/lane-road.png");
    backgroundSprites.laneLoop.src = assetUrl("assets/backgrounds/lane-loop-road.png");
    Object.values(backgroundSprites).forEach((image) => image.addEventListener("load", draw));

    const W = 390;
    const H = 720;
    const FRAME_MS = 1000 / 30;
    const LANES = [98, 195, 292];
    const CENTER_LANE = 1;
    const PLAYER_Y = 590;
    const PLAYER_W = 46;
    const PLAYER_H = 58;

    const SPEED_GAIN = 0.0017;

    const JUMP_BUFFER_TIME = 0.18;
    const JUMP_BUFFER_ARM_TIME = 0.24;
    const SLOW_DURATION = 3.7;
    const SLOW_FACTOR = 0.55;
    const BOOST_DURATION = 3.0;
    const BOOST_FACTOR = 1.55;
    const COIN_VALUE = 100;
    const COIN_RADIUS = 10;
    const SWIPE_MIN = 36;
    const TAP_JUMP_BOTTOM_DEAD_ZONE = 112;
    const OBSTACLE_CLEARANCE = 285;
    const PANEL_CLEARANCE = 170;
    const WARMUP_DURATION = 22;
    const FULL_DIFFICULTY_TIME = 115;
    const FIRST_HOLE_TIME = 6;
    const FIRST_CENTER_BLOCK_TIME = 8;
    const READY_GRACE_TIME = 1.8;
    const TWO_MINUTE_TARGET = 120;
    const REGISTER_SAVE_TOKEN = Symbol("register-save");

    let running = false;
    let gameOver = false;
    let lastTime = 0;
    let frameCarry = 0;
    let loopActive = false;
    let runTime = 0;
    let targetTimeAnnounced = false;
    let distance = 0;
    let coins = 0;
    let scoreConvertInterval = 0;
    let best = Number(localStorage.getItem("laneRunnerBestScore") || 0);
    let bestPaceAnnounced = false;
    let speed = BASE_SPEED;
    let roadScroll = 0;
    let loopScroll = 0;
    let spawnTimer = 0;
    let coinTimer = 0;
    let panelTimer = 0;
    let slowTimer = 0;
    let boostTimer = 0;
    let readyTimer = 0;
    let jumpTimer = 0;
    let jumpBufferTimer = 0;
    let touchStart = null;
    let overlayMode = "title";
    let cameraStream = null;
    let capturedPhoto = "";
    let resultState = {
      active: false,
      phase: "none",
      baseScore: 0,
      coinCount: 0,
      finalScore: 0,
      rank: 0,
      isBest: false,
      entryId: ""
    };
    let obstacles = [];
    let coinItems = [];
    let speedPanels = [];
    let particles = [];

    const player = {
      lane: CENTER_LANE,
      x: LANES[CENTER_LANE],

    };

    function resizeCanvas() {
      const rect = stageEl.getBoundingClientRect();
      canvas.width = Math.round(rect.width);
      canvas.height = Math.round(rect.height);
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
      draw();
    }

    function resetGame() {
      clearScoreConversion();
      stopCamera();
      if (document.activeElement && typeof document.activeElement.blur === "function") {
        document.activeElement.blur();
      }
      overlayMode = "playing";
      scoreLabel.textContent = "SCORE";
      running = true;
      gameOver = false;
      runTime = 0;
      targetTimeAnnounced = false;
      distance = 0;
      coins = 0;
      bestPaceAnnounced = false;
      speed = BASE_SPEED;
      roadScroll = 0;
      loopScroll = 0;
      spawnTimer = 1.55;
      coinTimer = 0.55;
      panelTimer = 3.0;
      slowTimer = 0;
      boostTimer = 0;
      readyTimer = READY_GRACE_TIME;
      jumpTimer = 0;
      jumpBufferTimer = 0;
      obstacles = [];
      coinItems = [];
      speedPanels = [];
      particles = [];
      player.lane = CENTER_LANE;
      player.x = LANES[CENTER_LANE];
      player.holdTimer = 0;
      resetResultState();
      stageEl.classList.remove("title-screen");
      stageEl.classList.add("playing");
      setElementHidden(scoreEntry, true);
      setElementHidden(rankingButton, true);
      setOverlayOpen(false);
      overlay.dataset.mode = "";
      overlay.querySelector(".dialog").classList.remove("new-best");
      hideResultStats();
      hideTitleMeta();
      setHint("準備OK、2分目安で遊べます");
      updateHud();
      lastTime = performance.now();
      frameCarry = 0;
      startLoop();
    }
function endGame() {
      running = false;
      gameOver = true;
      overlayMode = "result";
      scoreLabel.textContent = "SCORE";
      stageEl.classList.remove("playing");
      stageEl.classList.remove("title-screen");
      overlay.dataset.mode = "result";
      setElementHidden(rankingButton, true);
      const score = computeScore();
      const distanceScore = Math.floor(distance);
      const collectedCoins = coins;
      const isBest = score > best;
      best = Math.max(best, score);
      localStorage.setItem("laneRunnerBestScore", String(best));
      overlayTitle.textContent = isBest ? "新記録！" : "ゲームオーバー";
      overlayText.textContent = collectedCoins > 0 ? "コインをスコアに換算中" : "登録するとランキングに残せます";
      showResultStats(score, distanceScore, collectedCoins, "未登録");
      setActionButton(
        startButton,
        collectedCoins > 0 ? "スキップ" : "タイトルへ",
        collectedCoins > 0 ? "»" : "‹",
        collectedCoins > 0 ? "コイン換算をスキップ" : "タイトル画面へ戻る"
      );
      overlay.querySelector(".dialog").classList.toggle("new-best", isBest);
      if (isBest) {
        burstParticles(W / 2, PLAYER_Y - 220, "#f0c247", 26, 1.3);
      }
      setOverlayOpen(true);
      renderDailyRanking(0);
      setHint("障害物に当たった");
      resultState = {
        active: true,
        phase: collectedCoins > 0 ? "converting" : "result",
        baseScore: distanceScore,
        coinCount: collectedCoins,
        finalScore: score,
        rank: 0,
        isBest,
        entryId: ""
      };
      prepareScoreEntry();
      startScoreConversion(distanceScore, collectedCoins, score);
    }

    function resetResultState() {
      resultState = {
        active: false,
        phase: "none",
        baseScore: 0,
        coinCount: 0,
        finalScore: 0,
        rank: 0,
        isBest: false,
        entryId: ""
      };
    }

    function clearScoreConversion() {
      if (scoreConvertInterval) {
        clearInterval(scoreConvertInterval);
        scoreConvertInterval = 0;
      }
      setScoreConversionOpen(false);
      convertLane.innerHTML = "";
      convertScoreBox.classList.remove("pop");
    }

    function hideResultStats() {
      setElementHidden(resultStats, true);
      resultStats.innerHTML = "";
    }

    function hideTitleMeta() {
      setElementHidden(titleMeta, true);
      titleMeta.innerHTML = "";
    }

    function updateTitleMeta() {
      const scores = readDailyScores();
      const todayBest = scores.length ? scores[0].score : 0;
      setElementHidden(titleMeta, false);
      titleMeta.innerHTML = [
        ["BEST", todayBest ? `${formatNumber(todayBest)}点` : "未登録", "★"],
        ["PLAYS", `${scores.length}回`, "▶"]
      ].map(([label, value, icon]) => `<div class="title-chip"><span data-icon="${escapeHtml(icon)}">${label}</span><strong>${escapeHtml(value)}</strong></div>`).join("");
    }

    function showResultStats(score, meters, coinCount, rankLabel) {
      setElementHidden(resultStats, false);
      const statIcons = {
        SCORE: "S",
        DISTANCE: "M",
        COINS: "C",
        RANK: "#"
      };
      resultStats.innerHTML = [
        ["SCORE", formatNumber(score)],
        ["DISTANCE", `${formatNumber(meters)}m`],
        ["COINS", formatNumber(coinCount)],
        ["RANK", rankLabel]
      ].map(([label, value]) => {
        const icon = statIcons[label] || "";
        return `<div class="result-stat"><span data-icon="${escapeHtml(icon)}">${label}</span><strong>${escapeHtml(value)}</strong></div>`;
      }).join("");
    }

    function setButtonIcon(button, icon) {
      if (icon) {
        button.dataset.icon = icon;
      } else {
        delete button.dataset.icon;
      }
    }

    function setActionButton(button, text, icon, label = text) {
      button.textContent = text;
      setButtonIcon(button, icon);
      button.setAttribute("aria-label", label);
    }

    function setOverlayOpen(isOpen) {
      overlay.classList.toggle("show", isOpen);
      overlay.setAttribute("aria-hidden", isOpen ? "false" : "true");
      overlay.inert = !isOpen;
    }

    function setElementHidden(element, isHidden) {
      element.hidden = isHidden;
      element.setAttribute("aria-hidden", isHidden ? "true" : "false");
    }

    function setScoreConversionOpen(isOpen) {
      scoreConvert.classList.toggle("show", isOpen);
      scoreConvert.setAttribute("aria-hidden", isOpen ? "false" : "true");
    }

    function startScoreConversion(baseScore, coinCount, finalScore) {
      clearScoreConversion();
      scoreLabel.textContent = "SCORE";
      let remainingCoins = coinCount;
      let shownScore = baseScore;
      distanceEl.textContent = formatNumber(shownScore);
      todayRankEl.textContent = formatNumber(remainingCoins);
      bestEl.textContent = formatNumber(best);
      updateHudLabels(shownScore, best, remainingCoins);
      setScoreConversionOpen(true);
      convertCoinsEl.textContent = formatNumber(remainingCoins);
      convertScoreEl.textContent = formatNumber(shownScore);
      if (remainingCoins <= 0) {
        overlayText.textContent = "登録するとランキングに残せます";
        showResultStats(finalScore, Math.floor(distance), 0, "未登録");
        setActionButton(startButton, "タイトルへ", "‹", "タイトル画面へ戻る");
        return;
      }

      scoreConvertInterval = setInterval(() => {
        flyResultCoin();
        remainingCoins -= 1;
        shownScore += COIN_VALUE;
        distanceEl.textContent = formatNumber(shownScore);
        todayRankEl.textContent = formatNumber(Math.max(0, remainingCoins));
        convertCoinsEl.textContent = formatNumber(Math.max(0, remainingCoins));
        convertScoreEl.textContent = formatNumber(shownScore);
        updateHudLabels(shownScore, best, Math.max(0, remainingCoins));
        convertScoreBox.classList.remove("pop");
        void convertScoreBox.offsetWidth;
        convertScoreBox.classList.add("pop");
        overlayText.textContent = `コイン換算中 残り${Math.max(0, remainingCoins)}枚`;
        showResultStats(shownScore, Math.floor(distance), Math.max(0, remainingCoins), "未登録");
        if (remainingCoins <= 0) {
          finishScoreConversion();
        }
      }, 70);
    }

    function finishScoreConversion() {
      if (!resultState.active) return;
      clearScoreConversion();
      scoreLabel.textContent = "SCORE";
      setScoreConversionOpen(true);
      convertCoinsEl.textContent = "0";
      convertScoreEl.textContent = formatNumber(resultState.finalScore);
      distanceEl.textContent = formatNumber(resultState.finalScore);
      todayRankEl.textContent = "0";
      updateHudLabels(resultState.finalScore, best, 0);
      overlayTitle.textContent = resultState.isBest ? "新記録！" : "ゲームオーバー";
      const rankLabel = resultState.rank > 0 ? `本日 #${resultState.rank}` : "未登録";
      overlayText.textContent = resultState.rank > 0 ? "ランキング登録済み" : "登録するとランキングに残せます";
      showResultStats(resultState.finalScore, Math.floor(distance), resultState.coinCount, rankLabel);
      setActionButton(startButton, "タイトルへ", "‹", "タイトル画面へ戻る");
      resultState.phase = "result";
    }

    function skipResultDetails() {
      if (!resultState.active) return;
      showTitleScreen();
    }

    function handleMainButton() {
      if (overlayMode === "ranking") {
        showTitleScreen();
        return;
      }
      if (!resultState.active) {
        resetGame();
        return;
      }
      if (resultState.phase === "converting") {
        finishScoreConversion();
        return;
      }
      if (resultState.phase === "result") {
        skipResultDetails();
        return;
      }
      resetGame();
    }

    function flyResultCoin() {
      const coin = document.createElement("i");
      coin.className = "fly-coin";
      const travel = Math.max(80, convertLane.clientWidth - 22);
      coin.style.setProperty("--coin-travel", `${travel}px`);
      convertLane.appendChild(coin);
      coin.addEventListener("animationend", () => coin.remove(), { once: true });
    }

    function updateHudLabels(scoreValue, bestValue, coinValue) {
      scoreStat.setAttribute("aria-label", `スコア ${formatNumber(scoreValue)}点`);
      bestStat.setAttribute("aria-label", `ベスト ${formatNumber(bestValue)}点`);
      coinStat.setAttribute("aria-label", `コイン ${formatNumber(coinValue)}枚`);
    }

    function updateHud() {
      const runScore = computeScore();
      scoreLabel.textContent = "SCORE";
      distanceEl.textContent = formatNumber(runScore);
      bestEl.textContent = formatNumber(best);
      todayRankEl.textContent = formatNumber(coins);
      updateHudLabels(runScore, best, coins);
      checkBestPace(runScore);
      updateRunStrip();
    }

    function pulseStat(statElement, className = "stat-pop") {
      if (!statElement) return;
      statElement.classList.remove(className);
      void statElement.offsetWidth;
      statElement.classList.add(className);
      statElement.addEventListener("animationend", () => {
        statElement.classList.remove(className);
      }, { once: true });
    }

    function setHint(message, animate = true) {
      hintEl.textContent = message;
      if (!animate) return;
      const footer = hintEl.closest(".footer");
      if (!footer) return;
      footer.classList.remove("hint-pop");
      void footer.offsetWidth;
      footer.classList.add("hint-pop");
      footer.addEventListener("animationend", () => {
        footer.classList.remove("hint-pop");
      }, { once: true });
    }

    function updateRunStrip() {
      timePill.classList.remove("boost", "slow", "active");
      timePill.style.setProperty("--effect-progress", "0%");
      if (boostTimer > 0) {
        const progress = Math.max(0, Math.min(100, (boostTimer / BOOST_DURATION) * 100));
        timePill.classList.add("boost");
        timePill.querySelector("span").textContent = "BOOST";
        timeStatus.textContent = `${boostTimer.toFixed(1)}s`;
        timePill.setAttribute("aria-label", `スピードアップ 残り${boostTimer.toFixed(1)}秒`);
        timePill.style.setProperty("--effect-progress", `${progress}%`);
        return;
      }
      if (slowTimer > 0) {
        const progress = Math.max(0, Math.min(100, (slowTimer / SLOW_DURATION) * 100));
        timePill.classList.add("slow");
        timePill.querySelector("span").textContent = "SLOW";
        timeStatus.textContent = `${slowTimer.toFixed(1)}s`;
        timePill.setAttribute("aria-label", `スピードダウン 残り${slowTimer.toFixed(1)}秒`);
        timePill.style.setProperty("--effect-progress", `${progress}%`);
        return;
      }
      timePill.querySelector("span").textContent = "TIME";
      timeStatus.textContent = formatRunTime(runTime);
      timePill.setAttribute("aria-label", `経過時間 ${formatRunTime(runTime)}`);
      timePill.classList.toggle("active", runTime >= TWO_MINUTE_TARGET);

    }

    function computeScore() {
      return coins * COIN_VALUE + Math.floor(distance);
    }

    function formatRunTime(seconds) {
      const total = Math.max(0, Math.floor(seconds));
      const minutes = Math.floor(total / 60);
      const rest = String(total % 60).padStart(2, "0");
      return `${minutes}:${rest}`;
    }

    function checkPlayTimeTarget() {
      if (targetTimeAnnounced || runTime < TWO_MINUTE_TARGET) return;
      targetTimeAnnounced = true;
      setHint("2分突破！ そのまま記録更新へ");
    }

    function checkBestPace(runScore) {
      if (bestPaceAnnounced || best <= 0 || runScore <= best) return;
      bestPaceAnnounced = true;
      burstParticles(player.x, PLAYER_Y - 78, "#f0c247", 20, 1.15);
      pulseStat(bestStat, "stat-best");
      pulseStat(scoreStat, "stat-best");
      setHint(`新記録ペース ${formatNumber(runScore)}点`);
    }

    function todayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `laneRunnerDailyScore:${y}-${m}-${d}`;
    }

    function readDailyScores() {
      try {
        const scores = JSON.parse(localStorage.getItem(todayKey()) || "[]");
        return Array.isArray(scores) ? scores : [];
      } catch {
        return [];
      }
    }

    function saveDailyScore(score, name = "プレイヤー", photo = "", saveToken = null) {
      if (saveToken !== REGISTER_SAVE_TOKEN) {
        return null;
      }
      const entry = {
        id: `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`,
        score,
        time: Date.now(),
        name: name || "プレイヤー",
        photo: photo || ""
      };
      const scores = readDailyScores();
      scores.push(entry);
      scores.sort((a, b) => b.score - a.score || a.time - b.time);
      const trimmed = scores.slice(0, 50);
      localStorage.setItem(todayKey(), JSON.stringify(trimmed));
      return {
        id: entry.id,
        rank: trimmed.findIndex((item) => item.id === entry.id) + 1 || trimmed.length
      };
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function formatNumber(value) {
      const number = Number(value) || 0;
      return Math.floor(number).toLocaleString("ja-JP");
    }

    function renderDailyRanking(currentRank = 0, limit = 5, currentEntryId = resultState.entryId) {
      const allScores = readDailyScores();
      const scores = allScores.slice(0, limit);
      if (currentEntryId && !scores.some((item) => item.id === currentEntryId)) {
        const current = allScores.find((item) => item.id === currentEntryId);
        if (current) scores.push(current);
      }
      if (!scores.length) {
        dailyRankingEl.innerHTML = "<li class=\"empty-rank\"><span class=\"rank-main\"><span class=\"rank-number\">★</span><span class=\"rank-name\"><span class=\"empty-title\">まだ記録がありません</span><span class=\"empty-sub\">STARTで最初のランを登録しよう</span></span></span></li>";
        return;
      }
      dailyRankingEl.innerHTML = scores.map((item, index) => {
        const rank = allScores.findIndex((score) => score.id === item.id) + 1 || index + 1;
        const mark = [
          `rank-${rank}`,
          item.id === currentEntryId || rank === currentRank ? "current" : ""
        ].filter(Boolean).join(" ");
        const name = escapeHtml(item.name || "プレイヤー");
        const photoStyle = item.photo ? ` style="background-image:url('${escapeHtml(item.photo)}')"` : "";
        const avatar = item.photo ? "" : name.slice(0, 1);
        return `<li class="${mark}"><span class="rank-main"><span class="rank-number">${rank}位</span><span class="rank-avatar"${photoStyle}>${escapeHtml(avatar)}</span><span class="rank-name">${name}</span></span><strong class="rank-score">${formatNumber(item.score)}点</strong></li>`;
      }).join("");
    }

      stopCamera();
      clearScoreConversion();
      resetResultState();
      overlayMode = "title";
      overlay.dataset.mode = "title";
      stageEl.classList.remove("playing");
      stageEl.classList.add("title-screen");
      overlay.querySelector(".dialog").classList.remove("new-best");
      setOverlayOpen(true);
      setElementHidden(scoreEntry, true);
      scoreEntry.classList.remove("saved");
      dailyRankingEl.innerHTML = "";
      hideResultStats();
      updateTitleMeta();
      overlayTitle.textContent = "RUN DASH!";
      overlayText.textContent = "左右で避けて、ジャンプで穴を越えろ！";
      setActionButton(startButton, "START", "▶", "ゲームを開始");
      setElementHidden(rankingButton, false);
      setActionButton(rankingButton, "RANKING", "★", "ランキングを見る");
      setHint("STARTでラン、RANKINGで記録確認", false);
      updateHud();
    }

    function showRankingScreen() {
      stopCamera();
      clearScoreConversion();
      overlayMode = "ranking";
      overlay.dataset.mode = "ranking";
      overlay.querySelector(".dialog").classList.remove("new-best");
      setOverlayOpen(true);
      setElementHidden(scoreEntry, true);
      scoreEntry.classList.remove("saved");
      hideResultStats();
      hideTitleMeta();
      overlayTitle.textContent = "ランキング";
      overlayText.textContent = "今日の上位記録";
      renderDailyRanking(0, 10);
      setActionButton(startButton, "もどる", "‹", "タイトル画面へ戻る");
      setElementHidden(rankingButton, true);
    }

    function prepareScoreEntry() {
      capturedPhoto = localStorage.getItem("laneRunnerLastPhoto") || "";
      playerNameInput.value = localStorage.getItem("laneRunnerPlayerName") || "プレイヤー";
      playerNameInput.disabled = false;
      photoPreview.disabled = false;
      photoButton.disabled = false;
      saveEntryButton.disabled = false;
      updatePhotoPreview(capturedPhoto);
      photoStatus.textContent = "登録を押すまでランキングには残りません";
      photoButton.textContent = capturedPhoto ? "撮り直し" : "写真";
      saveEntryButton.textContent = "登録";
      scoreEntry.classList.remove("saved");
      setElementHidden(scoreEntry, false);
    }

    function updatePhotoPreview(photo) {
      photoPreview.style.backgroundImage = photo ? `url("${photo}")` : "";
      photoPreview.innerHTML = photo ? "" : "<span>写真</span>";
      photoPreview.setAttribute("aria-label", photo ? "写真を撮り直す" : "写真を撮る");
    }

    function saveEntryProfile(event) {
      if (!event || event.currentTarget !== saveEntryButton) return;
      if (!resultState.active) return;
      if (resultState.entryId) {
        photoStatus.textContent = `登録済み 本日 #${resultState.rank}`;
        return;
      }
      const name = playerNameInput.value.trim() || "プレイヤー";
      const savedScore = saveDailyScore(resultState.finalScore, name, capturedPhoto, REGISTER_SAVE_TOKEN);
      if (!savedScore) return;
      resultState.entryId = savedScore.id;
      resultState.rank = savedScore.rank;
      localStorage.setItem("laneRunnerPlayerName", name);
      if (capturedPhoto) {
        localStorage.setItem("laneRunnerLastPhoto", capturedPhoto);
      }
      stopCamera();
      scoreEntry.classList.add("saved");
      saveEntryButton.textContent = "登録済み";
      saveEntryButton.disabled = true;
      playerNameInput.disabled = true;
      photoPreview.disabled = true;
      photoButton.disabled = true;
      photoStatus.textContent = resultState.rank > 0
        ? `ランキングに登録しました 本日 #${resultState.rank}`
        : "ランキングに登録しました";
      if (resultState.phase === "result") {
        overlayText.textContent = "ランキング登録済み";
        showResultStats(resultState.finalScore, Math.floor(distance), resultState.coinCount, `本日 #${resultState.rank}`);
      }
      renderDailyRanking(resultState.rank, 5, resultState.entryId);
    }

    async function handlePhotoButton() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        photoStatus.textContent = "この表示方法ではカメラが使えません";
        return;
      }
      if (!cameraStream) {
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
          photoVideo.srcObject = cameraStream;
          photoVideo.hidden = false;
          await photoVideo.play();
          photoButton.textContent = "撮影";
          photoStatus.textContent = "もう一度押すと撮影します";
        } catch {
          photoStatus.textContent = "カメラ許可が必要です";
        }
        return;
      }

      const context = photoCanvas.getContext("2d");
      const size = 96;
      const videoW = photoVideo.videoWidth || size;
      const videoH = photoVideo.videoHeight || size;
      const sourceSize = Math.min(videoW, videoH);
      const sx = (videoW - sourceSize) / 2;
      const sy = (videoH - sourceSize) / 2;
      context.drawImage(photoVideo, sx, sy, sourceSize, sourceSize, 0, 0, size, size);
      capturedPhoto = photoCanvas.toDataURL("image/jpeg", 0.82);
      updatePhotoPreview(capturedPhoto);
      stopCamera();
      photoButton.textContent = "撮り直し";
      photoStatus.textContent = "写真を設定しました";
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach((track) => track.stop());
        cameraStream = null;
      }
      if (photoVideo) {
        photoVideo.pause();
        photoVideo.srcObject = null;

    function hasPanelClearance() {
      const panelTop = -72;

        if (rangesTooClose(panelTop, panelBottom, obstacleTop, obstacleBottom, PANEL_CLEARANCE)) {
          return false;
        }

    function rangesTooClose(aTop, aBottom, bTop, bBottom, clearance) {

    function update(dt) {

      slowTimer = Math.max(0, slowTimer - dt);

      readyTimer = Math.max(0, readyTimer - dt);
      speed = rawSpeed;
      if (boostTimer > 0) speed *= BOOST_FACTOR;
      if (slowTimer > 0) speed *= SLOW_FACTOR;

      jumpBufferTimer = Math.max(0, jumpBufferTimer - dt);
      jumpTimer = Math.max(0, jumpTimer - dt);
      if (jumpTimer <= 0 && bufferedJump) startJump();

      checkPlayTimeTarget();
      roadScroll = (roadScroll + speed * dt) % 80;
      loopScroll += speed * dt;

          panelTimer = 3.2 + Math.random() * 2.4;

      for (const coin of coinItems) {

        panel.y += speed * dt;

    function awardPassedObstacles() {

        if (obstacle.type === "hole") {
          if (obstacle.lanes.includes(player.lane) && isJumping()) {
            burstParticles(LANES[player.lane], PLAYER_Y - 42, "#7beeff", 10, 0.75);
          }
          continue;
        }
        if (!obstacle.lanes.includes(player.lane)) {
          const clearX = LANES[player.lane];
          const clearY = PLAYER_Y - 34;
          burstParticles(clearX, clearY, obstacle.lanes.length > 1 ? "#f0c247" : "#7beeff", 8, 0.65);
        }
      }
    }

    function burstParticles(x, y, color, count = 8, spread = 1) {
      for (let i = 0; i < count; i += 1) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * spread;
        const speedOut = 42 + Math.random() * 78;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speedOut,
          vy: Math.sin(angle) * speedOut - 18,
          r: 2.4 + Math.random() * 2.8,
          life: 0.42 + Math.random() * 0.22,
          maxLife: 0.64,
          color

      }
      if (particles.length > 90) {
        particles.splice(0, particles.length - 90);
      }
    }

    function updateParticles(dt) {
      for (const particle of particles) {

function checkCollisions() {
      const p = playerRect();
      const hitP = shrinkRect(p, 5, 6);

          const obstacle = obstacles[obstacleIndex];
          if (laneObjectPassed(obstacle)) continue;
          if (obstacle.type === "hole") {

        const r = panelRect(panel);

            setHint("スピードダウン");

          if (panel.group === "tripleBoost") {
            speedPanels = speedPanels.filter((item) => item.groupId !== panel.groupId);
          } else {
            speedPanels.splice(i, 1);
          }
          break;
        }
      }

    }

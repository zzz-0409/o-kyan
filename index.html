      for (const panel of speedPanels) {
        const r = panelRect(panel);
        const image = panel.kind === "up" ? gimmickSprites.boost : gimmickSprites.slow;
        if (imageReady(image)) {
          ctx.drawImage(image, r.x, r.y, r.w, r.h);
          continue;
        }
        ctx.fillStyle = panel.kind === "up" ? "rgba(240,194,71,0.58)" : "rgba(101,183,216,0.52)";
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.fillStyle = panel.kind === "up" ? "#f6efd9" : "#e8f8ff";
        ctx.font = "800 18px Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(panel.kind === "up" ? ">>" : "<<", r.x + r.w / 2, r.y + 35);
      }
    }

    function drawCoins() {
      for (const coin of coinItems) {
        const x = LANES[coin.lane];
        const y = coin.y;
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.ellipse(x + 2, y + 4, COIN_RADIUS, COIN_RADIUS * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        if (coin.bonus) {
          ctx.strokeStyle = "rgba(123,238,255,0.68)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, COIN_RADIUS + 5, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.fillStyle = "#f0c247";
        ctx.beginPath();
        ctx.arc(x, y, COIN_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#f6efd9";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, COIN_RADIUS - 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawParticles() {
      if (!particles.length) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (const particle of particles) {
        const alpha = Math.max(0, Math.min(1, particle.life / particle.maxLife));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.r * (0.75 + alpha * 0.45), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlayer() {
      const r = playerRect();
      const pose = playerCurvePose();
      const lift = jumpLift();
      const runPhase = roadScroll * 0.16;
      const bob = isJumping() ? 0 : Math.sin(runPhase) * 3;
      const lean = pose.angle + (isJumping() ? 0 : Math.sin(runPhase) * 0.07);
      const spriteW = 64;
      const spriteH = 84;
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.save();
      ctx.translate(pose.x, pose.y - lift + bob);
      ctx.rotate(pose.angle);
      ctx.scale(pose.scale, pose.scale);
      ctx.fillRect(-PLAYER_W / 2 + 5, -5, PLAYER_W - 10, isJumping() ? 5 : 8);
      ctx.restore();
      if (player.holdTimer > 0) {
        const ratio = Math.max(0, Math.min(1, player.holdTimer / 0.22));
        ctx.save();
        ctx.translate(pose.x, pose.y - lift + bob - 8);
        ctx.globalAlpha = 0.22 + ratio * 0.42;
        ctx.strokeStyle = "rgba(123,238,255,0.92)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, 48 - ratio * 10, 16 - ratio * 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.12 + ratio * 0.14;
        ctx.fillStyle = "#7beeff";
        ctx.beginPath();
        ctx.ellipse(0, 0, 54 - ratio * 10, 18 - ratio * 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const jumping = isJumping();
      const runFrame = playerRunSprites[Math.floor(roadScroll / 20) % playerRunSprites.length];
      const activePlayerSprite = jumping
        ? (playerJumpSprite.complete && playerJumpSprite.naturalWidth > 0 ? playerJumpSprite : playerSprite)
        : runFrame;
      if (activePlayerSprite && activePlayerSprite.complete && activePlayerSprite.naturalWidth > 0) {
        ctx.save();
        ctx.translate(pose.x, pose.y - lift + bob);
        ctx.rotate(lean);
        const spriteScaleX = jumping ? 1.05 : 1.22;
        const spriteScaleY = jumping ? 1.05 : 1;
        ctx.scale(spriteScaleX * pose.scale, spriteScaleY * pose.scale);
        ctx.drawImage(activePlayerSprite, -spriteW / 2, -spriteH, spriteW, spriteH);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(pose.x, pose.y - lift);
        ctx.rotate(pose.angle);
        ctx.scale(pose.scale, pose.scale);
        ctx.fillStyle = "#f0c247";
        ctx.fillRect(-PLAYER_W / 2, -PLAYER_H, r.w, r.h);
        ctx.fillStyle = "#f6efd9";
        ctx.fillRect(PLAYER_W / 2 - 15, -PLAYER_H + 12, 7, 7);
        ctx.fillStyle = "#8c672a";
        ctx.fillRect(-PLAYER_W / 2 + 8, -10, 10, 10);
        ctx.fillRect(PLAYER_W / 2 - 18, -10, 10, 10);
        ctx.restore();
      }

    }

    function roundedRectPath(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const left = rect.left || 0;
      const top = rect.top || 0;
      return {
        x: event.clientX - left,
        y: event.clientY - top,
        w: rect.width || canvas.clientWidth || W,
        h: rect.height || canvas.clientHeight || H
      };
    }

    function canTapJumpFrom(event) {
      const point = canvasPoint(event);
      return point.y < point.h - TAP_JUMP_BOTTOM_DEAD_ZONE;
    }

function onPointerDown(event) {
      touchStart = { x: event.clientX, y: event.clientY, id: event.pointerId, canTapJump: canTapJumpFrom(event) };
    }

    function onPointerUp(event) {
      if (!touchStart) return;
      const start = touchStart;
      const dx = event.clientX - start.x;
      const dy = event.clientY - start.y;
      touchStart = null;
      if (Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy)) {
        handleScreenDirection(dx, dy);
        return;
      }
      if (start.canTapJump && canTapJumpFrom(event) && Math.abs(dx) < 24 && Math.abs(dy) < 24) {
        jump();
      }
    }

    function onControlButton(event, action) {
      event.preventDefault();
      event.stopPropagation();
      action();
    }

    function handleScreenDirection(dx, dy) {
      if (Math.abs(dx) >= Math.abs(dy)) {
        moveSide(dx < 0 ? -1 : 1);
      }
    }

    function resultAdvanceRequested() {
      return overlayMode === "result" && !running && overlay.classList.contains("show");
    }

    function isResultControlTarget(target) {
      return target && target.closest && target.closest("button, input, textarea, select, label, .score-entry");
    }

    function isTextEntryTarget(target) {
      return target && target.closest && target.closest("input, textarea, select, [contenteditable='true']");
    }

    function onOverlayPointerUp(event) {
      if (!resultAdvanceRequested()) return;
      if (isResultControlTarget(event.target)) return;
      event.preventDefault();
      handleMainButton();
    }

    function onKeyDown(event) {
      if (isTextEntryTarget(event.target)) return;
      if (event.repeat) return;
      if ((event.code === "Space" || event.code === "Enter" || event.code === "KeyR") && resultAdvanceRequested()) {
        event.preventDefault();
        handleMainButton();
        return;
      }
      if (event.code === "ArrowUp" || event.code === "Space") {
        event.preventDefault();
        jump();
      }
      if (event.code === "ArrowLeft") {
        event.preventDefault();
        handleScreenDirection(-1, 0);
      }
      if (event.code === "ArrowRight") {
        event.preventDefault();
        handleScreenDirection(1, 0);
      }
    }

    function startLoop() {
      if (loopActive) return;
      loopActive = true;
      requestAnimationFrame(loop);
    }

    function loop(now) {
      if (!loopActive) return;
      const elapsed = now - lastTime + frameCarry;
      if (elapsed < FRAME_MS) {
        requestAnimationFrame(loop);
        return;
      }
      const dt = Math.min(0.05, elapsed / 1000 || 0);
      frameCarry = elapsed % FRAME_MS;
      lastTime = now;
      if (running) {
        update(dt);
      } else {
        roadScroll = (roadScroll + BASE_SPEED * 0.42 * dt) % 80;
        loopScroll += BASE_SPEED * 0.42 * dt;
        updateParticles(dt);
      }
      draw();
      requestAnimationFrame(loop);
    }

    startButton.addEventListener("click", handleMainButton);
    rankingButton.addEventListener("click", showRankingScreen);
    photoButton.addEventListener("click", handlePhotoButton);
    photoPreview.addEventListener("click", handlePhotoButton);
    saveEntryButton.addEventListener("click", (event) => saveEntryProfile(event));
    overlay.addEventListener("pointerup", onOverlayPointerUp);
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", () => {
      touchStart = null;
    });
    leftButton.addEventListener("pointerdown", (event) => onControlButton(event, () => handleScreenDirection(-1, 0)));
    rightButton.addEventListener("pointerdown", (event) => onControlButton(event, () => handleScreenDirection(1, 0)));
    jumpButton.addEventListener("pointerdown", (event) => onControlButton(event, jump));
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("resize", resizeCanvas);

    bestEl.textContent = formatNumber(best);
    updateHud();
    resizeCanvas();
    showTitleScreen();
    draw();
    lastTime = performance.now();
    startLoop();
  </script>
</body>
</html>
